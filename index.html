  <style>
/* 로컬 Pretendard Variable 폰트 사용: GitHub 저장소 루트의 ./PretendardVariable.woff2 */
@font-face {
  font-family: "Pretendard Variable";
  font-style: normal;
  font-weight: 45 920;
  font-display: swap;
  src: url("./PretendardVariable.woff2") format("woff2");
}

:root {
  --bg: #f3f6fb;
  --panel: #ffffff;
  --panel-2: #f7faff;
  --text: #172033;
  --muted: #64748b;
  --line: #dbe3ef;
  --primary: #1f5fbf;
  --primary-dark: #174a9c;
  --danger: #c2410c;
  --danger-bg: #fff7ed;
  --success: #15803d;
  --success-bg: #f0fdf4;
  --warning: #a16207;
  --warning-bg: #fefce8;
  --shadow: 0 12px 30px rgba(15, 23, 42, .08);
  --radius: 16px;
  --focus: 0 0 0 4px rgba(31, 95, 191, .18);
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --color-surface: var(--panel);
  --color-surface-offset: var(--panel-2);
  --color-border: var(--line);
  --color-text: var(--text);
  --color-text-muted: var(--muted);
  --color-text-faint: #94a3b8;
  --color-error: var(--danger);
  --radius-md: 12px;
  --radius-lg: 16px;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --content-wide: 1180px;
  --shadow-sm: 0 4px 12px rgba(15, 23, 42, .08);
}



* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  overscroll-behavior-y: none; /* pull-to-refresh 차단 */
}
html {
  overscroll-behavior-y: none;
}

button, input, select, textarea { font: inherit; }
button, a, input, select, textarea { outline: none; }

button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  box-shadow: var(--focus);
  border-color: var(--primary);
}

button:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none !important;
}

.app-shell { min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}

.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }

.brand-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: grid; place-items: center;
  background: var(--primary);
  color: #fff;
  font-weight: 900;
  letter-spacing: -.04em;
  flex: none;
}

.brand h1 { margin: 0; font-size: 17px; line-height: 1.2; }
.brand p  { margin: 2px 0 0; color: var(--muted); font-size: 13px; }

.top-actions {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; flex-wrap: wrap;
}

/* ── Buttons ── */
.btn {
  min-height: 40px;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 9px 13px;
  background: var(--panel);
  color: var(--text);
  font-weight: 800;
  cursor: pointer;
  transition: .15s ease;
  text-decoration: none;
}
.btn:hover { transform: translateY(-1px); border-color: var(--primary); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn.primary:hover { background: var(--primary-dark); }
.btn.danger  { color: var(--danger);  border-color: rgba(194,65,12,.35); background: var(--danger-bg); }
.btn.success { color: var(--success); border-color: rgba(21,128,61,.35);  background: var(--success-bg); }
.btn.small   { min-height: 32px; padding: 6px 10px; border-radius: 10px; font-size: 13px; }

/* ── Layout ── */
.container {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 44px;
}

/* ── Login ── */
.login-wrap {
  min-height: calc(100vh - 64px);
  display: grid; place-items: center;
  padding: 32px 16px;
}
.login-card {
  width: min(460px, 100%);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 30px;
}
.login-card h2  { margin: 0 0 8px; font-size: 25px; }
.login-card .hint { margin: 0 0 24px; color: var(--muted); }

/* ── Form ── */
.field { margin-bottom: 16px; }
label  { display: block; margin: 0 0 7px; font-size: 14px; font-weight: 900; }
input, select, textarea {
  width: 100%; min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
  background: var(--panel);
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
.question-form { display: grid; grid-template-columns: 1fr; gap: 14px; }
.question-form .option-field input { width: 100%; min-height: 48px; padding: 12px 14px; line-height: 1.6; }
.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }

/* ── Notice ── */
.notice {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px 14px;
  background: var(--panel-2);
  color: var(--muted);
}
.notice.danger  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(194,65,12,.25); }
.notice.success { color: var(--success); background: var(--success-bg); border-color: rgba(21,128,61,.25); }
.notice.warning { color: var(--warning); background: var(--warning-bg); border-color: rgba(161,98,7,.25); }

/* ── Utilities ── */
.muted      { color: var(--muted); }
.text-right { text-align: right; }
.hidden     { display: none !important; }

/* ── Card ── */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}
.section-head {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  gap: 16px; margin-bottom: 16px;
}
.section-head h2, .section-head h3 { margin: 0; }
.section-head p { margin: 4px 0 0; color: var(--muted); }

/* ── Grid ── */
.grid { display: grid; gap: 16px; }
.grid.two   { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.four  { grid-template-columns: repeat(4, minmax(0, 1fr)); }

/* ── Metric ── */
.metric {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
}
.metric .label { color: var(--muted); font-size: 13px; font-weight: 900; }
.metric .value { margin-top: 6px; font-size: 28px; font-weight: 950; letter-spacing: -.03em; }
.metric .sub   { margin-top: 4px; color: var(--muted); font-size: 12px; }

/* ── Profile list ── */
.profile-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px; margin: 0;
}
.profile-list div { border: 1px solid var(--line); border-radius: 13px; padding: 12px; background: var(--panel-2); }
.profile-list dt  { color: var(--muted); font-size: 12px; font-weight: 900; }
.profile-list dd  { margin: 4px 0 0; font-weight: 950; }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  background: var(--panel-2);
  color: var(--text);
  font-size: 12px; font-weight: 950; white-space: nowrap;
}
.badge.admin   { background: #111827; border-color: #111827; color: #fff; }

.badge.success { color: var(--success); background: var(--success-bg); border-color: rgba(21,128,61,.25); }
.badge.danger  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(194,65,12,.25); }
.badge.warning { color: var(--warning); background: var(--warning-bg); border-color: rgba(161,98,7,.25); }

/* ── Exam ── */
.exam-layout { display: grid; grid-template-columns: 1fr 290px; gap: 18px; align-items: start; }
.question-title { margin: 0 0 16px; font-size: 21px; font-weight: 950; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 10px; padding: 13px;
  border: 1px solid var(--line); border-radius: 14px;
  background: var(--panel); cursor: pointer; transition: .12s ease;
}
.option:hover, .option:focus-within { border-color: var(--primary); background: var(--panel-2); }
.option input    { width: auto; min-height: auto; margin-top: 4px; }
.progress        { height: 10px; border-radius: 999px; background: var(--line); overflow: hidden; }
.progress span   { display: block; height: 100%; width: 0; border-radius: inherit; background: var(--primary); transition: width .2s ease; }

/* ── Admin ── */
.admin-layout {
  display: grid;
  grid-template-columns: 250px minmax(0, 1fr);
  min-height: calc(100vh - 64px);
}
.sidebar {
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow: auto;
  border-right: 1px solid var(--line);
  background: var(--panel);
  padding: 18px;
}
.sidebar nav { display: grid; gap: 8px; margin-top: 18px; }
.nav-btn { width: 100%; justify-content: flex-start; border-color: transparent; background: transparent; color: var(--muted); text-align: left; }
.nav-btn.active { border-color: var(--line); background: var(--panel-2); color: var(--primary); }
.admin-main { min-width: 0; padding: 24px; }

/* ── Table ── */
.table-wrap { width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); }
table       { width: 100%; min-width: 780px; border-collapse: collapse; }
th, td      { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 14px; }
th          { background: var(--panel-2); color: var(--muted); font-size: 12px; font-weight: 950; text-transform: uppercase; letter-spacing: .02em; white-space: nowrap; }
tr:last-child td { border-bottom: 0; }

/* ── Filters ── */
.filters { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 14px; }
/* 관리자 입력폼 정렬 보정 */
.admin-inline-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: end;
}
.admin-inline-form .field { margin-bottom: 0; }
.admin-inline-form .btn { min-height: 42px; align-self: end; white-space: nowrap; }
.admin-main .filters { align-items: end; }
.admin-main .filters .field { margin-bottom: 0; }
.admin-main .filters > .btn { min-height: 42px; align-self: end; white-space: nowrap; }
.admin-main .form-grid { align-items: end; }
.admin-main .form-grid .field { margin-bottom: 0; }
.admin-main .form-grid > .btn { min-height: 42px; align-self: end; white-space: nowrap; }
@media (max-width: 640px) {
  .admin-inline-form { grid-template-columns: 1fr; }
  .admin-inline-form .btn,
  .admin-main .filters > .btn,
  .admin-main .form-grid > .btn { width: 100%; }
}


/* ── Bar chart ── */
.bar-chart { display: grid; gap: 10px; }
.bar-row   { display: grid; grid-template-columns: 120px 1fr 54px; gap: 10px; align-items: center; font-size: 13px; }
.bar-track { height: 14px; border-radius: 999px; background: var(--line); overflow: hidden; }
.bar-fill  { height: 100%; border-radius: inherit; background: var(--primary); }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  display: grid; place-items: center; padding: 18px;
  background: rgba(15, 23, 42, .55);
}
.modal {
  width: min(760px, 100%);
  max-height: calc(100vh - 36px); overflow: auto;
  border: 1px solid var(--line); border-radius: 20px;
  box-shadow: var(--shadow); background: var(--panel); padding: 20px;
}
.modal.sm     { width: min(480px, 100%); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; flex-wrap: wrap; }

/* ── Misc ── */
.empty  { padding: 30px; color: var(--muted); text-align: center; }
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── Responsive ── */
@media (max-width: 1000px) {
  .grid.four, .grid.three { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .exam-layout, .admin-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
  .sidebar nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .admin-main { padding: 18px; }
  .filters { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 640px) {
  .topbar { padding: 12px 16px; align-items: flex-start; }
  .brand h1 { font-size: 15px; }
  .brand p  { display: none; }
  .container { width: min(100% - 24px, 1180px); padding-top: 18px; }
  .login-card { padding: 22px; }
  .grid.two, .grid.three, .grid.four, .profile-list, .form-grid, .filters { grid-template-columns: 1fr; }
  .sidebar nav { grid-template-columns: 1fr 1fr; }
  .section-head { display: grid; }
  .btn { width: 100%; }
  .top-actions .btn { width: auto; }
  .bar-row { grid-template-columns: 88px 1fr 42px; }
}


    /* ── 응시자 프로필 바 ── */
    .profile-bar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-6);
      flex-wrap: wrap;
    }
    .profile-bar-item { display: flex; align-items: center; gap: var(--space-2); }
    .profile-bar-label { font-size: var(--text-xs); color: var(--color-text-muted); }
    .profile-bar-value { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
    .profile-bar-sep { color: var(--color-text-faint); font-size: var(--text-sm); }
    .profile-bar-badge { margin-left: auto; }

    /* ── 시험 안내 설명 ── */
    .exam-intro-desc {
      background: var(--color-surface-offset);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.8;
      margin-bottom: var(--space-4);
    }
    .exam-intro-desc strong { color: var(--color-text); font-weight: 600; }

    /* ── 시험 sticky 상태바 ── */
    .exam-sticky-bar {
      position: sticky;
      top: 64px;
      z-index: 45;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    .exam-sticky-inner {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding: var(--space-2) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .exam-sticky-left { flex: 1; min-width: 0; }
    .exam-sticky-right { display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
    .exam-stat { font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; }
    .exam-warn-text { font-size: var(--text-xs); color: var(--color-text-muted); }
    .exam-warn-text.danger { color: var(--color-error); font-weight: 600; }

    /* ── 전체 문항 목록 ── */
    .exam-all-container { padding-block: var(--space-4); }
    .exam-progress-wrap { margin-bottom: var(--space-4); }
    .question-block { margin-bottom: var(--space-4); scroll-margin-top: 60px; }
    .question-block .question-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    .question-block .question-num {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 600;
    }
    .question-block .question-title {
      font-size: var(--text-base);
      font-weight: 600;
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }
  

/* 요청 반영: 로고, 안내문, 최근 기록, 분기별 결과 */
.brand-logo {
  width: auto;
  height: 38px;
  max-width: 150px;
  display: block;
  object-fit: contain;
  flex: none;
}
.exam-ready-card {
  overflow: hidden;
  border: 1px solid rgba(31,95,191,.24);
  border-radius: 24px;
  background:
    radial-gradient(circle at top left, rgba(31,95,191,.16), transparent 36%),
    var(--panel);
  box-shadow: 0 18px 44px rgba(15, 42, 86, .12);
}
.exam-ready-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: center;
  padding: 26px 28px;
  margin: -4px -4px 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #0f357a, #1f5fbf 58%, #3a7be0);
  color: #fff;
}
.exam-ready-icon {
  width: 58px;
  height: 58px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.32);
  font-size: 27px;
  font-weight: 950;
  animation: bluePulse 1.35s ease-in-out infinite;
}
.exam-ready-hero h2 {
  margin: 0;
  font-size: clamp(25px, 3.5vw, 36px);
  letter-spacing: -.04em;
}
.exam-ready-hero p { display: none; }
@keyframes bluePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.38); transform: scale(1); }
  50% { box-shadow: 0 0 0 10px rgba(255,255,255,.08); transform: scale(1.035); }
}
.exam-intro-desc.business-blue {
  background: #f8fbff;
  border: 1px solid rgba(31,95,191,.16);
  border-radius: 20px;
  padding: 18px;
  color: #26364d;
}

.intro-policy-text p { margin: 0; }
.exam-rule-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin: 0 0 14px;
}
.exam-rule-item, .exam-policy-item {
  padding: 15px 16px;
  border: 1px solid rgba(31,95,191,.16);
  border-radius: 16px;
  background: #fff;
  line-height: 1.65;
}

.exam-rule-item strong, .exam-policy-item strong {
  display: block;
  color: var(--primary);
  margin-bottom: 4px;
  font-size: 14px;
}
.exam-policy-list { display: grid; gap: 10px; margin-top: 10px; }
.exam-policy-item {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 12px;
  align-items: flex-start;
}
.exam-policy-mark {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: rgba(31,95,191,.10);
  color: var(--primary);
  font-weight: 950;
}
.exam-security-note {
  margin-top: 10px;
  padding: 16px 18px;
  border: 1px solid rgba(194,65,12,.24);
  border-left: 5px solid var(--danger);
  border-radius: 16px;
  background: var(--danger-bg);
  color: var(--danger);
  font-weight: 900;
  line-height: 1.65;
}
.result-simple-card { text-align: center; padding: 28px; }
.result-final-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 220px;
  min-height: 110px;
  padding: 18px 28px;
  border-radius: 28px;
  font-size: clamp(54px, 10vw, 94px);
  line-height: 1;
  font-weight: 1000;
  letter-spacing: -.06em;
  animation: resultBlink 1.05s ease-in-out infinite;
}
.result-final-badge.success { color: var(--success); background: var(--success-bg); border: 2px solid rgba(21,128,61,.35); }
.result-final-badge.danger { color: var(--danger); background: var(--danger-bg); border: 2px solid rgba(194,65,12,.35); }
.result-simple-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-top: 20px;
}
.result-simple-metric {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 20px;
  background: var(--panel-2);
}

/* 관리자 문제 입력: 숫자 정답 선택 버튼 */
.option-answer-row {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
}
.answer-choice {
  position: relative;
  width: 42px;
  height: 42px;
  flex: none;
}
.answer-choice input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}
.answer-choice span {
  width: 42px;
  height: 42px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--muted);
  font-weight: 950;
  cursor: pointer;
  transition: .15s ease;
}
.answer-choice input:checked + span {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  transform: scale(1.04);
}
.answer-choice input:focus-visible + span { box-shadow: var(--focus); }
.affiliation-add-form {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) auto;
  gap: 10px;

}
.affiliation-add-form .field { margin-bottom: 0; }
.affiliation-add-form .btn { min-height: 42px; align-self: end; white-space: nowrap; }
@media (max-width: 640px) {

/* ── 관리자 응시상태 배지 (요구사항 §13) ── */

/* ════════════════════════════════════════
   CLEAN & FLAT UI — 간결하고 세련된 스타일
   ════════════════════════════════════════ */

/* 공통 컨테이너 보정 */
.v2-container { padding-top: 16px; padding-bottom: 60px; }

/* ── 1. 로그인 폼 ── */
.login-card.v2 {
  width: min(400px, 100%);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(15,23,42,0.06);
  padding: 32px 28px;
}
.login-title {
  margin: 0 0 4px; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; text-align: center;
}
.login-sub {
  margin: 0 0 24px; color: var(--muted); font-size: 14px; text-align: center;
}
.login-form { display: grid; gap: 16px; }
.login-form .field { margin-bottom: 0; }
.login-form label { font-size: 13px; margin-bottom: 6px; color: var(--muted); }
.login-form input, .login-form select {
  border-color: var(--line); border-radius: 10px; background: var(--panel-2); min-height: 46px; transition: 0.2s;
}
.login-form input:focus, .login-form select:focus { background: var(--panel); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(31,95,191,0.1); }
.login-submit-btn {
  margin-top: 8px; min-height: 48px; border-radius: 10px; font-size: 15px; font-weight: 800;
}

/* ── 2. 응시 대기 화면 (대시보드) ── */
.v2-profile-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; justify-content: center; }
.v2-chip { 
  display: inline-flex; align-items: center; gap: 6px; 
  padding: 6px 12px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; font-size: 13px; font-weight: 600;
}
.v2-chip-label { font-size: 12px; color: var(--muted); font-weight: 700; }

.v2-ready-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 2px 12px rgba(15,23,42,0.04);
}
.v2-ready-banner {
  padding: 20px 24px; border-bottom: 1px solid var(--line); background: var(--panel-2);
}
.v2-ready-banner h2 { margin: 0; font-size: 18px; font-weight: 800; color: var(--text); }
.v2-ready-banner p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

/* 스탯 */
.v2-stat-row { display: flex; border-bottom: 1px solid var(--line); }
.v2-stat-item { flex: 1; padding: 16px; text-align: center; border-right: 1px solid var(--line); }
.v2-stat-item:last-child { border-right: none; }
.v2-stat-icon { display: block; font-size: 20px; margin-bottom: 4px; opacity: 0.8; }
.v2-stat-num { display: block; font-size: 18px; font-weight: 800; color: var(--text); }
.v2-stat-label { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

/* 유의사항 & 보안배너 */
.v2-rules { padding: 20px 24px 0; display: grid; gap: 12px; }
.v2-rule-item {
  display: flex; gap: 10px; font-size: 14px; line-height: 1.5; color: var(--text);
}
.v2-rule-num {
  font-weight: 800; color: var(--primary); font-size: 14px; margin-top: 1px;
}
.v2-security-banner {
  margin: 16px 24px 0; padding: 12px 16px; border-radius: 10px; 
  background: var(--danger-bg); border: 1px solid rgba(194,65,12,0.2); color: var(--danger); font-size: 13.5px;
}

/* 시작버튼 */
.v2-start-wrap { padding: 24px; text-align: center; }
.v2-start-btn { width: 100%; max-width: 320px; min-height: 48px; font-size: 16px; border-radius: 10px; margin-bottom: 8px; }

/* ── 3. 시험 화면 ── */
.v2-exam-bar {
  position: sticky; top: 64px; z-index: 45; background: var(--panel); 
  border-bottom: 1px solid var(--line); box-shadow: 0 4px 12px rgba(15,23,42,0.03);
}
.v2-exam-bar-inner {
  max-width: var(--content-wide); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px;
}
.v2-exam-warn { font-size: 13px; color: var(--muted); }
.v2-exam-timer { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
.v2-exam-bar-right { display: flex; align-items: center; gap: 12px; }
.v2-exam-progress-text { font-size: 14px; font-weight: 700; color: var(--muted); }
.v2-submit-btn { border-radius: 8px !important; min-height: 34px !important; }
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
  50%       { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
}

.v2-exam-progress-track { height: 2px; background: var(--line); }
.v2-exam-progress-fill { height: 100%; background: var(--primary); transition: width 0.2s ease; }

.v2-exam-container { max-width: 720px; margin: 0 auto; padding-top: 16px; }

/* 문항 카드 */
.v2-question-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.2s;
}
.v2-question-card.v2-question-answered { border-color: var(--line); background: var(--panel-2); }

.v2-question-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
.v2-question-num { font-size: 14px; font-weight: 800; color: var(--primary); }
.v2-answered-badge { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--success); }
.v2-unanswered-badge { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--danger); }

.v2-question-text { font-size: 14px; font-weight: 600; line-height: 1.5; margin: 0 0 10px; color: var(--text); }

/* 선택지 */
.v2-option {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; margin-bottom: 5px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--panel); cursor: pointer; transition: 0.12s;
}
.v2-option:hover { border-color: #cbd5e1; background: var(--bg); }
.v2-option input { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
.v2-option-mark { display: none; } /* 알파벳/숫자 아이콘 제거, 심플하게 라디오버튼만 사용 */
.v2-option-text { font-size: 13px; line-height: 1.4; color: var(--text); padding-top: 1px; }

.v2-option.v2-option-selected { border-color: var(--primary); background: rgba(31,95,191,0.04); }

.v2-submit-bottom { padding: 12px 0 24px; text-align: right; }
.v2-submit-final-btn { width: 100%; max-width: 320px; min-height: 48px; font-size: 15px; font-weight: 800; border-radius: 10px; }

/* ── 4. 결과 화면 ── */
.v2-result-card {
  max-width: 500px; margin: 0 auto; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.03);
}
.v2-result-top { padding: 32px 24px; text-align: center; border-bottom: 1px solid var(--line); }
.v2-result-emoji { font-size: 40px; margin-bottom: 8px; }
.v2-result-label { font-size: 28px; font-weight: 800; margin: 0 0 4px; }
.v2-result-label.success { color: var(--success); }
.v2-result-label.danger { color: var(--danger); }
.v2-result-sub { font-size: 14px; color: var(--muted); margin: 0; }

.v2-score-gauge-wrap { padding: 24px 24px 0; text-align: center; }
.v2-score-num { font-size: 40px; font-weight: 900; line-height: 1; margin-bottom: 16px; }
.v2-score-num.success { color: var(--success); }
.v2-score-num.danger { color: var(--danger); }
.v2-score-unit { font-size: 18px; font-weight: 600; margin-left: 2px; }

.v2-score-gauge-track { height: 8px; background: var(--line); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
.v2-score-gauge-fill { height: 100%; transition: width 0.5s ease; border-radius: 4px; }
.v2-score-gauge-fill.success { background: var(--success); }
.v2-score-gauge-fill.danger { background: var(--danger); }
.v2-score-gauge-pass-line { display: none; }

.v2-result-stats { display: flex; border-top: 1px solid var(--line); background: var(--panel-2); }
.v2-result-stat { flex: 1; padding: 16px; text-align: center; border-right: 1px solid var(--line); }
.v2-result-stat:last-child { border-right: none; }
.v2-result-stat-val { display: block; font-size: 20px; font-weight: 800; margin-bottom: 2px; }
.v2-result-stat-key { display: block; font-size: 12px; color: var(--muted); font-weight: 600; }
.v2-result-date { text-align: center; font-size: 13px; color: var(--muted); padding: 16px; margin: 0; }

/* 모바일 조정 */
@media (max-width: 640px) {
  .v2-exam-bar { top: 51px; }
  .v2-stat-num { font-size: 16px; }
  .v2-stat-icon { font-size: 18px; }
  .v2-question-card { padding: 12px 13px; }
  .v2-option {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; margin-bottom: 5px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--panel); cursor: pointer; transition: 0.12s;
}
  .v2-submit-bottom { text-align: center; }
  .v2-submit-final-btn { max-width: 100%; }
}

/* ── 카운트다운 도트 ── */
.countdown-dots-wrap {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin: 14px 0 4px;
}
.countdown-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary);
  opacity: 0.18;
  transition: opacity 0.3s ease;
}
.countdown-dot.active { opacity: 1; }
.countdown-dot-label {
  text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 16px;
}

/* 제출 버튼 disabled 상태 */
.v2-submit-final-btn:disabled,
.v2-submit-btn:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important;
}
.v2-submit-final-btn:disabled::after {

.v2-option-no { width: 20px; flex: none; color: var(--primary); font-size: 13px; font-weight: 800; line-height: 1.4; text-align: center; }

.v2-stat-row.three .v2-stat-item { width: 33.333%; }

.v2-rules.paper-tone { padding-top: 18px; }
.v2-rules.paper-tone .v2-rule-item { color: #334155; }

  margin-top: 14px;

.ready-card-header {

  font-weight: 800;

  color: var(--muted);

  display: flex;
  border-bottom: 1px solid var(--line);
}
.exam-info-item {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  border-right: 1px solid var(--line);
}
.exam-info-item:last-child { border-right: none; }
.exam-info-label {

  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;

}
.exam-info-val {
  display: block;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}
.exam-info-val em {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  font-style: normal;
  margin-left: 2px;
}

/* 유의사항 번호 목록 */
.ready-rules {
  list-style: none;
  padding: 8px 16px 8px;
  margin: 0;
  display: grid;
  gap: 0;
  counter-reset: rule;
}
.ready-rules li {
  counter-increment: rule;
  display: grid;
  grid-template-columns: 18px 1fr;
  gap: 6px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--text);
  padding: 5px 0;
  border-bottom: 1px solid var(--line);
}
.ready-rules li:last-child { border-bottom: none; }
.ready-rules li::before {
  content: counter(rule);
  font-size: 11px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1.5;
  text-align: center;
}
[data-theme="dark"] .rule-warn {
  color: #fca5a5;
  background: rgba(185,28,28,.18);
  border-color: #ef4444;
}
.ready-rules li.rule-warn::before { display: none; }

/* ── 하단 고정 액션 영역 ── */
.ready-footer {
  flex-shrink: 0;
  padding: 8px 0 12px;
  border-top: 1px solid var(--line);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* 동의 체크박스 */
.ready-agree {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  cursor: pointer;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--bg);
  transition: border-color 0.15s;
}
.ready-agree:hover { border-color: var(--primary); }
.ready-agree input[type="checkbox"] {
  position: absolute; opacity: 0; width: 0; height: 0;
}
.ready-agree-box {
  width: 18px; height: 18px; flex-shrink: 0;
  border: 2px solid var(--line);
  border-radius: 5px;
  margin-top: 1px;
  display: grid; place-items: center;
  transition: 0.15s;
  background: var(--panel);
}
.ready-agree input:checked ~ .ready-agree-box {
  background: var(--primary);
  border-color: var(--primary);
}
.ready-agree input:checked ~ .ready-agree-box::after {
  content: '';
  display: block;
  width: 5px;
  height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translate(-1px, -1px);
}
.ready-agree-text {
  font-size: 12px;
  line-height: 1.4;
  color: var(--text);
}



/* 시작 버튼 */
.ready-start-btn {
  width: 100%; min-height: 44px;
  border-radius: 10px; font-size: 15px; font-weight: 800;
  transition: 0.15s;
}
.ready-start-btn:disabled {
  opacity: 0.45; cursor: not-allowed; transform: none !important;
}

/* 모바일 보정 */
@media (max-width: 640px) {
  .ready-layout { height: calc(100vh - 51px); padding: 0 12px; }
  .ready-card-header { padding: 14px 16px 12px; }
  .ready-rules { padding: 12px 16px 12px; }
  .ready-rules li.rule-warn {
  color: var(--text);
  background: none;
  margin: 0;
  padding: 5px 0;
}
  .exam-info-val { font-size: 18px; }
}

/* 로그인 카드 배너 (로고 + 제목) */
.login-wrap {
  min-height: 100vh;

  align-items: center;
  justify-content: center;

.login-card-banner {

  align-items: center;

}
.login-banner-logo {

}
.login-title {
  margin: 0;

  letter-spacing: -0.02em;

}
.login-card-body {
  padding: 24px 28px 28px;

/* ── 카운트다운 게이지 막대 ── */
.ready-gauge-wrap {
  display: flex;

  gap: 4px;
}
.ready-gauge-track {
  height: 5px;

  overflow: hidden;
}
.ready-gauge-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 99px;

}

/* 모바일 보정 */
@media (max-width: 640px) {

  .ready-card-header { padding: 8px 12px 6px; }

.v2-score-gauge-outer {

/* 제출 버퍼 오버레이 */
.submit-buffer-backdrop { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 24px; background: rgba(15,23,42,.42); backdrop-filter: blur(8px); }
.submit-buffer-card { width: min(420px, 100%); border-radius: 24px; background: #fff; box-shadow: 0 24px 80px rgba(15,23,42,.24); border: 1px solid rgba(226,232,240,.9); padding: 28px; text-align: center; animation: bufferPop .18s ease-out; }
.submit-buffer-spinner { width: 52px; height: 52px; margin: 2px auto 18px; border-radius: 999px; border: 5px solid #e0ecff; border-top-color: #2563eb; animation: bufferSpin .9s linear infinite; }
.submit-buffer-title { margin: 0 0 6px; font-size: 24px; line-height: 1.25; font-weight: 900; letter-spacing: -.03em; color: #0f172a; }
.submit-buffer-sub { margin: 0 0 18px; color: #64748b; font-size: 14px; font-weight: 700; }
.submit-buffer-status { border-radius: 14px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; color: #334155; font-size: 13px; font-weight: 800; line-height: 1.45; }
.submit-buffer-progress { overflow: hidden; height: 6px; margin-top: 16px; border-radius: 999px; background: #e2e8f0; }
.submit-buffer-progress span { display: block; width: 36%; height: 100%; border-radius: 999px; background: #2563eb; animation: bufferBar 1.2s ease-in-out infinite; }
.submit-buffer-error { margin-top: 14px; border-radius: 14px; border: 1px solid #fecaca; background: #fef2f2; color: #b91c1c; padding: 12px; font-size: 13px; line-height: 1.45; text-align: left; font-weight: 700; }
.submit-buffer-actions { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
@keyframes bufferSpin { to { transform: rotate(360deg); } }
@keyframes bufferBar { 0% { transform: translateX(-110%); } 50% { transform: translateX(90%); } 100% { transform: translateX(250%); } }
@keyframes bufferPop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
.result-profile-chips { position: sticky; top: 0; z-index: 5; margin-bottom: 14px; padding: 0; background: transparent; backdrop-filter: none; }
.result-profile-chips .v2-chip { background: var(--panel-2); }
.result-meta-grid { display:none !important; }
.result-compact-only .v2-result-date { display:none !important; }

.result-compact-only .v2-result-stats { display:flex !important; border-top:1px solid var(--line); background:#fff; }
.admin-result-table { min-width: 1040px; table-layout: fixed; }
.admin-result-table th:nth-child(4), .admin-result-table td:nth-child(4) { width: 170px; }
.admin-result-table th:nth-child(5), .admin-result-table td:nth-child(5) { width: 120px; }
.admin-result-table th:nth-child(7), .admin-result-table td:nth-child(7) { width: 92px; text-align:center; }
.admin-result-table th:nth-child(8), .admin-result-table td:nth-child(8) { width: 104px; text-align:center; }
.pass-circle {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:54px; height:30px; padding:0 10px; border-radius:999px;
  font-size:12px; font-weight:950; line-height:1; white-space:nowrap;
  letter-spacing:-.02em; border:1px solid transparent;
}
.pass-circle.pass { background:#16a34a; color:#fff; border-color:#15803d; }
.pass-circle.fail { background:#ef4444; color:#fff; border-color:#dc2626; }
.pass-circle.disq { background:#f59e0b; color:#fff; border-color:#d97706; }
.admin-recent-list { display:grid; gap:10px; }
.admin-recent-row {
  display:grid; grid-template-columns:minmax(160px, 1.35fr) minmax(90px, .8fr) 78px 72px;
  align-items:center; gap:12px; padding:10px 12px;
  border:1px solid var(--line); border-radius:14px; background:var(--panel-2);
  font-size:13px; line-height:1.35;
}
.admin-recent-row .recent-dept { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#475569; font-weight:800; }
.admin-recent-row .recent-name { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#0f172a; font-weight:950; }
.admin-recent-row .recent-score { text-align:center; font-weight:950; color:#1e293b; }
.admin-recent-row .recent-pass { text-align:center; }
.admin-table-fixed th, .admin-table-fixed td { font-size:13px; font-weight:800; vertical-align:middle; }
.admin-table-fixed th { font-weight:950; color:#334155; }
.admin-table-fixed td.fixed-dept, .admin-table-fixed td.fixed-name { font-weight:850; color:#0f172a; }
.admin-table-fixed td.fixed-score { text-align:center; font-weight:950; color:#0f172a; }
.admin-table-fixed td.fixed-pass { text-align:center; }
.admin-result-table td, .admin-result-table th { font-size:13px; font-weight:800; vertical-align:middle; }
.admin-result-table th { font-weight:950; color:#334155; }
.admin-result-table td.fixed-dept, .admin-result-table td.fixed-name { font-weight:850; color:#0f172a; }
.admin-result-table td.fixed-score, .admin-result-table td.fixed-pass { text-align:center; }
@media (max-width: 720px) { .admin-recent-row { grid-template-columns:1fr 80px; } .admin-recent-row .recent-pass { text-align:left; } }

/* 저장 상태: 제출 버퍼와 톤을 맞춘 통신 상태 인디케이터 */
.v2-sync-status{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  min-height:30px;min-width:34px;padding:4px 9px;border-radius:999px;
  background:#fff;border:1px solid #dbeafe;box-shadow:0 8px 20px rgba(37,99,235,.10);
  color:#334155;font-size:11px;font-weight:900;line-height:1;white-space:nowrap;
}
.v2-sync-status::before{
  content:"";width:18px;height:18px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
  box-sizing:border-box;flex:none;
}
.v2-sync-status.v2-sync-saving{border-color:#bfdbfe;background:#eff6ff;box-shadow:0 8px 22px rgba(37,99,235,.16)}
.v2-sync-status.v2-sync-saving::before{border:3px solid #dbeafe;border-top-color:#2563eb;animation:syncSpin .75s linear infinite;background:#fff}
.v2-sync-status.v2-sync-ok{border-color:#bbf7d0;background:#f0fdf4;box-shadow:0 8px 20px rgba(22,163,74,.12)}
.v2-sync-status.v2-sync-ok::before{content:"✓";border:2px solid #22c55e;background:#fff;color:#16a34a;font-size:12px;font-weight:1000;line-height:1}
.v2-sync-status.v2-sync-error{border-color:#fecaca;background:#fef2f2;color:#b91c1c;box-shadow:0 8px 20px rgba(220,38,38,.12)}
.v2-sync-status.v2-sync-error::before{content:"!";border:2px solid #ef4444;background:#fff;color:#dc2626;font-size:12px;font-weight:1000;line-height:1}
@keyframes syncSpin{to{transform:rotate(360deg)}}


/* ════════════════════════════════════════
   UI POLISH SYSTEM — 2026 business-grade design refresh
   - 색상/카드/버튼/표/시험 화면/관리자 화면 통일
   ════════════════════════════════════════ */
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-soft: #eff6ff;
  --primary-line: #bfdbfe;
  --success: #16a34a;
  --success-dark: #15803d;
  --success-soft: #f0fdf4;
  --success-line: #bbf7d0;
  --danger: #dc2626;
  --danger-dark: #b91c1c;
  --danger-soft: #fef2f2;
  --danger-line: #fecaca;
  --warning: #d97706;
  --warning-soft: #fffbeb;
  --warning-line: #fed7aa;
  --bg: #f4f7fb;
  --panel: #ffffff;
  --panel-2: #f8fafc;
  --line: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --shadow-card: 0 8px 24px rgba(15, 23, 42, .055);
  --shadow-emphasis: 0 18px 50px rgba(15, 23, 42, .10);
  --shadow-overlay: 0 24px 80px rgba(15, 23, 42, .22);
  --focus: 0 0 0 4px rgba(37, 99, 235, .16);
}

body {
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, .08), transparent 34%),
    var(--bg);
  color: var(--text);
}

/* topbar / brand */
.topbar {
  background: rgba(255, 255, 255, .94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 6px 18px rgba(15, 23, 42, .035);
}
.brand h1 { color: var(--text); letter-spacing: -.025em; }
.brand-logo { filter: saturate(1.02); }

/* 카드 계층 통일 */
.card,
.metric,
.ready-card,
.v2-question-card,
.table-wrap {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
}
.login-card.v2,
.v2-result-card,
.v2-ready-card,
.exam-ready-card {
  background: var(--panel);
  border: 1px solid rgba(37, 99, 235, .12);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-emphasis);
  overflow: hidden;
}
.modal,
.submit-buffer-card {
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-overlay);
  border: 1px solid var(--line);
}
.card { padding: 20px; }
.section-head h2,
.section-head h3 { letter-spacing: -.03em; color: var(--text); }
.section-head p { color: var(--muted); }

/* 버튼 통일 */
.btn {
  border-radius: var(--radius-md);
  min-height: 40px;
  padding: 9px 14px;
  font-weight: 850;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  box-shadow: none;
  transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease, background .14s ease;
}
.btn:hover {
  transform: translateY(-1px);
  border-color: var(--primary-line);
  box-shadow: 0 8px 18px rgba(15, 23, 42, .07);
}
.btn.primary {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 10px 24px rgba(37, 99, 235, .18);
}
.btn.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
.btn.danger {
  background: var(--danger-soft);
  border-color: var(--danger-line);
  color: var(--danger);
}
.btn.success {
  background: var(--success-soft);
  border-color: var(--success-line);
  color: var(--success);
}
.btn.small { min-height: 32px; border-radius: 10px; padding: 6px 10px; }

/* 로그인 화면 브랜드감 */
.login-wrap {
  background:
    radial-gradient(circle at 12% 5%, rgba(37, 99, 235, .16), transparent 32%),
    radial-gradient(circle at 88% 18%, rgba(22, 163, 74, .08), transparent 26%),
    linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
}
.login-card-banner {
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  border-bottom: 1px solid var(--line);
}
.login-title { color: var(--text); letter-spacing: -.03em; }
.login-form input,
.login-form select,
input, select, textarea {
  border-color: var(--line);
  border-radius: var(--radius-md);
}
.login-form input:focus,
.login-form select:focus,
input:focus,
select:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: var(--focus);
  background: #fff;
}

/* 시험 상단바 컨트롤 센터 */
.v2-exam-bar,
.exam-sticky-bar {
  background: rgba(255, 255, 255, .94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
}
.v2-exam-bar-inner {
  min-height: 54px;
  gap: 14px;
}
.v2-exam-warn,
.v2-exam-progress-text,
.exam-stat {
  color: var(--muted);
  font-weight: 800;
}
.v2-exam-timer {
  font-variant-numeric: tabular-nums;
  font-size: 21px;
  font-weight: 950;
  color: var(--text);
  letter-spacing: -.02em;
}
.v2-exam-progress-track { height: 3px; background: var(--line); }
.v2-exam-progress-fill { background: var(--primary); }
.v2-submit-btn,
.v2-submit-final-btn { border-radius: 12px !important; }

/* 저장 상태 pill — 제출 버퍼 스피너와 톤 통일 */
.v2-sync-status {
  min-height: 30px;
  padding: 0 10px;
  gap: 7px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: -.01em;
  box-shadow: none;
  vertical-align: middle;
}
.v2-sync-status::before {
  content: "";
  width: 17px;
  height: 17px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  flex: none;
}
.v2-sync-status.v2-sync-saving {
  background: var(--primary-soft);
  border: 1px solid var(--primary-line);
  color: var(--primary-dark);
}
.v2-sync-status.v2-sync-saving::before {
  border: 3px solid #dbeafe;
  border-top-color: var(--primary);
  background: #fff;
  animation: syncSpin .76s linear infinite;
}
.v2-sync-status.v2-sync-ok {
  background: var(--success-soft);
  border: 1px solid var(--success-line);
  color: var(--success-dark);
}
.v2-sync-status.v2-sync-ok::before {
  content: "✓";
  border: 2px solid #22c55e;
  background: #fff;
  color: var(--success);
  font-size: 12px;
  font-weight: 1000;
  line-height: 1;
}
.v2-sync-status.v2-sync-error {
  background: var(--danger-soft);
  border: 1px solid var(--danger-line);
  color: var(--danger-dark);
}
.v2-sync-status.v2-sync-error::before {
  content: "!";
  border: 2px solid #ef4444;
  background: #fff;
  color: var(--danger);
  font-size: 12px;
  font-weight: 1000;
  line-height: 1;
}

/* 문제 카드 / 선택지 */
.v2-exam-container { max-width: 760px; }
.v2-question-card {
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 12px;
  transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
}
.v2-question-card.v2-question-answered {
  border-color: #dbeafe;
  background: #fbfdff;
}
.v2-question-text {
  font-size: 15px;
  font-weight: 750;
  line-height: 1.6;
  color: var(--text);
}
.v2-option {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: var(--radius-md);
  padding: 10px 12px;
  margin-bottom: 7px;
  transition: border-color .14s ease, background .14s ease, box-shadow .14s ease, transform .14s ease;
}
.v2-option:hover {
  background: var(--panel-2);
  border-color: #cbd5e1;
  transform: translateY(-1px);
}

"use strict";

// 순수 유틸리티 함수 모음 – 어떤 모듈에서도 참조 가능

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// 줄바꿈 문자를 <br> 태그로 변환하여 표시용으로 사용
function formatText(value) {
  return escapeHtml(value).replaceAll("\n", "<br>");
}

function normalizeText(value) {
  return String(value ?? "").replace(/\s+/g, "").toLowerCase();
}

function keywordMatch(target, keyword) {
  const t = normalizeText(target);
  const k = normalizeText(keyword);
  return !k || t.includes(k);
}

function sortByText(arr, keyFn) {
  return [...arr].sort((a, b) => String(keyFn(a) ?? "").localeCompare(String(keyFn(b) ?? ""), "ko"));
}

function sortByDateDesc(arr, keyFn) {
  return [...arr].sort((a, b) => new Date(keyFn(b) || 0) - new Date(keyFn(a) || 0));
}


function formatDateTime(iso) {
  if (!iso) return "-";
  return new Intl.DateTimeFormat("ko-KR", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  }).format(new Date(iso));
}

function daysAgo(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString();
}

function getCurrentQuarter(date = new Date()) {
  const year = date.getFullYear();
  const quarter = Math.floor(date.getMonth() / 3) + 1;
  return `${year}-Q${quarter}`;
}

function previousQuarter() {
  const now = new Date();
  const q = Math.floor(now.getMonth() / 3) + 1;
  return q === 1 ? `${now.getFullYear() - 1}-Q4` : `${now.getFullYear()}-Q${q - 1}`;
}

// 시드 기반 유사 난수 생성기 (mulberry32)
function _seededRng(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// examSeed: 시험 시작 시 설정 (startExam에서 세팅)
let _examSeed = 0;
let _examRng = null;

function _strHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return h >>> 0;
}

function shuffleArray(array) {
  const copied = [...array];
  const rng = _examRng || (_examSeed ? _seededRng(_examSeed) : Math.random.bind(Math));
  for (let i = copied.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [copied[i], copied[j]] = [copied[j], copied[i]];
  }
  return copied;
}

function nextId(array, key) {
  return array.length ? Math.max(...array.map(item => Number(item[key]) || 0)) + 1 : 1;
}

function makeResultId(employeeId, quarter) {
  const raw = String(employeeId || "") + "__" + String(quarter || "");
  const hash = _strHash(raw).toString(16).toUpperCase().padStart(8, "0");
  return "R-" + hash;
}

function makeLogId() {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  return "log_" + Date.now() + "_" + Math.random().toString(16).slice(2);
}

function normalizeManagedAffiliations(list) {
  return (Array.isArray(list) ? list : [])

      ? { name: a, type: "이루자" }
      : { name: a?.name || "", type: a?.type || "이루자" }
    )
    .filter((a) => a.name);
}

function optionHtml(value, selected, label = value) {
  return `<option value="${escapeHtml(value)}" ${String(value) === String(selected) ? "selected" : ""}>${escapeHtml(label)}</option>`;
}

// data.js 의 데이터에 의존하는 도우미 함수

// categoryQuota에서 실제 문제은행에 존재하지 않는 카테고리 항목 자동 제거
function cleanOrphanQuota() {
  const existingCategories = [...new Set(questionBank.map(q => q.category))];
  const cleaned = {};
  Object.entries(examSettings.categoryQuota || {}).forEach(([cat, count]) => {
    if (existingCategories.includes(cat)) {
      cleaned[cat] = count;
    }
    // 문제은행에 없는 카테고리는 자동 제거
  });
  examSettings.categoryQuota = cleaned;
}

function getQuotaWarnings() {
  return Object.entries(examSettings.categoryQuota)
    .filter(([category, count]) => {
      if (category === "테스트") return false; // 테스트 카테고리 제외
      const available = questionBank.filter(q => q.active && q.category === category).length;
      return available < Number(count);
    })
    .map(([category, count]) => {
      const available = questionBank.filter(q => q.active && q.category === category).length;
      return `[${category}] 출제 ${count}문항 설정 / 등록 ${available}문항 — ${Number(count) - available}문항 부족`;
    });
}

function getActiveExamKey(employeeId, quarter = getCurrentQuarter()) {
  return `${employeeId}__${quarter}`;
}

function getActiveExamRecord(employeeId, quarter = getCurrentQuarter()) {
  const key = getActiveExamKey(employeeId, quarter);
  return activeExams.find(item => item.key === key && item.status !== "submitted" && item.status !== "completed" && item.status !== "done");
}

function normalizeActiveExamRecord(row) {
  if (!row) return null;
  const snap = row.snapshot ? JSON.parse(JSON.stringify(row.snapshot)) : JSON.parse(JSON.stringify(row));
  const key = row.key || snap.key || getActiveExamKey(row.employee_id || snap.employeeId, row.quarter || snap.quarter || getCurrentQuarter());
  const employeeId = snap.employeeId || row.employee_id || key.split("__")[0] || "";
  const quarter = snap.quarter || row.quarter || key.split("__")[1] || getCurrentQuarter();

  if (!snap.exam && Array.isArray(snap.questionSet)) {
    const questions = snap.questionSet.map((q) => {
      const source = questionBank.find((item) => String(item.id) === String(q.id || q.questionId));
      const baseOptions = Array.isArray(source?.options) ? source.options : [];
      const order = Array.isArray(q.optionOrder) ? q.optionOrder : baseOptions.map((_, idx) => idx + 1);
      const options = order.map((n) => baseOptions[Number(n) - 1] || "").filter((v) => v !== "");
      const correctOriginal = Number(source?.answerIndex ?? q.answerIndex ?? q.correctAnswerIndex ?? 0);
      const correctDisplayIndex = Math.max(0, order.findIndex((n) => Number(n) === correctOriginal));
      return {
        questionId: q.id || q.questionId,
        category: q.category || source?.category || "",
        text: q.text || source?.text || "",
        options,
        correctDisplayIndex
      };
    });
    const answers = Array(questions.length).fill(null);
    const answerMap = snap.answers || {};
    questions.forEach((q, idx) => {
      const saved = answerMap[String(q.questionId)] ?? (Array.isArray(answerMap) ? answerMap[idx] : undefined);
      if (saved === undefined || saved === null) return;
      if (typeof saved === "number") answers[idx] = saved;
      else if (typeof saved.selectedDisplayIndex === "number") answers[idx] = saved.selectedDisplayIndex;
      else if (saved.selectedOriginalOption != null && Array.isArray(snap.questionSet?.[idx]?.optionOrder)) {
        const displayIdx = snap.questionSet[idx].optionOrder.findIndex((n) => Number(n) === Number(saved.selectedOriginalOption));
        if (displayIdx >= 0) answers[idx] = displayIdx;
      }
    });
    snap.exam = {
      employeeId,
      quarter,
      startedAt: snap.examStartedAt || snap.startedAt || row.updated_at || new Date().toISOString(),
      questions,
      answers,
      currentQuestionIndex: Number(snap.currentQuestionIndex || 0),
      tabSwitchCount: Number(snap.tabSwitchCount || 0),
      warningLogs: snap.warningLogs || [],
      disqualified: Boolean(snap.disqualified),
      disqualificationReason: snap.disqualificationReason || "",
      lastViolationAt: 0
    };
  }

  if (snap.exam) {
    snap.exam.employeeId = snap.exam.employeeId || employeeId;
    snap.exam.quarter = snap.exam.quarter || quarter;
    if (!Array.isArray(snap.exam.answers) && snap.answers && Array.isArray(snap.exam.questions)) {
      const answers = Array(snap.exam.questions.length).fill(null);
      snap.exam.questions.forEach((q, idx) => {
        const saved = snap.answers[String(q.questionId)] ?? (Array.isArray(snap.answers) ? snap.answers[idx] : undefined);
        if (typeof saved === "number") answers[idx] = saved;
        else if (saved && typeof saved.selectedDisplayIndex === "number") answers[idx] = saved.selectedDisplayIndex;
      });
      snap.exam.answers = answers;
    }
    snap.exam.currentQuestionIndex = Number(snap.currentQuestionIndex ?? snap.exam.currentQuestionIndex ?? 0);
  }

  return {
    key,
    employeeId,
    quarter,
    status: snap.status || "in_progress",
    updatedAt: snap.updatedAt || row.updated_at || new Date().toISOString(),
    remainingSeconds: Number(snap.remainingSeconds ?? examSettings.timeLimitMinutes * 60),
    currentQuestionIndex: Number(snap.currentQuestionIndex ?? snap.exam?.currentQuestionIndex ?? 0),
    exam: snap.exam || null,
    ...snap
  };
}

function restoreActiveExamRecord(record) {
  const activeRecord = normalizeActiveExamRecord(record);
  if (!activeRecord?.exam) return false;
  state.currentExam = activeRecord.exam;
  const savedRemaining = Number(activeRecord.remainingSeconds || examSettings.timeLimitMinutes * 60);
  const savedAt = activeRecord.updatedAt ? new Date(activeRecord.updatedAt).getTime() : Date.now();
  const elapsedSecs = Math.max(0, Math.floor((Date.now() - savedAt) / 1000));
  state.remainingSeconds = Math.max(1, savedRemaining - elapsedSecs);
  state.currentQuestionIndex = Number(activeRecord.currentQuestionIndex ?? activeRecord.exam?.currentQuestionIndex ?? 0);
  state.currentExam.currentQuestionIndex = state.currentQuestionIndex;
  state.lastResult = null;
  state.isSubmitting = false;
  state.examIntroReady = true;
  state.examGuardActive = false;

  removePreExamGuards();

}

async function fetchActiveExamRecordFromServer(employeeId, quarter = getCurrentQuarter()) {
  if (!_sb || !employeeId) return null;
  const key = getActiveExamKey(employeeId, quarter);
  const { data, error } = await _sb.from("active_exams").select("*").eq("key", key).maybeSingle();
  if (error) throw error;
  const record = normalizeActiveExamRecord(data);
  if (record) {
    const idx = activeExams.findIndex((item) => item.key === record.key);
    if (idx >= 0) activeExams[idx] = record;
    else activeExams.push(record);
  }
  return record;
}

function upsertActiveExamRecord(exam, extra = {}) {
  if (!exam) return;
  const key = getActiveExamKey(exam.employeeId, exam.quarter);
  const record = {
    key,
    employeeId: exam.employeeId,
    quarter: exam.quarter,
    status: "in_progress",
    updatedAt: new Date().toISOString(),
    remainingSeconds: state.remainingSeconds,
    currentQuestionIndex: state.currentQuestionIndex || 0,
    exam: JSON.parse(JSON.stringify(exam)),
    ...extra
  };
  const index = activeExams.findIndex(item => item.key === key);
  if (index >= 0) activeExams[index] = { ...activeExams[index], ...record };
  else activeExams.push(record);
  return record;
}

function clearActiveExamRecord(employeeId, quarter = getCurrentQuarter()) {
  const key = getActiveExamKey(employeeId, quarter);
  activeExams = activeExams.filter(item => item.key !== key);
}

function buildQuestionStatsFromRows(rows = []) {
  const map = {};
  (rows || []).forEach((row) => {
    const qid = row.question_id ?? row.questionId;
    if (qid === null || qid === undefined || qid === "") return;
    const key = String(qid);
    if (!map[key]) {
      map[key] = { questionId: key, attempts: 0, correct: 0, wrong: 0, unanswered: 0, lastUsedAt: "", quarters: new Set() };
    }
    const stat = map[key];
    stat.attempts += 1;
    if (row.unanswered) stat.unanswered += 1;
    if (row.is_correct === true || row.correct === true) stat.correct += 1;
    else stat.wrong += 1;
    const at = row.submitted_at || row.createdAt || row.submittedAt || "";
    if (at && (!stat.lastUsedAt || new Date(at) > new Date(stat.lastUsedAt))) stat.lastUsedAt = at;
    const q = row.quarter || "";
    if (q) stat.quarters.add(q);
  });
  Object.values(map).forEach((stat) => {
    stat.accuracy = stat.attempts > 0 ? Math.round((stat.correct / stat.attempts) * 100) : null;
    stat.quarterCount = stat.quarters.size;
    delete stat.quarters;
  });
  return map;
}

function buildQuestionStatsFromActivityLogs() {
  const rows = [];
  (activityLogs || []).forEach((log) => {
    if (!Array.isArray(log.answerReview)) return;
    log.answerReview.forEach((item) => rows.push({
      question_id: item.questionId,
      is_correct: !!item.correct,
      unanswered: !!item.unanswered,
      quarter: log.quarter || "",
      submitted_at: log.createdAt || ""
    }));
  });
  return buildQuestionStatsFromRows(rows);
}

    .catch((err) => {
      console.warn("문항 통계 조회 실패", err);
      questionStats = buildQuestionStatsFromActivityLogs();
      questionStatsLoaded = true;
      questionStatsLoading = false;
      if (state.view === "admin" && state.adminSection === "questions") renderAdminDashboard();
    });
}

function getQuestionStats(questionId) {
  if (questionId === null || questionId === undefined) return null;
  return questionStats[String(questionId)] || null;
}

function renderQuestionAccuracyCell(questionId) {
  const stat = getQuestionStats(questionId);
  if (!questionStatsLoaded && questionStatsLoading) {
    return `<div class="qb-stat-cell"><span class="qb-stat-pill empty">계산중</span><div class="qb-stat-meta">통계 로드</div></div>`;
  }
  if (!stat || !stat.attempts) {
    return `<div class="qb-stat-cell"><span class="qb-stat-pill empty">-</span><div class="qb-stat-meta">출제 0회</div></div>`;
  }
  const cls = stat.attempts < 10 ? "empty" : (stat.accuracy >= 80 ? "good" : (stat.accuracy >= 40 ? "mid" : "low"));
  const hint = stat.attempts < 10 ? "표본부족" : (stat.accuracy >= 80 ? "쉬움" : (stat.accuracy >= 40 ? "보통" : "검토"));
  return `<div class="qb-stat-cell" title="출제 ${stat.attempts}회, 정답 ${stat.correct}회, 오답/미응답 ${stat.wrong}회"><span class="qb-stat-pill ${cls}">${stat.accuracy}%</span><div class="qb-stat-meta">${hint} · ${stat.attempts}회</div></div>`;
}

function buildSubmissionAnswerRows(result, log) {
  const review = Array.isArray(log?.answerReview) ? log.answerReview : [];
  const submittedAt = result?.submittedAt || log?.createdAt || new Date().toISOString();
  return review.map((item, idx) => ({
    result_id: result.resultId,
    employee_id: result.employeeId,
    department: result.department || log?.department || "",
    name: result.name || log?.name || "",
    quarter: result.quarter || log?.quarter || "",
    question_id: item.questionId == null ? null : String(item.questionId),
    category: item.category || "",
    display_order: Number(item.no || idx + 1),
    question_text_snapshot: item.text || "",
    options_snapshot: Array.isArray(item.options) ? item.options : [],
    option_original_indexes: Array.isArray(item.optionOriginalIndexes) ? item.optionOriginalIndexes : [],
    selected_display_index: Number.isInteger(item.selectedDisplayIndex) ? item.selectedDisplayIndex : null,
    selected_original_option: item.selectedOriginalOption == null ? null : Number(item.selectedOriginalOption),
    selected_text: item.selectedText || "",
    correct_display_index: Number.isInteger(item.correctDisplayIndex) ? item.correctDisplayIndex : null,
    correct_original_option: item.correctOriginalOption == null ? null : Number(item.correctOriginalOption),
    correct_text: item.correctText || "",
    is_correct: !!item.correct,
    unanswered: !!item.unanswered,
    submitted_at: submittedAt
  })).filter((row) => row.result_id && row.employee_id && row.quarter && row.question_id !== null);
}

async function _sbUpsertSubmissionAnswers(result, log) {
  const rows = buildSubmissionAnswerRows(result, log);
  if (!_sb || !rows.length) return { ok: true, inserted: 0 };
  try {
    const { error } = await _sb
      .from("exam_submission_answers")
      .upsert(rows, { onConflict: "result_id,question_id,display_order" });
    if (error) throw error;
    questionStatsLoaded = false;
    return { ok: true, inserted: rows.length };
  } catch (err) {
    console.warn("제출 상세 답안 저장 실패: exam_submission_answers 테이블/RLS/제약을 확인하세요.", err);
    return { ok: false, inserted: 0, message: err.message || String(err) };
  }
}

async function fetchSubmissionAnswersFromDb(employeeId, result) {
  if (!_sb || !employeeId || !result) return null;
  try {
    let query = _sb
      .from("exam_submission_answers")
      .select("*")
      .eq("employee_id", employeeId)
      .eq("quarter", result.quarter)
      .order("display_order", { ascending: true });
    if (result.resultId) query = query.eq("result_id", result.resultId);
    const { data, error } = await query;
    if (error) throw error;
    if (!data || !data.length) return null;
    return {
      logId: "answer-table-" + (result.resultId || employeeId),
      employeeId,
      type: "SUBMISSION_ANSWERS",
      quarter: result.quarter,
      createdAt: result.submittedAt,
      answerReview: data.map((row) => ({
        no: row.display_order,
        questionId: row.question_id,
        category: row.category || "",
        text: row.question_text_snapshot || "",
        options: Array.isArray(row.options_snapshot) ? row.options_snapshot : [],
        optionOriginalIndexes: Array.isArray(row.option_original_indexes) ? row.option_original_indexes : [],
        selectedDisplayIndex: row.selected_display_index,
        selectedOriginalOption: row.selected_original_option,
        selectedText: row.selected_text || "",
        correctDisplayIndex: row.correct_display_index,
        correctOriginalOption: row.correct_original_option,
        correctText: row.correct_text || "",
        correct: !!row.is_correct,
        unanswered: !!row.unanswered
      }))
    };
  } catch (err) {
    console.warn("제출 상세 답안 테이블 조회 실패", err);
    return null;
  }
}

async function _sbFetchResultsPage({ page = 0, pageSize = 50 } = {}) {
  if (!_sb) throw new Error("Supabase 클라이언트를 사용할 수 없습니다.");
  const start = page * pageSize;
  const end = start + pageSize - 1;
  let query = _sb.from("exam_results").select("*", { count: "exact" });

  if (state.filters.resultDepartment && state.filters.resultDepartment !== "전체") {
    query = query.eq("department", state.filters.resultDepartment);
  }
  if (state.filters.resultQuarter && state.filters.resultQuarter !== "전체") {
    query = query.eq("quarter", state.filters.resultQuarter);
  }
  if (state.filters.resultDisqualified === "실격") {
    query = query.eq("disqualified", true);
  } else if (state.filters.resultDisqualified === "정상") {
    query = query.eq("disqualified", false);
  }

  if (state.filters.resultSort === "scoreDesc") {
    query = query.order("percentage_score", { ascending: false }).order("submitted_at", { ascending: false });
  } else if (state.filters.resultSort === "scoreAsc") {
    query = query.order("percentage_score", { ascending: true }).order("submitted_at", { ascending: false });
  } else {
    query = query.order("submitted_at", { ascending: false });
  }

  const { data, error, count } = await query.range(start, end);
  if (error) throw error;
  return { rows: (data || []).map(_fromExamResultRow), total: count || 0 };
}

async function _sbSaveAppData(snapshot) {
  try {
    if (Array.isArray(snapshot.users) && snapshot.users.length) {
      const { error } = await _sb.from("users").upsert(
        snapshot.users.map((u) => ({
          employee_id: u.employeeId,
          department: u.department || "",
          name: u.name || "",
          phone: "",
          role: u.role || "candidate"
        })),
        { onConflict: "employee_id" }
      );
      if (error) throw error;
    }

    if (Array.isArray(snapshot.questionBank) && snapshot.questionBank.length) {
      const rows = snapshot.questionBank.map((q) => ({
        id: q.id ?? null,
        category: q.category || "",
        text: q.text || "",
        option_1: (q.options || [])[0] || "",
        option_2: (q.options || [])[1] || "",
        option_3: (q.options || [])[2] || "",
        option_4: (q.options || [])[3] || "",
        option_5: (q.options || [])[4] || "",
        answer_index: q.answerIndex ?? 0,
        active: q.active !== false
      }));

      const existing = rows.filter((r) => r.id !== null && r.id !== undefined && r.id !== "");
      const fresh = rows.filter((r) => r.id === null || r.id === undefined || r.id === "");

      if (existing.length) {
        const { error } = await _sb.from("question_bank").upsert(existing, { onConflict: "id" });
        if (error) throw error;
      }

      if (fresh.length) {
        const insertRows = fresh.map(({ id, ...rest }) => rest);
        const { error } = await _sb.from("question_bank").insert(insertRows);
        if (error) throw error;
      }
    }

    if (snapshot.examSettings) {
      const s = snapshot.examSettings;
      const { error } = await _sb.from("exam_settings").upsert(
        {
          id: 1,
          total_questions: s.totalQuestions,
          time_limit_minutes: s.timeLimitMinutes,
          passing_score: s.passingScore,
          points_per_question: s.pointsPerQuestion,
          randomize_questions: s.randomizeQuestions,
          randomize_options: s.randomizeOptions,
          tab_switch_limit: s.tabSwitchLimit,
          category_quota: s.categoryQuota || {}
        },
        { onConflict: "id" }
      );
      if (error) throw error;
    }

    if (Array.isArray(snapshot.managedAffiliations)) {
      const affiliations = normalizeManagedAffiliations(snapshot.managedAffiliations);
      const { error: delError } = await _sb.from("affiliations").delete().neq("name", "");
      if (delError) throw delError;

      if (affiliations.length) {
        const { error } = await _sb.from("affiliations").insert(affiliations);
        if (error) throw error;
      }
    }

    // 운영 버전: active_exams와 activity_logs는 전체 스냅샷 저장에서 제외합니다.
    // 진행 상태는 saveActiveExamData로 개별 upsert, 로그는 insertActivityLogData로 append-only 저장합니다.
    // 전체 delete 후 insert 방식은 동시접속 중 진행상태/로그 유실 위험이 있어 사용하지 않습니다.

    return { ok: true, retry: false };
  } catch (err) {
    throw err;
  }
}

async function _sbAppendExamSubmission(result, log) {
  try {
    const { data: existing, error: existingError } = await _sb
      .from("exam_results")
      .select("result_id")
      .eq("employee_id", result.employeeId)
      .eq("quarter", result.quarter)
      .maybeSingle();

    if (existingError) throw existingError;

    if (existing) {
      const now = new Date().toISOString();
      const logId = makeLogId();
      const duplicateLog = {
        log_id: logId,
        employee_id: result.employeeId,
        action: "SUBMIT_SKIPPED_DUPLICATE",
        detail: JSON.stringify({
          logId,
          employeeId: result.employeeId,
          department: result.department || "",
          name: result.name || "",
          type: "SUBMIT_SKIPPED_DUPLICATE",
          message: "이미 같은 분기에 제출한 결과가 있어 중복 제출을 저장하지 않았습니다.",
          createdAt: now
        })
      };

      const { error: dupLogError } = await _sb.from("activity_logs").insert(duplicateLog);
      if (dupLogError) console.warn("중복 제출 로그 저장 실패", dupLogError);

      return { ok: true, duplicate: true, message: "이미 같은 분기에 제출한 결과가 있습니다." };
    }

    const { error: insertError } = await _sb.from("exam_results").insert({
      result_id: result.resultId,
      employee_id: result.employeeId,
      department: result.department || "",
      name: result.name || "",
      quarter: result.quarter || "",
      percentage_score: result.percentageScore ?? 0,
      correct_count: result.correctCount ?? 0,
      total_count: result.totalCount ?? 0,
      passed: !!result.passed,
      disqualified: !!result.disqualified,
      disqualification_reason: result.disqualificationReason || "",
      tab_switch_count: result.tabSwitchCount ?? 0,
      started_at: result.startedAt || null,
      submitted_at: result.submittedAt || null
    });
    if (insertError) {
      const duplicate = insertError.code === "23505" || /duplicate key|unique/i.test(insertError.message || "");
      if (duplicate) {
        return { ok: true, duplicate: true, message: "이미 같은 분기에 제출한 결과가 있습니다." };
      }
      throw insertError;
    }

    if (log) {
      const { error: logError } = await _sb.from("activity_logs").insert({
        log_id: String(log.logId || makeLogId()),
        employee_id: result.employeeId,
        action: log.type || log.action || "exam_submit",
        detail: JSON.stringify(log)
      });
      if (logError) throw logError;
    }

    if (log && Array.isArray(log.answerReview) && log.answerReview.length) {
      await _sbUpsertSubmissionAnswers(result, log);
    }

    const key = result.employeeId + "__" + result.quarter;
    const { error: activeDeleteError } = await _sb.from("active_exams").delete().eq("key", key);
    if (activeDeleteError) throw activeDeleteError;

    return { ok: true };
  } catch (err) {
    return { ok: false, message: err.message || String(err) };
  }
}

async function _sbAdminLogin(payload) {
  try {
    if (!payload || !payload.password) {
      return { ok: false, message: "관리자 코드를 입력하세요." };
    }

    const { data: cfg, error: cfgError } = await _sb.from("admin_config").select("password_hash").eq("id", 1).maybeSingle();
    if (cfgError) throw cfgError;
    if (!cfg?.password_hash) return { ok: false, message: "관리자 코드 설정이 없습니다." };
    const storedHash = cfg.password_hash;
    const inputHash = await _sha256(String(payload.password));

    if (inputHash !== storedHash) {
      await new Promise((r) => setTimeout(r, 400));
      return { ok: false, message: "관리자 코드가 일치하지 않습니다." };
    }

    const ts = Date.now();
    const token = btoa(storedHash + "_" + ts);
    const data = await _sbGetAppData();

    return { ok: true, token, ts, adminId: "ADM-0001", data };
  } catch (err) {
    return { ok: false, message: err.message };
  }
}

/* 기존 callExternalApi()를 완전히 대체합니다.
   기존 index.html의 나머지 로직(applyRemoteData, res.retry 체크 등)은
   그대로 두어도 동작하도록 반환 형식을 맞췄습니다. */
async function callExternalApi(action, payload = {}) {
  let result;
  switch (action) {
    case "getAppData":
      result = { ok: true, data: await _sbGetAppData() };
      break;
    case "getLoginData":
      result = { ok: true, data: await _sbGetLoginData() };
      break;
    case "findCandidate":
      result = { ok: true, data: await _sbFindCandidateByProfile(payload) };
      break;
    case "getCandidateRuntimeData":
      result = { ok: true, data: await _sbGetCandidateRuntimeData(payload.employeeId, payload.quarter) };
      break;
    case "saveAppData":
      result = { ok: true, data: await _sbSaveAppData(payload) };
      break;
    case "saveActiveExamData":
      result = { ok: true, data: await _sbSaveActiveExamData(payload.record || payload) };
      break;
    case "insertActivityLogData":
      result = { ok: true, data: await _sbInsertActivityLogData(payload.log || payload) };
      break;
    case "appendExamSubmission":
      result = { ok: true, data: await _sbAppendExamSubmission(payload.result, payload.log) };
      break;
    case "resetCandidateData":
      result = { ok: true, data: await _sbResetCandidateData(payload.employeeId || payload) };
      break;
    case "deleteCandidateData":
      result = { ok: true, data: await _sbDeleteCandidateData(payload.employeeId || payload) };
      break;
    case "deleteQuestionData":
      result = { ok: true, data: await _sbDeleteQuestionData(payload.id ?? payload) };
      break;
    case "adminLogin":
      result = { ok: true, data: await _sbAdminLogin(payload) };
      break;
    default:
      throw new Error("알 수 없는 action: " + action);
  }
  if (result && result.ok === false) throw new Error(result.message || "API 처리 실패");
  return Object.prototype.hasOwnProperty.call(result, "data") ? result.data : result;
}
