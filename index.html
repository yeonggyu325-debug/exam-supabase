function getDashboardMetrics() {
  const quarter        = getCurrentQuarter();
  const totalCandidates = getCandidateUsers().length;
  const currentResults = examResults.filter(r => r.quarter === quarter);
  const completed      = new Set(currentResults.map(r => r.employeeId)).size;
  const pending        = totalCandidates - completed;
  const nonDisqualified = currentResults.filter(r => !r.disqualified);
  const avgScore       = currentResults.length
    ? Math.round(currentResults.reduce((sum, r) => sum + r.percentageScore, 0) / currentResults.length) : 0;
  const passRate       = nonDisqualified.length
    ? Math.round((nonDisqualified.filter(r => r.passed).length / nonDisqualified.length) * 100) : 0;
  const disqualifiedCount = currentResults.filter(r => r.disqualified).length;
  return { totalCandidates, completed, pending, avgScore, passRate, disqualifiedCount };
}

/* ─── 공통 차트/뱃지 헬퍼 ─────────────────────── */
function getCategoryCounts() {
  return getCategories().map(category => ({
    category,
    count: questionBank.filter(q => q.category === category && q.active).length
  }));
}

function getScoreDistribution(results) {
  const ranges = [
    { label: "0-59",   min: 0,  max: 59  },
    { label: "60-69",  min: 60, max: 69  },
    { label: "70-79",  min: 70, max: 79  },
    { label: "80-89",  min: 80, max: 89  },
    { label: "90-100", min: 90, max: 100 }
  ];
  return ranges.map(range => ({
    label: range.label,
    value: results.filter(r => r.percentageScore >= range.min && r.percentageScore <= range.max).length
  }));
}

function renderBarChart(items) {
  const max = Math.max(1, ...items.map(item => item.value));
  return `
    <div class="bar-chart">
      ${items.map(item => `
        <div class="bar-row">
          <strong>${escapeHtml(item.label)}</strong>
          <div class="bar-track" aria-label="${escapeHtml(item.label)} ${item.value}">
            <div class="bar-fill" style="width:${Math.round((item.value / max) * 100)}%"></div>
          </div>
          <span class="text-right">${item.value}</span>
        </div>
      `).join("")}
    </div>
  `;
}

function renderResultBadge(result) {
  if (result.disqualified) return `<span class="badge danger">실격</span>`;
  return `<span class="badge ${result.passed ? "success" : "danger"}">${result.passed ? "합격" : "불합격"}</span>`;
}

"use strict";

// 책임: 응시자 목록 조회, 필터, 응시자 추가 모달

// ── 응시자 테이블 행 빌더 (정렬: 이루자→협력사, 소속 가나다, 성명 가나다) ─────
function _sortUsers(rows) {
  const typeOrder = { "이루자": 0, "협력사": 1 };
  return [...rows].sort((a, b) => {
    const aType = _getUserType(a);
    const bType = _getUserType(b);
    const tDiff = (typeOrder[aType] ?? 9) - (typeOrder[bType] ?? 9);
    if (tDiff !== 0) return tDiff;
    const dDiff = (a.department || "").localeCompare(b.department || "", "ko");
    if (dDiff !== 0) return dDiff;
    return (a.name || "").localeCompare(b.name || "", "ko");
  });
}
function _getUserType(user) {
  const affil = managedAffiliations.find(a => (typeof a === "string" ? a : a.name) === user.department);
  return affil ? (typeof affil === "string" ? "이루자" : affil.type) : "이루자";
}

function _buildUserRowsHtml(rows) {
  // 중복 제거: employeeId 기준
  const seen = new Set();
  const unique = rows.filter(u => {
    if (seen.has(u.employeeId)) return false;
    seen.add(u.employeeId); return true;
  });
  // 정렬 적용
  const sorted = _sortUsers(unique);
  if (!sorted.length) return `<tr><td colspan="13" class="empty">조건에 맞는 응시자가 없습니다.</td></tr>`;

  return sorted.map(user => {
    const attempted  = hasAttemptedThisQuarter(user.employeeId);
    const isActive   = !!getActiveExamRecord(user.employeeId);
    const latest     = getLatestResult(user.employeeId);
    const userType   = _getUserType(user);
    const typeColor  = userType === "이루자" ? "color:#2563eb;background:#eff6ff" : "color:#059669;background:#f0fdf4";
    const tabCount   = latest?.tabSwitchCount ?? (isActive ? (getActiveExamRecord(user.employeeId)?.exam?.tabSwitchCount ?? 0) : 0);
    const disq       = latest?.disqualified || false;

    // §12: 실격 > 제출 완료 > 응시 중 > 응시 전 우선순위
    let statusBadge;
    if (disq)           statusBadge = `<span class="status-badge status-disqualified">🚫 실격</span>`;
    else if (attempted) statusBadge = `<span class="status-badge status-submitted">✅ 제출 완료</span>`;
    else if (isActive)  statusBadge = `<span class="status-badge status-progress">🟡 응시 중</span>`;
    else                statusBadge = `<span class="status-badge status-ready">응시 전</span>`;

    // 합격 여부
    let passBadge = "-";
    if (latest?.passed != null) {
      passBadge = latest.passed
        ? `<span class="badge success">합격</span>`
        : `<span class="badge danger">불합격</span>`;
    }

    // 이탈 표시
    const tabBadge = tabCount >= examSettings.tabSwitchLimit
      ? `<span class="badge danger">${tabCount}회</span>`
      : tabCount > 0
        ? `<span class="badge warning">${tabCount}회</span>`
        : `<span style="color:var(--muted)">0회</span>`;

    // 실격/부정행위
    let disqBadge = "-";
    if (disq) {
      disqBadge = `<span class="badge danger" title="${escapeHtml(latest?.disqualificationReason||"")}">실격</span>`;
    } else if (tabCount >= examSettings.tabSwitchLimit) {
      disqBadge = `<span class="badge danger">부정행위 의심</span>`;
    }

    const phone = escapeHtml(user.phone || "-");

    const activeRec = getActiveExamRecord(user.employeeId);
    const startedAt  = latest?.startedAt
      ? formatDateTime(latest.startedAt)
      : (activeRec?.exam?.startedAt ? formatDateTime(activeRec.exam.startedAt) : "-");
    const submittedAt  = latest ? formatDateTime(latest.submittedAt) : "-";
    const updatedAt    = latest
      ? formatDateTime(latest.submittedAt)
      : (activeRec?.updatedAt ? formatDateTime(activeRec.updatedAt) : "-");
    return `<tr style="${disq ? "background:rgba(194,65,12,.06)" : ""}">
      <td><span style="font-size:12px;font-weight:700;padding:2px 8px;border-radius:99px;${typeColor}">${escapeHtml(userType)}</span></td>
      <td>${escapeHtml(user.department) || "-"}</td>
      <td><strong>${escapeHtml(user.name)}</strong></td>
      <td style="font-size:13px;color:var(--muted)">${phone}</td>
      <td>${statusBadge}</td>
      <td>${latest ? `<strong>${latest.percentageScore}점</strong>` : "-"}</td>
      <td>${passBadge}</td>
      <td style="text-align:center" class="${tabCount >= examSettings.tabSwitchLimit ? 'leave-warning' : ''}">${tabBadge}</td>
      <td>${disqBadge}</td>
      <td style="font-size:12px">${startedAt}</td>
      <td style="font-size:12px">${submittedAt}</td>
      <td style="font-size:12px">${updatedAt}</td>
      <td style="white-space:nowrap">
        <button class="btn small" type="button" onclick="resetCandidateRecords('${user.employeeId}')">초기화</button>
        <button class="btn small danger" type="button" onclick="deleteCandidate('${user.employeeId}')">삭제</button>
      </td>
    </tr>`;
  }).join("");
}

function filterUsers() {
  return getCandidateUsers().filter(user => {
    const keyword        = (state.filters.userSearch || "").trim();
    const attempted      = hasAttemptedThisQuarter(user.employeeId);
    const isExamActive   = !!getActiveExamRecord(user.employeeId);
    const affil          = managedAffiliations.find(a => (typeof a==="string"?a:a.name) === user.department);
    const userType       = affil ? (typeof affil==="string" ? "이루자" : affil.type) : "이루자";
    const matchesKeyword = !keyword || keywordMatch(user.department, keyword) || keywordMatch(user.name, keyword);
    const matchesType    = state.filters.userType === "전체" || userType === state.filters.userType;
    const matchesDept    = state.filters.userDepartment === "전체" || user.department === state.filters.userDepartment;
    const disqForFilter  = getLatestResult(user.employeeId)?.disqualified || false;
    const matchesStatus  = state.filters.userStatus === "전체" ||
      (state.filters.userStatus === "제출 완료" && attempted && !disqForFilter) ||
      (state.filters.userStatus === "응시 완료" && attempted && !disqForFilter) ||
      (state.filters.userStatus === "미응시"    && !attempted && !isExamActive) ||
      (state.filters.userStatus === "응시 중"   && isExamActive && !disqForFilter) ||
      (state.filters.userStatus === "실격"      && disqForFilter);
    return matchesKeyword && matchesType && matchesDept && matchesStatus;
  });
}

function resetUserFilters() {
  state.filters.userSearch     = "";
  state.filters.userType       = "전체";
  state.filters.userDepartment = "전체";
  state.filters.userStatus     = "전체";
  renderAdminDashboard();
}

function updateUserModalDepts(type) {
  const sel = document.getElementById("newUserDepartment");
  if (!sel) return;
  const list = managedAffiliations.filter(a =>
    (typeof a==="string" ? "이루자" : a.type) === type
  );
  sel.disabled = false;
  sel.innerHTML = `<option value="" hidden disabled selected>소속을 선택하세요</option>` +
    list.map(a => {
      const name = typeof a==="string" ? a : a.name;
      return `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`;
    }).join("");
}


function generateEmployeeId() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const prefix = `U-${y}${m}${d}`;
  let seq = users
    .filter(user => String(user.employeeId || "").startsWith(prefix))
    .map(user => Number(String(user.employeeId).split("-").pop()) || 0)
    .reduce((max, value) => Math.max(max, value), 0) + 1;
  let employeeId = `${prefix}-${String(seq).padStart(4, "0")}`;
  while (users.some(user => user.employeeId === employeeId)) {
    seq += 1;
    employeeId = `${prefix}-${String(seq).padStart(4, "0")}`;
  }
  return employeeId;
}

function addUser(event) {
  event.preventDefault();
  const form       = new FormData(event.currentTarget);
  const type       = String(form.get("type") || "이루자").trim();
  const department = String(form.get("department")).trim();
  const name       = String(form.get("name")).trim();
  const phone      = String(form.get("phone") || "").trim();
  const employeeId = generateEmployeeId();

  if (users.some(user => user.role === "candidate" && user.department === department && user.name === name)) {
    alert("같은 소속과 성명의 응시자가 이미 있습니다. 로그인 혼동 방지를 위해 이름 표기를 구분해 주세요.");
    return;
  }
  users.push({ employeeId, department, name, phone, role: "candidate" });
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function resetCandidateRecords(employeeId) {
  const user = users.find(item => item.employeeId === employeeId);
  if (!user) return;
  if (!confirm(`${user.department} ${user.name}의 응시 기록을 초기화하시겠습니까?`)) return;
  examResults = examResults.filter(result => result.employeeId !== employeeId);
  activityLogs = activityLogs.filter(log => log.employeeId !== employeeId);
  activeExams = activeExams.filter(a => !a.key?.startsWith(employeeId));
  // localStorage 즉시 전체 덮어쓰기
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations })); } catch(e) {}
  // GAS에도 전체 스냅샷 저장 (merge 없이 덮어쓰도록 강제)
  if (isExternalApiRuntime()) {
    callExternalApi('saveAppData', { users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations })
      .catch(e => console.warn('저장 실패', e));
  }
  renderAdminDashboard();
}

function deleteCandidate(employeeId) {
  const user = users.find(item => item.employeeId === employeeId);
  if (!user) return;
  if (!confirm(`${user.department} ${user.name} 응시자를 삭제할까요? 해당 응시자의 시험 결과와 로그도 함께 삭제됩니다.`)) return;
  users        = users.filter(item => item.employeeId !== employeeId);
  examResults  = examResults.filter(r => r.employeeId !== employeeId);
  activityLogs = activityLogs.filter(l => l.employeeId !== employeeId);
  activeExams  = activeExams.filter(a => !a.key?.startsWith(employeeId + '_'));
  if (state.currentUser?.employeeId === employeeId) logout();
  savePersistentData();
  renderAdminDashboard();
}

function addAffiliationDirect(name, type, inputEl) {
  name = String(name || "").trim();
  if (!name) return;
  if (managedAffiliations.some(a => a.name === name)) {
    alert("이미 등록된 소속입니다."); return;
  }
  managedAffiliations.push({ name, type });
  managedAffiliations.sort((a, b) => a.name.localeCompare(b.name));
  if (inputEl) inputEl.value = "";
  savePersistentData();
  renderAdminDashboard();
}


function addAffiliation(event) {
  event.preventDefault();
  const form = new FormData(event.currentTarget);
  const name = String(form.get("affiliation") || "").trim();
  const type = String(form.get("affiliationType") || "이루자").trim();
  if (!name) return;
  if (managedAffiliations.some(a => a.name === name)) {
    alert("이미 등록된 소속입니다.");
    return;
  }
  managedAffiliations.push({ name, type });
  managedAffiliations.sort((a, b) => a.name.localeCompare(b.name));
  savePersistentData();
  renderAdminDashboard();
}

function removeAffiliation(name) {
  if (!confirm(`${name} 소속을 선택 목록에서 제거할까요? 기존 응시자 기록의 소속 데이터는 유지됩니다.`)) return;
  managedAffiliations = managedAffiliations.filter(a => a.name !== name);
  savePersistentData();
  renderAdminDashboard();
}

    const matchStatus = fStatus === "전체" || (fStatus === "활성" ? q.active : !q.active);

    const matchSearch = !kw || keywordMatch(q.text, kw) || keywordMatch(q.category, kw);

                  </div>
                </td>
                <td style="text-align:center;font-weight:700;color:#059669">${Number(q.answerIndex)+1}번</td>
                <td style="text-align:center">
                  <span class="badge ${q.active?"success":"danger"}">${q.active?"활성":"비활성"}</span>
                </td>
                <td style="text-align:center;white-space:nowrap">
                  <button class="btn small" type="button" onclick="openQuestionModal(${q.id})">수정</button>
                  <button class="btn small" type="button" onclick="toggleQuestionStatus(${q.id})">${q.active?"비활성":"활성"}</button>
                  <button class="btn small danger" type="button" onclick="deleteQuestion(${q.id})">삭제</button>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <p id="qbCount" style="font-size:12px;color:var(--muted);margin-top:8px;text-align:right">
        ${filtered.length}/${questionBank.length}문항 표시
      </p>
    </section>
  `;
}


function openQuestionModal(questionId = null) {
  const q = questionBank.find(item => item.id === questionId) || {
    id: "", category: "안전보건",
    text: "", options: ["", "", "", "", ""], answerIndex: 0, active: true
  };

  modalRoot.innerHTML = `
    <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="questionModalTitle">
      <section class="modal">
        <h2 id="questionModalTitle">${questionId ? "문제 수정" : "문제 추가"}</h2>
        <form class="question-form" onsubmit="${questionId ? `updateQuestion(event, ${questionId})` : "addQuestion(event)"}">
          <div class="field">
            <label for="qCategory">카테고리</label>
            <input id="qCategory" name="category" required value="${escapeHtml(q.category)}">
          </div>
          <div class="field">
            <label for="qText">문제 문장</label>
            <textarea id="qText" name="text" required>${escapeHtml(q.text)}</textarea>
          </div>
          ${[0, 1, 2, 3, 4].map(i => `
            <div class="field option-field">
              <div class="option-answer-row">
                <label class="answer-choice" for="qAnswer${i}" aria-label="${i + 1}번을 정답으로 선택">
                  <input id="qAnswer${i}" name="answerIndex" type="radio" value="${i}" required ${Number(q.answerIndex) === i ? "checked" : ""}>
                  <span>${i + 1}</span>
                </label>
                <input id="qOption${i}" name="option${i}" required
                  value="${escapeHtml(q.options[i] || "")}">
              </div>
            </div>
          `).join("")}
          <div class="field">
            <label for="qActive">사용 여부</label>
            <select id="qActive" name="active">
              ${optionHtml("true",  String(q.active), "사용")}
              ${optionHtml("false", String(q.active), "비활성")}
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn" type="button" onclick="closeModal()">취소</button>
            <button class="btn primary" type="submit">저장</button>
          </div>
        </form>
      </section>
    </div>
  `;
  setTimeout(() => document.getElementById("qCategory")?.focus(), 0);
}

function readQuestionForm(event) {
  const form = new FormData(event.currentTarget);
  const answerIndexRaw = form.get("answerIndex");
  if (answerIndexRaw === null) {
    alert("정답으로 사용할 번호를 1개 선택해 주세요.");
    return null;
  }
  return {
    category:    String(form.get("category")).trim(),
    difficulty:  "기본",
    text:        String(form.get("text")).trim(),
    options:     [0, 1, 2, 3, 4].map(i => String(form.get(`option${i}`)).trim()),
    answerIndex: Number(answerIndexRaw),
    active:      String(form.get("active")) === "true"
  };
}

function addQuestion(event) {
  event.preventDefault();
  const data = readQuestionForm(event);
  if (!data) return;
  questionBank.push({ id: nextId(questionBank, "id"), ...data });
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function updateQuestion(event, id) {
  event.preventDefault();
  const data = readQuestionForm(event);
  if (!data) return;
  questionBank = questionBank.map(q => q.id === id ? { ...q, ...data } : q);
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function toggleQuestionStatus(id) {
  questionBank = questionBank.map(q => q.id === id ? { ...q, active: !q.active } : q);
  savePersistentData();
  renderAdminDashboard();
}

function deleteQuestion(id) {
  const q = questionBank.find(item => item.id === id);
  if (!q) return;
  if (!confirm("선택한 문제를 삭제할까요?")) return;
  questionBank = questionBank.filter(item => item.id !== id);
  savePersistentData();
  renderAdminDashboard();
}

          <div class="field">

          ${allCategories.map(category => `

                type="number" min="0" value="${examSettings.categoryQuota[category] ?? 0}">
            </div>
          `).join("")}
        </div>
      </form>

      <div class="notice" style="margin-top:14px">
        현재 카테고리별 출제 수 합계는
        <strong>${Object.values(examSettings.categoryQuota).reduce((a, b) => a + Number(b), 0)}</strong>문항입니다.
        분기별 출제 문항 수는 카테고리별 출제 수 합계로 자동 계산됩니다.
      </div>

  `;
}

function updateExamSettings(event) {
  const target = event.target;
  if (!target.name) return;

  if (target.name.startsWith("quota:")) {
    const category = target.name.replace("quota:", "");
    examSettings.categoryQuota[category] = Math.max(0, Number(target.value || 0));
  } else if (target.name === "randomizeQuestions" || target.name === "randomizeOptions") {
    examSettings[target.name] = target.value === "true";
  } else if (target.name !== "totalQuestions") {
    examSettings[target.name] = Math.max(1, Number(target.value || 1));
  }

  examSettings.totalQuestions = Object.values(examSettings.categoryQuota).reduce((a, b) => a + Number(b), 0);
  savePersistentData();
  renderAdminDashboard();
}

"use strict";

// 책임: 응시 결과 목록, 필터, 정렬

function renderResultsManager() {
  const rows     = sortByDateDesc(filterResults(), r => r.submittedAt);
  const quarters = [...new Set(examResults.map(r => r.quarter))].sort((a,b) => String(b).localeCompare(String(a), "ko"));
  const grouped = rows.reduce((acc, row) => {
    const key = row.quarter || "분기 미지정";
    if (!acc[key]) acc[key] = [];
    acc[key].push(row);

  }, {});
  const visibleQuarters = Object.keys(grouped).sort().reverse();

  return `

        </div>
        <button id="refreshBtn" class="btn" type="button" onclick="refreshFromRemote()">⟳ 새로고침</button>

      <div class="filters">

        <div class="field">

          <select id="resultDisqualified" onchange="state.filters.resultDisqualified=this.value; renderAdminDashboard();">

            <table>
              <thead>

              </thead>
              <tbody>
                ${grouped[quarter].map(r => `
                  <tr>
                    <td>${r.startedAt ? formatDateTime(r.startedAt) : "-"}</td>
                    <td>${formatDateTime(r.submittedAt)}</td>
                    <td>${(r.startedAt && r.submittedAt) ? (() => { const mins = Math.round((new Date(r.submittedAt) - new Date(r.startedAt)) / 60000); return mins + "분"; })() : "-"}</td>

                    <td>${r.tabSwitchCount ?? 0}회</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>

        </section>
      `).join("") || `<div class="empty">조건에 맞는 결과가 없습니다.</div>`}
    </section>
  `;
}

function filterResults() {
  let rows = examResults.filter(r => {
    const depOk  = state.filters.resultDepartment === "전체" || r.department === state.filters.resultDepartment;
    const qOk    = state.filters.resultQuarter    === "전체" || r.quarter    === state.filters.resultQuarter;
    const disqOk = state.filters.resultDisqualified === "전체" ||
      (state.filters.resultDisqualified === "실격" &&  r.disqualified) ||
      (state.filters.resultDisqualified === "정상" && !r.disqualified);
    return depOk && qOk && disqOk;
  });

  if      (state.filters.resultSort === "scoreDesc") rows.sort((a, b) => b.percentageScore - a.percentageScore);
  else if (state.filters.resultSort === "scoreAsc")  rows.sort((a, b) => a.percentageScore - b.percentageScore);
  else                                               rows.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
  return rows;
}

function resetResultFilters() {
  state.filters.resultDepartment   = "전체";
  state.filters.resultQuarter      = "전체";
  state.filters.resultSort         = "dateDesc";
  state.filters.resultDisqualified = "전체";
  renderAdminDashboard();
}

"use strict";

// 책임: 통계 시각화 (점수 분포, 부서별 평균, 합격 비율, 카테고리 문항 수)

function renderStatsManager() {
  const currentResults = examResults.filter(r => r.quarter === getCurrentQuarter());
  const scoreDist      = getScoreDistribution(examResults);
  const categoryCounts = getCategoryCounts().map(item => ({ label: item.category, value: item.count }));
  const statusRatio    = [
    { label: "합격",   value: examResults.filter(r =>  r.passed && !r.disqualified).length },

  const deptAvg = getDepartments().map(dep => {
    const rows = examResults.filter(r => r.department === dep);

    return { label: dep, value: avg };

  return `

        <h2>통계 시각화</h2>
      </div>

      <section class="card">

      <section class="card">
        <div class="section-head"><h3>합격/불합격/실격 비율</h3></div>
        ${renderBarChart(statusRatio)}
      </section>
      <section class="card">
        <div class="section-head"><h3>카테고리별 문항 수</h3></div>
        ${renderBarChart(categoryCounts)}
      </section>

    <section class="card" style="margin-top:16px">
      <div class="section-head"><h3>이번 분기 요약</h3></div>
      <div class="grid three">
        <div class="metric"><div class="label">이번 분기 결과 수</div><div class="value">${currentResults.length}</div></div>
        <div class="metric"><div class="label">최고 점수</div><div class="value">${currentResults.length ? Math.max(...currentResults.map(r => r.percentageScore)) : 0}</div></div>
        <div class="metric"><div class="label">실격자</div><div class="value">${currentResults.filter(r => r.disqualified).length}</div></div>

</script>

  <script>
    // ── 앱 진입점 ──
    function initApp() {
      _initSampleData();
      loadPersistentData();

      // F5 새로고침 시 이전 화면 복원
      let restored = false;
      try {
        const saved = sessionStorage.getItem("HNIRUJA_SESSION");
        if (saved) {
          const sess = JSON.parse(saved);
          if (sess.user && sess.view) {
            state.currentUser  = sess.user;
            state.adminSection = sess.adminSection || "dashboard";
            state.isTestMode   = sess.isTestMode   || false;
            // 시험 중이었으면 activeExams에서 복원
            if (sess.view === "exam") {
              const rec = getActiveExamRecord(sess.user.employeeId);
              if (rec?.exam) {
                state.currentExam = rec.exam;
                const savedRemaining = Number(rec.remainingSeconds || examSettings.timeLimitMinutes * 60);
                const savedAt = rec.updatedAt ? new Date(rec.updatedAt).getTime() : Date.now();
                const elapsedSecs = Math.floor((Date.now() - savedAt) / 1000);
                state.remainingSeconds = Math.max(1, savedRemaining - elapsedSecs);
                state.currentQuestionIndex = 0;
                state.isSubmitting = false;
                state.view = "exam";
              } else {
                state.view = "candidate";
              }
            } else {
              state.view = sess.view;
            }
            restored = true;
          }
        }
      } catch(e) {}

      if (!restored) state.view = "login";

      // 새로고침 직후 탭전환 오감지 방지 플래그
      window._appJustLoaded = true;
      setTimeout(() => { window._appJustLoaded = false; }, 800);

      render();

      // 시험 복원이면 타이머/가드 재등록
      if (state.view === "exam" && state.currentExam) {
        setTimeout(() => { startTimer(); }, 100);
      }

      // 백그라운드 원격 동기화 — result 화면은 서버 검증 후 재확인
      if (isAppsScriptRuntime() || isExternalApiRuntime()) {
        loadRemoteData((ok) => {
          if (!ok) return;
          // 결과 화면인 경우: 서버 데이터 기준으로 재검증
          if (state.view === "result" && state.currentUser) {
            const empId = state.currentUser.employeeId;
            const serverResult = examResults.find(r =>
              r.employeeId === empId && r.quarter === getCurrentQuarter()
            );
            if (!serverResult) {
              // 서버에 결과 없음 = 초기화됨 → 대기 화면으로
              state.lastResult = null;
              state.view = "candidate";
            } else {
              state.lastResult = serverResult;
            }
          }
          if (state.view !== "exam") render();
        });
      }
    }
    initApp();
  </script>
