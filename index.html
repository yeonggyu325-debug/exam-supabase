  <style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css");
/* 폰트 로드 전 시스템 폰트로 빠르게 렌더링, 로드 후 교체 (FOUT 방식 — 텍스트 즉시 표시) */
@font-face {
  font-family: "Pretendard Variable";
  font-display: swap;
}

:root {
  --bg: #f3f6fb;
  --panel: #ffffff;
  --panel-2: #f7faff;
  --text: #172033;
  --muted: #64748b;
  --line: #dbe3ef;
  --primary: #1f5fbf;
  --primary-dark: #174a9c;
  --danger: #c2410c;
  --danger-bg: #fff7ed;
  --success: #15803d;
  --success-bg: #f0fdf4;
  --warning: #a16207;
  --warning-bg: #fefce8;
  --shadow: 0 12px 30px rgba(15, 23, 42, .08);
  --radius: 16px;
  --focus: 0 0 0 4px rgba(31, 95, 191, .18);
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --color-surface: var(--panel);
  --color-surface-offset: var(--panel-2);
  --color-border: var(--line);
  --color-text: var(--text);
  --color-text-muted: var(--muted);
  --color-text-faint: #94a3b8;
  --color-error: var(--danger);
  --radius-md: 12px;
  --radius-lg: 16px;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --content-wide: 1180px;
  --shadow-sm: 0 4px 12px rgba(15, 23, 42, .08);
}



* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  overscroll-behavior-y: none; /* pull-to-refresh 차단 */
}
html {
  overscroll-behavior-y: none;
}

button, input, select, textarea { font: inherit; }
button, a, input, select, textarea { outline: none; }

button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  box-shadow: var(--focus);
  border-color: var(--primary);
}

button:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none !important;
}

.app-shell { min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
}

.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }

.brand-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: grid; place-items: center;
  background: var(--primary);
  color: #fff;
  font-weight: 900;
  letter-spacing: -.04em;
  flex: none;
}

.brand h1 { margin: 0; font-size: 17px; line-height: 1.2; }
.brand p  { margin: 2px 0 0; color: var(--muted); font-size: 13px; }

.top-actions {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; flex-wrap: wrap;
}

/* ── Buttons ── */
.btn {
  min-height: 40px;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 9px 13px;
  background: var(--panel);
  color: var(--text);
  font-weight: 800;
  cursor: pointer;
  transition: .15s ease;
  text-decoration: none;
}
.btn:hover { transform: translateY(-1px); border-color: var(--primary); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn.primary:hover { background: var(--primary-dark); }
.btn.danger  { color: var(--danger);  border-color: rgba(194,65,12,.35); background: var(--danger-bg); }
.btn.success { color: var(--success); border-color: rgba(21,128,61,.35);  background: var(--success-bg); }
.btn.small   { min-height: 32px; padding: 6px 10px; border-radius: 10px; font-size: 13px; }

/* ── Layout ── */
.container {
  width: min(1180px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 44px;
}

/* ── Login ── */
.login-wrap {
  min-height: calc(100vh - 64px);
  display: grid; place-items: center;
  padding: 32px 16px;
}
.login-card {
  width: min(460px, 100%);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 30px;
}
.login-card h2  { margin: 0 0 8px; font-size: 25px; }
.login-card .hint { margin: 0 0 24px; color: var(--muted); }

/* ── Form ── */
.field { margin-bottom: 16px; }
label  { display: block; margin: 0 0 7px; font-size: 14px; font-weight: 900; }
input, select, textarea {
  width: 100%; min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
  background: var(--panel);
  color: var(--text);
}
textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
.question-form { display: grid; grid-template-columns: 1fr; gap: 14px; }
.question-form .option-field input { width: 100%; min-height: 48px; padding: 12px 14px; line-height: 1.6; }
.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }

/* ── Notice ── */
.notice {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px 14px;
  background: var(--panel-2);
  color: var(--muted);
}
.notice.danger  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(194,65,12,.25); }
.notice.success { color: var(--success); background: var(--success-bg); border-color: rgba(21,128,61,.25); }
.notice.warning { color: var(--warning); background: var(--warning-bg); border-color: rgba(161,98,7,.25); }

/* ── Utilities ── */
.muted      { color: var(--muted); }
.text-right { text-align: right; }
.hidden     { display: none !important; }

/* ── Card ── */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}
.section-head {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  gap: 16px; margin-bottom: 16px;
}
.section-head h2, .section-head h3 { margin: 0; }
.section-head p { margin: 4px 0 0; color: var(--muted); }

/* ── Grid ── */
.grid { display: grid; gap: 16px; }
.grid.two   { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.four  { grid-template-columns: repeat(4, minmax(0, 1fr)); }

/* ── Metric ── */
.metric {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
}
.metric .label { color: var(--muted); font-size: 13px; font-weight: 900; }
.metric .value { margin-top: 6px; font-size: 28px; font-weight: 950; letter-spacing: -.03em; }
.metric .sub   { margin-top: 4px; color: var(--muted); font-size: 12px; }

/* ── Profile list ── */
.profile-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px; margin: 0;
}
.profile-list div { border: 1px solid var(--line); border-radius: 13px; padding: 12px; background: var(--panel-2); }
.profile-list dt  { color: var(--muted); font-size: 12px; font-weight: 900; }
.profile-list dd  { margin: 4px 0 0; font-weight: 950; }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 10px;
  background: var(--panel-2);
  color: var(--text);
  font-size: 12px; font-weight: 950; white-space: nowrap;
}
.badge.admin   { background: #111827; border-color: #111827; color: #fff; }

.badge.success { color: var(--success); background: var(--success-bg); border-color: rgba(21,128,61,.25); }
.badge.danger  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(194,65,12,.25); }
.badge.warning { color: var(--warning); background: var(--warning-bg); border-color: rgba(161,98,7,.25); }

/* ── Exam ── */
.exam-layout { display: grid; grid-template-columns: 1fr 290px; gap: 18px; align-items: start; }
.question-title { margin: 0 0 16px; font-size: 21px; font-weight: 950; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 10px; padding: 13px;
  border: 1px solid var(--line); border-radius: 14px;
  background: var(--panel); cursor: pointer; transition: .12s ease;
}
.option:hover, .option:focus-within { border-color: var(--primary); background: var(--panel-2); }
.option input    { width: auto; min-height: auto; margin-top: 4px; }
.progress        { height: 10px; border-radius: 999px; background: var(--line); overflow: hidden; }
.progress span   { display: block; height: 100%; width: 0; border-radius: inherit; background: var(--primary); transition: width .2s ease; }

/* ── Admin ── */
.admin-layout {
  display: grid;
  grid-template-columns: 250px minmax(0, 1fr);
  min-height: calc(100vh - 64px);
}
.sidebar {
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow: auto;
  border-right: 1px solid var(--line);
  background: var(--panel);
  padding: 18px;
}
.sidebar nav { display: grid; gap: 8px; margin-top: 18px; }
.nav-btn { width: 100%; justify-content: flex-start; border-color: transparent; background: transparent; color: var(--muted); text-align: left; }
.nav-btn.active { border-color: var(--line); background: var(--panel-2); color: var(--primary); }
.admin-main { min-width: 0; padding: 24px; }

/* ── Table ── */
.table-wrap { width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); }
table       { width: 100%; min-width: 780px; border-collapse: collapse; }
th, td      { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 14px; }
th          { background: var(--panel-2); color: var(--muted); font-size: 12px; font-weight: 950; text-transform: uppercase; letter-spacing: .02em; white-space: nowrap; }
tr:last-child td { border-bottom: 0; }

/* ── Filters ── */
.filters { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 14px; }
/* 관리자 입력폼 정렬 보정 */
.admin-inline-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: end;
}
.admin-inline-form .field { margin-bottom: 0; }
.admin-inline-form .btn { min-height: 42px; align-self: end; white-space: nowrap; }
.admin-main .filters { align-items: end; }
.admin-main .filters .field { margin-bottom: 0; }
.admin-main .filters > .btn { min-height: 42px; align-self: end; white-space: nowrap; }
.admin-main .form-grid { align-items: end; }
.admin-main .form-grid .field { margin-bottom: 0; }
.admin-main .form-grid > .btn { min-height: 42px; align-self: end; white-space: nowrap; }
@media (max-width: 640px) {
  .admin-inline-form { grid-template-columns: 1fr; }
  .admin-inline-form .btn,
  .admin-main .filters > .btn,
  .admin-main .form-grid > .btn { width: 100%; }
}


/* ── Bar chart ── */
.bar-chart { display: grid; gap: 10px; }
.bar-row   { display: grid; grid-template-columns: 120px 1fr 54px; gap: 10px; align-items: center; font-size: 13px; }
.bar-track { height: 14px; border-radius: 999px; background: var(--line); overflow: hidden; }
.bar-fill  { height: 100%; border-radius: inherit; background: var(--primary); }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  display: grid; place-items: center; padding: 18px;
  background: rgba(15, 23, 42, .55);
}
.modal {
  width: min(760px, 100%);
  max-height: calc(100vh - 36px); overflow: auto;
  border: 1px solid var(--line); border-radius: 20px;
  box-shadow: var(--shadow); background: var(--panel); padding: 20px;
}
.modal.sm     { width: min(480px, 100%); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; flex-wrap: wrap; }

/* ── Misc ── */
.empty  { padding: 30px; color: var(--muted); text-align: center; }
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── Responsive ── */
@media (max-width: 1000px) {
  .grid.four, .grid.three { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .exam-layout, .admin-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
  .sidebar nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .admin-main { padding: 18px; }
  .filters { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 640px) {
  .topbar { padding: 12px 16px; align-items: flex-start; }
  .brand h1 { font-size: 15px; }
  .brand p  { display: none; }
  .container { width: min(100% - 24px, 1180px); padding-top: 18px; }
  .login-card { padding: 22px; }
  .grid.two, .grid.three, .grid.four, .profile-list, .form-grid, .filters { grid-template-columns: 1fr; }
  .sidebar nav { grid-template-columns: 1fr 1fr; }
  .section-head { display: grid; }
  .btn { width: 100%; }
  .top-actions .btn { width: auto; }
  .bar-row { grid-template-columns: 88px 1fr 42px; }
}


    /* ── 응시자 프로필 바 ── */
    .profile-bar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-6);
      flex-wrap: wrap;
    }
    .profile-bar-item { display: flex; align-items: center; gap: var(--space-2); }
    .profile-bar-label { font-size: var(--text-xs); color: var(--color-text-muted); }
    .profile-bar-value { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
    .profile-bar-sep { color: var(--color-text-faint); font-size: var(--text-sm); }
    .profile-bar-badge { margin-left: auto; }

    /* ── 시험 안내 설명 ── */
    .exam-intro-desc {
      background: var(--color-surface-offset);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.8;
      margin-bottom: var(--space-4);
    }
    .exam-intro-desc strong { color: var(--color-text); font-weight: 600; }

    /* ── 시험 sticky 상태바 ── */
    .exam-sticky-bar {
      position: sticky;
      top: 64px;
      z-index: 45;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    .exam-sticky-inner {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding: var(--space-2) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .exam-sticky-left { flex: 1; min-width: 0; }
    .exam-sticky-right { display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
    .exam-stat { font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; }
    .exam-warn-text { font-size: var(--text-xs); color: var(--color-text-muted); }
    .exam-warn-text.danger { color: var(--color-error); font-weight: 600; }

    /* ── 전체 문항 목록 ── */
    .exam-all-container { padding-block: var(--space-4); }
    .exam-progress-wrap { margin-bottom: var(--space-4); }
    .question-block { margin-bottom: var(--space-4); scroll-margin-top: 60px; }
    .question-block .question-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    .question-block .question-num {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 600;
    }
    .question-block .question-title {
      font-size: var(--text-base);
      font-weight: 600;
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }
  

/* 요청 반영: 로고, 안내문, 최근 기록, 분기별 결과 */
.brand-logo {
  width: auto;
  height: 38px;
  max-width: 150px;
  display: block;
  object-fit: contain;
  flex: none;
}
.exam-ready-card {
  overflow: hidden;
  border: 1px solid rgba(31,95,191,.24);
  border-radius: 24px;
  background:
    radial-gradient(circle at top left, rgba(31,95,191,.16), transparent 36%),
    var(--panel);
  box-shadow: 0 18px 44px rgba(15, 42, 86, .12);
}
.exam-ready-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: center;
  padding: 26px 28px;
  margin: -4px -4px 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #0f357a, #1f5fbf 58%, #3a7be0);
  color: #fff;
}
.exam-ready-icon {
  width: 58px;
  height: 58px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.32);
  font-size: 27px;
  font-weight: 950;
  animation: bluePulse 1.35s ease-in-out infinite;
}
.exam-ready-hero h2 {
  margin: 0;
  font-size: clamp(25px, 3.5vw, 36px);
  letter-spacing: -.04em;
}
.exam-ready-hero p { display: none; }
@keyframes bluePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.38); transform: scale(1); }
  50% { box-shadow: 0 0 0 10px rgba(255,255,255,.08); transform: scale(1.035); }
}
.exam-intro-desc.business-blue {
  background: #f8fbff;
  border: 1px solid rgba(31,95,191,.16);
  border-radius: 20px;
  padding: 18px;
  color: #26364d;
}

.intro-policy-text p { margin: 0; }
.exam-rule-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin: 0 0 14px;
}
.exam-rule-item, .exam-policy-item {
  padding: 15px 16px;
  border: 1px solid rgba(31,95,191,.16);
  border-radius: 16px;
  background: #fff;
  line-height: 1.65;
}

.exam-rule-item strong, .exam-policy-item strong {
  display: block;
  color: var(--primary);
  margin-bottom: 4px;
  font-size: 14px;
}
.exam-policy-list { display: grid; gap: 10px; margin-top: 10px; }
.exam-policy-item {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 12px;
  align-items: flex-start;
}
.exam-policy-mark {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: rgba(31,95,191,.10);
  color: var(--primary);
  font-weight: 950;
}
.exam-security-note {
  margin-top: 10px;
  padding: 16px 18px;
  border: 1px solid rgba(194,65,12,.24);
  border-left: 5px solid var(--danger);
  border-radius: 16px;
  background: var(--danger-bg);
  color: var(--danger);
  font-weight: 900;
  line-height: 1.65;
}
.result-simple-card { text-align: center; padding: 28px; }
.result-final-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 220px;
  min-height: 110px;
  padding: 18px 28px;
  border-radius: 28px;
  font-size: clamp(54px, 10vw, 94px);
  line-height: 1;
  font-weight: 1000;
  letter-spacing: -.06em;
  animation: resultBlink 1.05s ease-in-out infinite;
}
.result-final-badge.success { color: var(--success); background: var(--success-bg); border: 2px solid rgba(21,128,61,.35); }
.result-final-badge.danger { color: var(--danger); background: var(--danger-bg); border: 2px solid rgba(194,65,12,.35); }
.result-simple-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-top: 20px;
}
.result-simple-metric {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 20px;
  background: var(--panel-2);
}

/* 관리자 문제 입력: 숫자 정답 선택 버튼 */
.option-answer-row {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
}
.answer-choice {
  position: relative;
  width: 42px;
  height: 42px;
  flex: none;
}
.answer-choice input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}
.answer-choice span {
  width: 42px;
  height: 42px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--muted);
  font-weight: 950;
  cursor: pointer;
  transition: .15s ease;
}
.answer-choice input:checked + span {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  transform: scale(1.04);
}
.answer-choice input:focus-visible + span { box-shadow: var(--focus); }
.affiliation-add-form {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) auto;
  gap: 10px;

}
.affiliation-add-form .field { margin-bottom: 0; }
.affiliation-add-form .btn { min-height: 42px; align-self: end; white-space: nowrap; }
@media (max-width: 640px) {

/* ── 관리자 응시상태 배지 (요구사항 §13) ── */

/* ════════════════════════════════════════
   CLEAN & FLAT UI — 간결하고 세련된 스타일
   ════════════════════════════════════════ */

/* 공통 컨테이너 보정 */
.v2-container { padding-top: 16px; padding-bottom: 60px; }

/* ── 1. 로그인 폼 ── */
.login-card.v2 {
  width: min(400px, 100%);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(15,23,42,0.06);
  padding: 32px 28px;
}
.login-title {
  margin: 0 0 4px; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; text-align: center;
}
.login-sub {
  margin: 0 0 24px; color: var(--muted); font-size: 14px; text-align: center;
}
.login-form { display: grid; gap: 16px; }
.login-form .field { margin-bottom: 0; }
.login-form label { font-size: 13px; margin-bottom: 6px; color: var(--muted); }
.login-form input, .login-form select {
  border-color: var(--line); border-radius: 10px; background: var(--panel-2); min-height: 46px; transition: 0.2s;
}
.login-form input:focus, .login-form select:focus { background: var(--panel); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(31,95,191,0.1); }
.login-submit-btn {
  margin-top: 8px; min-height: 48px; border-radius: 10px; font-size: 15px; font-weight: 800;
}

/* ── 2. 응시 대기 화면 (대시보드) ── */
.v2-profile-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; justify-content: center; }
.v2-chip { 
  display: inline-flex; align-items: center; gap: 6px; 
  padding: 6px 12px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; font-size: 13px; font-weight: 600;
}
.v2-chip-label { font-size: 12px; color: var(--muted); font-weight: 700; }

.v2-ready-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 2px 12px rgba(15,23,42,0.04);
}
.v2-ready-banner {
  padding: 20px 24px; border-bottom: 1px solid var(--line); background: var(--panel-2);
}
.v2-ready-banner h2 { margin: 0; font-size: 18px; font-weight: 800; color: var(--text); }
.v2-ready-banner p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

/* 스탯 */
.v2-stat-row { display: flex; border-bottom: 1px solid var(--line); }
.v2-stat-item { flex: 1; padding: 16px; text-align: center; border-right: 1px solid var(--line); }
.v2-stat-item:last-child { border-right: none; }
.v2-stat-icon { display: block; font-size: 20px; margin-bottom: 4px; opacity: 0.8; }
.v2-stat-num { display: block; font-size: 18px; font-weight: 800; color: var(--text); }
.v2-stat-label { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

/* 유의사항 & 보안배너 */
.v2-rules { padding: 20px 24px 0; display: grid; gap: 12px; }
.v2-rule-item {
  display: flex; gap: 10px; font-size: 14px; line-height: 1.5; color: var(--text);
}
.v2-rule-num {
  font-weight: 800; color: var(--primary); font-size: 14px; margin-top: 1px;
}
.v2-security-banner {
  margin: 16px 24px 0; padding: 12px 16px; border-radius: 10px; 
  background: var(--danger-bg); border: 1px solid rgba(194,65,12,0.2); color: var(--danger); font-size: 13.5px;
}

/* 시작버튼 */
.v2-start-wrap { padding: 24px; text-align: center; }
.v2-start-btn { width: 100%; max-width: 320px; min-height: 48px; font-size: 16px; border-radius: 10px; margin-bottom: 8px; }

/* ── 3. 시험 화면 ── */
.v2-exam-bar {
  position: sticky; top: 64px; z-index: 45; background: var(--panel); 
  border-bottom: 1px solid var(--line); box-shadow: 0 4px 12px rgba(15,23,42,0.03);
}
.v2-exam-bar-inner {
  max-width: var(--content-wide); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px;
}
.v2-exam-warn { font-size: 13px; color: var(--muted); }
.v2-exam-timer { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
.v2-exam-bar-right { display: flex; align-items: center; gap: 12px; }
.v2-exam-progress-text { font-size: 14px; font-weight: 700; color: var(--muted); }
.v2-submit-btn { border-radius: 8px !important; min-height: 34px !important; }
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
  50%       { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
}

.v2-exam-progress-track { height: 2px; background: var(--line); }
.v2-exam-progress-fill { height: 100%; background: var(--primary); transition: width 0.2s ease; }

.v2-exam-container { max-width: 720px; margin: 0 auto; padding-top: 16px; }

/* 문항 카드 */
.v2-question-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.2s;
}
.v2-question-card.v2-question-answered { border-color: var(--line); background: var(--panel-2); }

.v2-question-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
.v2-question-num { font-size: 14px; font-weight: 800; color: var(--primary); }
.v2-answered-badge { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--success); }
.v2-unanswered-badge { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--danger); }

.v2-question-text { font-size: 14px; font-weight: 600; line-height: 1.5; margin: 0 0 10px; color: var(--text); }

/* 선택지 */
.v2-option {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; margin-bottom: 5px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--panel); cursor: pointer; transition: 0.12s;
}
.v2-option:hover { border-color: #cbd5e1; background: var(--bg); }
.v2-option input { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
.v2-option-mark { display: none; } /* 알파벳/숫자 아이콘 제거, 심플하게 라디오버튼만 사용 */
.v2-option-text { font-size: 13px; line-height: 1.4; color: var(--text); padding-top: 1px; }

.v2-option.v2-option-selected { border-color: var(--primary); background: rgba(31,95,191,0.04); }

.v2-submit-bottom { padding: 12px 0 24px; text-align: right; }
.v2-submit-final-btn { width: 100%; max-width: 320px; min-height: 48px; font-size: 15px; font-weight: 800; border-radius: 10px; }

/* ── 4. 결과 화면 ── */
.v2-result-card {
  max-width: 500px; margin: 0 auto; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.03);
}
.v2-result-top { padding: 32px 24px; text-align: center; border-bottom: 1px solid var(--line); }
.v2-result-emoji { font-size: 40px; margin-bottom: 8px; }
.v2-result-label { font-size: 28px; font-weight: 800; margin: 0 0 4px; }
.v2-result-label.success { color: var(--success); }
.v2-result-label.danger { color: var(--danger); }
.v2-result-sub { font-size: 14px; color: var(--muted); margin: 0; }

.v2-score-gauge-wrap { padding: 24px 24px 0; text-align: center; }
.v2-score-num { font-size: 40px; font-weight: 900; line-height: 1; margin-bottom: 16px; }
.v2-score-num.success { color: var(--success); }
.v2-score-num.danger { color: var(--danger); }
.v2-score-unit { font-size: 18px; font-weight: 600; margin-left: 2px; }

.v2-score-gauge-track { height: 8px; background: var(--line); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
.v2-score-gauge-fill { height: 100%; transition: width 0.5s ease; border-radius: 4px; }
.v2-score-gauge-fill.success { background: var(--success); }
.v2-score-gauge-fill.danger { background: var(--danger); }
.v2-score-gauge-pass-line { display: none; }

.v2-result-stats { display: flex; border-top: 1px solid var(--line); background: var(--panel-2); }
.v2-result-stat { flex: 1; padding: 16px; text-align: center; border-right: 1px solid var(--line); }
.v2-result-stat:last-child { border-right: none; }
.v2-result-stat-val { display: block; font-size: 20px; font-weight: 800; margin-bottom: 2px; }
.v2-result-stat-key { display: block; font-size: 12px; color: var(--muted); font-weight: 600; }
.v2-result-date { text-align: center; font-size: 13px; color: var(--muted); padding: 16px; margin: 0; }

/* 모바일 조정 */
@media (max-width: 640px) {
  .v2-exam-bar { top: 51px; }
  .v2-stat-num { font-size: 16px; }
  .v2-stat-icon { font-size: 18px; }
  .v2-question-card { padding: 12px 13px; }
  .v2-option {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; margin-bottom: 5px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--panel); cursor: pointer; transition: 0.12s;
}
  .v2-submit-bottom { text-align: center; }
  .v2-submit-final-btn { max-width: 100%; }
}

/* ── 카운트다운 도트 ── */
.countdown-dots-wrap {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin: 14px 0 4px;
}
.countdown-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary);
  opacity: 0.18;
  transition: opacity 0.3s ease;
}
.countdown-dot.active { opacity: 1; }
.countdown-dot-label {
  text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 16px;
}

/* 제출 버튼 disabled 상태 */
.v2-submit-final-btn:disabled,
.v2-submit-btn:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important;
}
.v2-submit-final-btn:disabled::after {

.v2-option-no { width: 20px; flex: none; color: var(--primary); font-size: 13px; font-weight: 800; line-height: 1.4; text-align: center; }

.v2-stat-row.three .v2-stat-item { width: 33.333%; }

.v2-rules.paper-tone { padding-top: 18px; }
.v2-rules.paper-tone .v2-rule-item { color: #334155; }

  margin-top: 14px;

.ready-card-header {

  font-weight: 800;

  color: var(--muted);

  display: flex;
  border-bottom: 1px solid var(--line);
}
.exam-info-item {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  border-right: 1px solid var(--line);
}
.exam-info-item:last-child { border-right: none; }
.exam-info-label {

  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;

}
.exam-info-val {

<script>
/* ── js/utils.js ── */
"use strict";

// 순수 유틸리티 함수 모음 – 어떤 모듈에서도 참조 가능

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// 줄바꿈 문자를 <br> 태그로 변환하여 표시용으로 사용
function formatText(value) {
  return escapeHtml(value).replaceAll("\n", "<br>");
}

function normalizeText(value) {
  return String(value ?? "").replace(/\s+/g, "").toLowerCase();
}

function keywordMatch(target, keyword) {
  const t = normalizeText(target);
  const k = normalizeText(keyword);
  return !k || t.includes(k);
}

function sortByText(arr, keyFn) {
  return [...arr].sort((a, b) => String(keyFn(a) ?? "").localeCompare(String(keyFn(b) ?? ""), "ko"));
}

function sortByDateDesc(arr, keyFn) {
  return [...arr].sort((a, b) => new Date(keyFn(b) || 0) - new Date(keyFn(a) || 0));
}


function formatDateTime(iso) {
  if (!iso) return "-";
  return new Intl.DateTimeFormat("ko-KR", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  }).format(new Date(iso));
}

function daysAgo(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString();
}

function getCurrentQuarter(date = new Date()) {
  const year = date.getFullYear();
  const quarter = Math.floor(date.getMonth() / 3) + 1;
  return `${year}-Q${quarter}`;
}

function previousQuarter() {
  const now = new Date();
  const q = Math.floor(now.getMonth() / 3) + 1;
  return q === 1 ? `${now.getFullYear() - 1}-Q4` : `${now.getFullYear()}-Q${q - 1}`;
}

// 시드 기반 유사 난수 생성기 (mulberry32)
function _seededRng(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// examSeed: 시험 시작 시 설정 (startExam에서 세팅)
let _examSeed = 0;
let _examRng = null;

function _strHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return h >>> 0;
}

function shuffleArray(array) {
  const copied = [...array];
  const rng = _examRng || (_examSeed ? _seededRng(_examSeed) : Math.random.bind(Math));
  for (let i = copied.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [copied[i], copied[j]] = [copied[j], copied[i]];
  }
  return copied;
}

function nextId(array, key) {
  return array.length ? Math.max(...array.map(item => Number(item[key]) || 0)) + 1 : 1;
}

function optionHtml(value, selected, label = value) {
  return `<option value="${escapeHtml(value)}" ${String(value) === String(selected) ? "selected" : ""}>${escapeHtml(label)}</option>`;
}

// data.js 의 데이터에 의존하는 도우미 함수
function getCandidateUsers() {
  return users.filter(user => user.role === "candidate");
}

function getDepartments() {
  return [...new Set(getCandidateUsers().map(user => user.department))].sort();
}

function getCategories() {
  return [...new Set(questionBank.map(q => q.category))].sort();
}

function getLatestResult(employeeId) {
  return examResults
    .filter(result => result.employeeId === employeeId)
    .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))[0];
}

function hasAttemptedThisQuarter(employeeId, quarter = getCurrentQuarter()) {
  return examResults.some(result => result.employeeId === employeeId && result.quarter === quarter);
}


// categoryQuota에서 실제 문제은행에 존재하지 않는 카테고리 항목 자동 제거
function cleanOrphanQuota() {
  const existingCategories = [...new Set(questionBank.map(q => q.category))];
  const cleaned = {};
  Object.entries(examSettings.categoryQuota || {}).forEach(([cat, count]) => {
    if (existingCategories.includes(cat)) {
      cleaned[cat] = count;
    }
    // 문제은행에 없는 카테고리는 자동 제거
  });
  examSettings.categoryQuota = cleaned;
}

function getQuotaWarnings() {
  return Object.entries(examSettings.categoryQuota)
    .filter(([category, count]) => {
      if (category === "테스트") return false; // 테스트 카테고리 제외
      const available = questionBank.filter(q => q.active && q.category === category).length;
      return available < Number(count);
    })
    .map(([category, count]) => {
      const available = questionBank.filter(q => q.active && q.category === category).length;
      return `[${category}] 출제 ${count}문항 설정 / 등록 ${available}문항 — ${Number(count) - available}문항 부족`;
    });
}

function getActiveExamKey(employeeId, quarter = getCurrentQuarter()) {
  return `${employeeId}__${quarter}`;
}

function getActiveExamRecord(employeeId, quarter = getCurrentQuarter()) {
  const key = getActiveExamKey(employeeId, quarter);
  return activeExams.find(item => item.key === key && item.status === "in_progress");
}

function upsertActiveExamRecord(exam, extra = {}) {
  if (!exam) return;
  const key = getActiveExamKey(exam.employeeId, exam.quarter);
  const record = {
    key,
    status: "in_progress",
    updatedAt: new Date().toISOString(),
    remainingSeconds: state.remainingSeconds,
    exam: JSON.parse(JSON.stringify(exam)),
    ...extra
  };
  const index = activeExams.findIndex(item => item.key === key);
  if (index >= 0) activeExams[index] = { ...activeExams[index], ...record };
  else activeExams.push(record);
}

function clearActiveExamRecord(employeeId, quarter = getCurrentQuarter()) {
  const key = getActiveExamKey(employeeId, quarter);
  activeExams = activeExams.filter(item => item.key !== key);
}

function persistCurrentExam(saveRemote = true) {
  if (!state.currentExam) return;
  upsertActiveExamRecord(state.currentExam);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations }));
  } catch (error) {
    console.warn("진행 중 시험 저장에 실패했습니다.", error);
  }
  if (saveRemote) queueRemoteSave();
}

function mergeLocalActiveExams() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const localData = JSON.parse(raw);
    if (!Array.isArray(localData.activeExams)) return;
    localData.activeExams.forEach(localRecord => {
      if (!localRecord?.key || localRecord.status !== "in_progress") return;
      // 초기화된 응시자 감지: 서버 examResults에 해당 employeeId 기록이 없고
      // 서버 activeExams에도 없으면 → 관리자가 초기화한 것으로 판단, 로컬 것 무시
      const empId = localRecord.employeeId || localRecord.key?.split("_")[0];
      const quarter = getCurrentQuarter();
      const serverHasResult = examResults.some(r => r.employeeId === empId);
      const serverHasActive = activeExams.some(a => a.key === localRecord.key);
      // 서버에 결과도 없고 activeExam도 없으면 초기화된 상태 → 병합 스킵
      if (!serverHasResult && !serverHasActive) return;
      const remoteIndex = activeExams.findIndex(item => item.key === localRecord.key);
      const remoteRecord = remoteIndex >= 0 ? activeExams[remoteIndex] : null;
      const localTime = new Date(localRecord.updatedAt || 0).getTime();
      const remoteTime = new Date(remoteRecord?.updatedAt || 0).getTime();
      if (!remoteRecord || localTime >= remoteTime) {
        if (remoteIndex >= 0) activeExams[remoteIndex] = localRecord;
        else activeExams.push(localRecord);
      }
    });
  } catch (error) {
    console.warn("진행 중 시험 로컬 병합에 실패했습니다.", error);
  }
}

async function _sbGetAppData() {
  const [usersRes, qbRes, settingsRes, resultsRes, logsRes, activeRes, affRes] = await Promise.all([

async function _sbSaveAppData(snapshot) {
  try {
    if (Array.isArray(snapshot.users) && snapshot.users.length) {
      await _sb.from("users").upsert(
        snapshot.users.map((u) => ({
          employee_id: u.employeeId,
          department: u.department || "",
          name: u.name || "",
          phone: u.phone || "",
          role: u.role || "candidate"
        })),
        { onConflict: "employee_id" }
      );
    }

    if (Array.isArray(snapshot.questionBank) && snapshot.questionBank.length) {
      const rows = snapshot.questionBank.map((q) => ({
        id: q.id ?? null,
        category: q.category || "",
        text: q.text || "",
        option_1: (q.options || [])[0] || "",
        option_2: (q.options || [])[1] || "",
        option_3: (q.options || [])[2] || "",
        option_4: (q.options || [])[3] || "",
        option_5: (q.options || [])[4] || "",
        answer_index: q.answerIndex ?? 0,
        active: q.active !== false
      }));

      const existing = rows.filter((r) => r.id !== null && r.id !== undefined && r.id !== "");
      const fresh = rows.filter((r) => r.id === null || r.id === undefined || r.id === "");

      if (existing.length) {
        const { error } = await _sb.from("question_bank").upsert(existing, { onConflict: "id" });
        if (error) throw error;
      }

      if (fresh.length) {
        const insertRows = fresh.map(({ id, ...rest }) => rest);
        const { error } = await _sb.from("question_bank").insert(insertRows);
        if (error) throw error;
      }
    }
    

    if (snapshot.examSettings) {
      const s = snapshot.examSettings;
      await _sb.from("exam_settings").upsert(
        {
          id: 1,
          total_questions: s.totalQuestions,
          time_limit_minutes: s.timeLimitMinutes,
          passing_score: s.passingScore,
          points_per_question: s.pointsPerQuestion,
          randomize_questions: s.randomizeQuestions,
          randomize_options: s.randomizeOptions,
          tab_switch_limit: s.tabSwitchLimit,
          category_quota: s.categoryQuota || {}
        },
        { onConflict: "id" }
      );
    }

    if (Array.isArray(snapshot.managedAffiliations)) {
      await _sb.from("affiliations").delete().neq("name", "");
      if (snapshot.managedAffiliations.length) {
        await _sb.from("affiliations").insert(
          snapshot.managedAffiliations.map((a) =>
            typeof a === "string" ? { name: a, type: "이루자" } : { name: a.name, type: a.type || "이루자" }
          )
        );
      }
    }

    return { ok: true, retry: false };
  } catch (err) {
    return { ok: false, retry: false, message: err.message };
  }
}

async function _sbAppendExamSubmission(result, log) {
  try {
    const { data: existing } = await _sb
      .from("exam_results")
      .select("result_id")
      .eq("result_id", result.resultId)
      .maybeSingle();

    if (existing) return { ok: true, duplicate: true, message: "이미 기록된 결과입니다." };

    await _sb.from("exam_results").insert({
      result_id: result.resultId,
      employee_id: result.employeeId,
      department: result.department || "",
      name: result.name || "",
      quarter: result.quarter || "",
      percentage_score: result.percentageScore ?? 0,
      correct_count: result.correctCount ?? 0,
      total_count: result.totalCount ?? 0,
      passed: !!result.passed,
      disqualified: !!result.disqualified,
      disqualification_reason: result.disqualificationReason || "",
      tab_switch_count: result.tabSwitchCount ?? 0,
      started_at: result.startedAt || null,
      submitted_at: result.submittedAt || null
    });

    if (log) {
      await _sb.from("activity_logs").insert({
        log_id: log.logId || crypto.randomUUID(),
        employee_id: result.employeeId,
        action: log.action || "exam_submit",
        detail: JSON.stringify(log)
      });
    }

    const key = result.employeeId + "__" + result.quarter;
    await _sb.from("active_exams").delete().eq("key", key);

    return { ok: true };
  } catch (err) {
    return { ok: false, message: err.message };
  }
}

async function _sbAdminLogin(payload) {
  try {
    if (!payload || !payload.password) {
      return { ok: false, message: "비밀번호를 입력하세요." };
    }

    const { data: cfg } = await _sb.from("admin_config").select("password_hash").eq("id", 1).maybeSingle();
    const storedHash = cfg ? cfg.password_hash : await _sha256("ehs1985");
    const inputHash = await _sha256(String(payload.password));

    if (inputHash !== storedHash) {
      await new Promise((r) => setTimeout(r, 400));
      return { ok: false, message: "비밀번호가 일치하지 않습니다." };
    }

    const ts = Date.now();
    const token = btoa(storedHash + "_" + ts);
    const data = await _sbGetAppData();

    return { ok: true, token, ts, adminId: "ADM-0001", data };
  } catch (err) {
    return { ok: false, message: err.message };
  }
}

/* 기존 callExternalApi()를 완전히 대체합니다.
   기존 index.html의 나머지 로직(applyRemoteData, res.retry 체크 등)은
   그대로 두어도 동작하도록 반환 형식을 맞췄습니다. */
async function callExternalApi(action, payload = {}) {
  let result;
  switch (action) {
    case "getAppData":
      result = { ok: true, data: await _sbGetAppData() };
      break;
    case "saveAppData":
      result = { ok: true, data: await _sbSaveAppData(payload) };
      break;
    case "appendExamSubmission":
      result = { ok: true, data: await _sbAppendExamSubmission(payload.result, payload.log) };
      break;
    case "adminLogin":
      result = { ok: true, data: await _sbAdminLogin(payload) };
      break;
    default:
      throw new Error("알 수 없는 action: " + action);
  }
  if (result && result.ok === false) throw new Error(result.message || "API 처리 실패");
  return Object.prototype.hasOwnProperty.call(result, "data") ? result.data : result;
}


function applyRemoteData(data) {
  if (data && Array.isArray(data.users)) users = data.users;
  if (data && Array.isArray(data.questionBank)) questionBank = data.questionBank;
  if (data && data.examSettings) {
    examSettings = { ...examSettings, ...data.examSettings };
    cleanOrphanQuota();
  }
  if (data && Array.isArray(data.examResults)) examResults = data.examResults;
  if (data && Array.isArray(data.activityLogs)) activityLogs = data.activityLogs;
  if (data && Array.isArray(data.activeExams)) activeExams = data.activeExams;
  if (data && Array.isArray(data.managedAffiliations)) {
    managedAffiliations = data.managedAffiliations.map(a =>
      typeof a === 'string' ? { name: a, type: '이루자' } : a
    );
  }
  // 시험 진행 중인 응시자만 로컬 activeExam 병합 (초기화된 응시자는 제외)
  mergeLocalActiveExams();
  // 서버 데이터를 로컬스토리지에 즉시 반영 → 다음 로드 시 최신 서버 상태 유지
  overwriteLocalCache();
}

function overwriteLocalCache() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      users, questionBank, examSettings,
      examResults, activityLogs, activeExams, managedAffiliations
    }));
  } catch(e) {}
}

function loadRemoteData(done) {
  if (isAppsScriptRuntime()) {
    google.script.run
      .withSuccessHandler(data => {
        try { applyRemoteData(data); state._remoteLoaded = true; done(true); }
        catch (error) { console.warn("스프레드시트 데이터 복원에 실패했습니다.", error); done(false); }
      })
      .withFailureHandler(error => {
        console.warn("스프레드시트 연결에 실패했습니다. 브라우저 저장소로 전환합니다.", error);
        loadPersistentData();
        done(false);
      })
      .getAppData();
    return;
  }

  if (isExternalApiRuntime()) {
    callExternalApi("getAppData")
      .then(data => { applyRemoteData(data); state._remoteLoaded = true; done(true); })
      .catch(error => {
        console.warn("외부 API 연결에 실패했습니다. 브라우저 저장소로 전환합니다.", error);
        loadPersistentData();
        done(false);
      });
    return;
  }

  done(false);
}

let _remoteSaveTimer = null;
let _remoteSaveRetries = 0;

function queueRemoteSave() {
  // 짧은 시간 내 여러 저장 요청을 1번으로 묶어서 서버 부담 감소 (디바운스)
  clearTimeout(_remoteSaveTimer);
  _remoteSaveTimer = setTimeout(() => _doRemoteSave(), 400);
}

function _doRemoteSave() {
  const snapshot = { users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations };
  if (isAppsScriptRuntime()) {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.retry) {
          _retryRemoteSave();
        } else {
          _remoteSaveRetries = 0;
        }
      })
      .withFailureHandler(error => {
        console.warn("스프레드시트 저장에 실패했습니다.", error);
        _retryRemoteSave();
      })
      .saveAppData(snapshot);
    return;
  }
  if (isExternalApiRuntime()) {
    callExternalApi("saveAppData", snapshot)
      .then(res => {
        if (res && res.retry) _retryRemoteSave();
        else _remoteSaveRetries = 0;
      })
      .catch(error => {
        console.warn("외부 API 저장에 실패했습니다.", error);
        _retryRemoteSave();
      });
  }
}

// 동시 저장 충돌(락 점유 중) 시 최대 3회까지 점증 대기 후 재시도
function _retryRemoteSave() {
  if (_remoteSaveRetries >= 3) { _remoteSaveRetries = 0; return; }
  _remoteSaveRetries += 1;
  const delay = 800 * _remoteSaveRetries;
  setTimeout(() => _doRemoteSave(), delay);
}

function appendResultToSheet(result, log) {
  if (isAppsScriptRuntime()) {
    google.script.run
      .withFailureHandler(error => console.warn("응시 결과 스프레드시트 기록에 실패했습니다.", error))
      .appendExamSubmission(result, log);
    return;
  }
  if (isExternalApiRuntime()) {
    callExternalApi("appendExamSubmission", { result, log })
      .catch(error => console.warn("응시 결과 외부 API 기록에 실패했습니다.", error));
  }
}

function savePersistentData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations }));
  } catch (error) {
    console.warn("저장소 기록에 실패했습니다.", error);

function loadPersistentData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (Array.isArray(data.users)) users = data.users;
    if (Array.isArray(data.questionBank)) questionBank = data.questionBank;
    if (data.examSettings) {
      examSettings = { ...examSettings, ...data.examSettings };
      cleanOrphanQuota();
    }
    if (Array.isArray(data.examResults)) examResults = data.examResults;
    if (Array.isArray(data.activityLogs)) activityLogs = data.activityLogs;
    if (Array.isArray(data.activeExams)) activeExams = data.activeExams;
    if (Array.isArray(data.managedAffiliations)) {
      managedAffiliations = data.managedAffiliations.map(a =>
        typeof a === 'string' ? { name: a, type: '이루자' } : a
      );
    }
    return true;
  } catch (error) {
    console.warn("저장소 복원에 실패했습니다.", error);
    return false;
  }
}

function formatDateOnly(iso) {
  if (!iso) return "-";
  return new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date(iso));
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function getCertificationValidity(result) {
  if (!result || !result.passed || result.disqualified) return null;
  const validFrom = result.validFrom || addDays(new Date(result.submittedAt), 1).toISOString();
  const until = result.validUntil ? new Date(result.validUntil) : addDays(new Date(validFrom), 365);
  if (!result.validUntil) until.setDate(until.getDate() - 1);
  return { validFrom, validUntil: result.validUntil || until.toISOString() };
}

function getResultComment(result) {
  if (result.disqualified) return "응시하느라 고생 많으셨습니다. 실격 처리되어 다음 분기 안전담당자 시험에 다시 응시바랍니다.";
  if (result.passed) return "응시하느라 고생 많으셨습니다. 앞으로 현장안전을 위해 힘써주시기 바랍니다.";
  return "응시하느라 고생 많으셨습니다. 다음 분기 안전담당자 시험에 다시 응시바랍니다.";
}

function handleLogin(event) {
  event.preventDefault();
  const form       = new FormData(event.currentTarget);
  const department = String(form.get("department") || "").trim();
  const name       = String(form.get("name") || "").trim();
  const type       = String(form.get("type") || "").trim();

  // 관리자 로그인: 이름 입력으로 진입
  if (name === "ehs1985") {
    const admin = users.find(u => u.role === "admin") || { employeeId: "ADM-0001", department: "환경안전", name: "ehs1985", role: "admin" };
    state.currentUser = admin;
    state.view        = "admin";
    state.loginError  = "";
    state.isTestMode  = false;
    render();
    return;
  }

  // 테스트 모드: 소속 무관, "테스트" 카테고리 문제만 출제, DB 저장 없음
  if (name === "test") {
    state.currentUser = { employeeId: "TEST-0001", department: "테스트", name: "test", role: "candidate" };
    state.isTestMode  = true;
    state.loginError  = "";
    state.lastResult  = null;
    state.view        = "candidate";
    render();
    return;
  }

  if (!type || !department) {
    state.loginError = !type ? "구분을 선택해 주세요." : "소속을 선택해 주세요.";
    renderLogin();
    return;
  }

  const candidate = users.find(user => user.role === "candidate" && user.department === department && user.name === name);
  if (candidate) {
    state.currentUser = candidate;
    state.loginError  = "";
    // 로컬 데이터로 즉시 화면 결정 (빠른 진입)
    function _resolveLoginView() {
      const currentQuarterResult = examResults
        .filter(result => result.employeeId === candidate.employeeId && result.quarter === getCurrentQuarter())
        .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))[0];
      // 서버 동기화 완료(또는 오프라인) 후에만 결과화면 진입
      if (currentQuarterResult && (state._remoteLoaded || (!isAppsScriptRuntime() && !isExternalApiRuntime()))) {
        state.lastResult = currentQuarterResult;
        state.view = "result";
        render();
        return;
      }
      const activeRecord = getActiveExamRecord(candidate.employeeId);
      if (activeRecord?.exam) {
        state.currentExam = activeRecord.exam;
        const savedRemaining = Number(activeRecord.remainingSeconds || examSettings.timeLimitMinutes * 60);
        const savedAt = activeRecord.updatedAt ? new Date(activeRecord.updatedAt).getTime() : Date.now();
        const elapsedSecs = Math.floor((Date.now() - savedAt) / 1000);
        state.remainingSeconds = Math.max(1, savedRemaining - elapsedSecs);
        state.currentQuestionIndex = 0;
        state.lastResult = null;
        state.isSubmitting = false;
        state.view = "exam";
        if (state.currentExam.tabSwitchCount >= examSettings.tabSwitchLimit) {
          state.currentExam.disqualified = true;
          state.currentExam.disqualificationReason = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
          submitExam(true, true, `재접속 전 이탈 누적 ${state.currentExam.tabSwitchCount}회로 자동 제출 및 실격`);
        } else {
          renderExamScreen();
          startTimer();
        }
        return;
      }
      state.lastResult = null;
      state.view = "candidate";
      render();
    }
    // 시험 진행 중이면 로컬로 즉시 복원 (타이머 연속성)
    const _activeRec = getActiveExamRecord(candidate.employeeId);
    if (_activeRec?.exam) {
      _resolveLoginView();
    } else {
      // 결과/대기 화면은 원격 데이터 확인 후 진입 (관리자 초기화 즉시 반영)
      if (isAppsScriptRuntime() || isExternalApiRuntime()) {
        state.view = "loading";
        renderLoadingScreen("응시 정보를 확인하는 중입니다", 30);
        loadRemoteData(() => {
          updateLoadingProgress(100, "완료!");
          setTimeout(() => _resolveLoginView(), 150);
        });
      } else {
        _resolveLoginView();
      }
    } // loadRemoteData 콜백 끝
    return;
  }

  state.loginError = "등록된 응시자 정보와 일치하지 않습니다. 소속과 성명을 다시 확인하세요.";
  renderLogin();
}

function clearIntroCountdown() {
  if (state.introTimerId) {
    clearTimeout(state.introTimerId);
    state.introTimerId = null;
  }
}

function startIntroCountdown() {
  state.examIntroReady = false;
  const duration = 10000; // 10초
  const startTime = performance.now();

  const tick = (now) => {
    const elapsed = now - startTime;
    const pct = Math.min((elapsed / duration) * 100, 100);
    const fill = document.getElementById('gaugeFill');
    if (fill) fill.style.width = pct + '%';

    if (elapsed < duration) {
      state.introRaf = requestAnimationFrame(tick);
    } else {
      state.examIntroReady = true;
      const checked = document.getElementById('agreeCheck')?.checked;
      const btn = document.getElementById('startExamBtn');
      if (btn) btn.disabled = !checked;
    }
  };

  state.introRaf = requestAnimationFrame(tick);
}

function startExam() {
  if (!state.examIntroReady) {
    alert("안내문을 10초 이상 확인한 뒤 응시할 수 있습니다.");
    return;
  }
  clearIntroCountdown();
  const user = state.currentUser;
  // §2: 이미 제출 완료 또는 실격이면 결과화면만 표시
  if (!state.isTestMode) {
    const existingResult = getLatestResult(user.employeeId);
    if (existingResult) {
      state.lastResult = existingResult;
      state.view = "result";
      renderResultScreen();
      return;
    }
  }
  if (!state.isTestMode && hasAttemptedThisQuarter(user.employeeId)) {
    alert("이번 분기에는 이미 응시 완료했습니다.");
    renderCandidateDashboard();
    return;
  }
  if (!state.isTestMode && getQuotaWarnings().length > 0) {
    alert("문제은행 수량이 부족하여 시험을 시작할 수 없습니다. 관리자에게 문의하세요.");
    return;
  }

  // 응시자와 분기 기준 시드를 먼저 설정한 뒤 문제를 생성합니다.
  // 진행 중 시험은 저장되어 새로고침 또는 재접속 시 이어서 복구됩니다.
  _examSeed = _strHash(user.employeeId + getCurrentQuarter());
  _examRng = _seededRng(_examSeed);
  const questions = generateExamQuestions();
  _examRng = null;

  state.currentExam = {
    employeeId: user.employeeId,
    quarter: getCurrentQuarter(),
    startedAt: new Date().toISOString(),
    questions,
    answers: Array(questions.length).fill(null),
    tabSwitchCount: 0,
    warningLogs: [],
    disqualified: false,
    disqualificationReason: "",
    lastViolationAt: 0
  };
  state.currentQuestionIndex = 0;
  state.remainingSeconds     = examSettings.timeLimitMinutes * 60;
  state.isSubmitting         = false;

  state.view = "loading";
  render();
  setTimeout(() => {
    state.view = "exam";
    persistCurrentExam();
    renderExamScreen();
    startTimer();

function generateExamQuestions() {
  let selected = [];

  // 테스트 모드: "테스트" 카테고리 문제 전부 출제
  if (state.isTestMode) {
    const pool = questionBank.filter(q => q.category === "테스트");
    selected = examSettings.randomizeQuestions ? shuffleArray(pool) : [...pool];
    // 테스트 문제가 없으면 전체 문제 중 랜덤 최대 5개
    if (!selected.length) {
      const all = questionBank.filter(q => q.active);
      selected = shuffleArray(all).slice(0, Math.min(5, all.length));
    }
  } else {
    Object.entries(examSettings.categoryQuota).forEach(([category, count]) => {
      const pool   = questionBank.filter(q => q.active && q.category === category);
      const picked = (examSettings.randomizeQuestions ? shuffleArray(pool) : [...pool]).slice(0, Number(count));
      selected.push(...picked);
    });
    if (examSettings.randomizeQuestions) selected = shuffleArray(selected);
  }

  return selected.map(question => {
    const indexedOptions     = question.options.map((text, originalIndex) => ({ text, originalIndex }));
    const displayOptions     = examSettings.randomizeOptions ? shuffleArray(indexedOptions) : indexedOptions;
    const correctDisplayIndex = displayOptions.findIndex(option => option.originalIndex === question.answerIndex);
    return {
      questionId: question.id,
      category: question.category,
      text: question.text,
      options: displayOptions.map(option => option.text),
      correctDisplayIndex
    };
  });
}

/* ─── 타이머 + 감시 ───────────────────────────── */
function clearTimer() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

function startTimer() {
  clearTimer();
  addExamGuards();
  state.timerId = setInterval(() => {
    state.remainingSeconds -= 1;
    if (state.remainingSeconds % 5 === 0) persistCurrentExam(false);
    const timer = document.getElementById("remainingTime");
    if (timer) timer.textContent = formatRemainingTime(state.remainingSeconds);
    if (state.remainingSeconds <= 0) {
      clearTimer();
      submitExam(true, false, "시간 종료로 자동 제출");
    }
  }, 1000);
}

function handlePreExamVisibility() {
  if (window._appJustLoaded) return;

    savePersistentData();
  }
}

// ── 새로고침 차단 가드 (관리자 화면 제외 전체) ──────────────────────────────────
function _appBeforeUnload(e) {
  // 시험 중이 아닌 경우(로그인/대기/결과/로딩)는 조용히 차단
  if (state.view === "exam") {
    e.preventDefault();
    e.returnValue = "시험이 진행 중입니다. 페이지를 이탈하면 응시 내용이 유실될 수 있습니다.";
    return e.returnValue;
  }
  e.preventDefault();
  e.returnValue = "";
  return "";
}
function _appKeyDown(e) {
  // F5 / Ctrl+R / Cmd+R 차단
  if (e.key === "F5" || ((e.ctrlKey || e.metaKey) && (e.key === "r" || e.key === "R"))) {
    e.preventDefault();
    e.stopPropagation();
  }
}
// 모바일 pull-to-refresh는 CSS overscroll-behavior:none으로만 차단 (터치 이벤트 불필요)
let _appRefreshGuardActive = false;
function addAppRefreshGuard() {
  if (_appRefreshGuardActive) return;
  _appRefreshGuardActive = true;
  window.addEventListener("beforeunload", _appBeforeUnload);
  window.addEventListener("keydown", _appKeyDown, true);
  // pull-to-refresh는 CSS overscroll-behavior:none으로 고정 차단
}
function removeAppRefreshGuard() {
  if (!_appRefreshGuardActive) return;
  _appRefreshGuardActive = false;
  window.removeEventListener("beforeunload", _appBeforeUnload);
  window.removeEventListener("keydown", _appKeyDown, true);

}

// 구버전 호환 (로딩 가드 → 앱 가드로 통합)
function addLoadingGuards()    { addAppRefreshGuard(); }
function removeLoadingGuards() { /* 앱 가드는 관리자 화면에서만 해제 */ }

function addExamGuards() {
  window.onbeforeunload = () => "시험이 진행 중입니다. 페이지를 이탈하면 응시 내용이 유실될 수 있습니다.";
  document.addEventListener("visibilitychange", handleVisibilityChange);
  window.addEventListener("blur", handleWindowBlur);
  window.addEventListener("pagehide", handlePageHide);
}

function removeExamGuards() {
  window.onbeforeunload = null;
  document.removeEventListener("visibilitychange", handleVisibilityChange);
  window.removeEventListener("blur", handleWindowBlur);
  window.removeEventListener("pagehide", handlePageHide);
}

function handlePageHide() {
  registerExamExitViolation("pagehide-exit");
}

function handleVisibilityChange() {
  if (document.hidden) {
    // 로딩 중이거나 새로고침 직후면 무시
    if (state.view === "loading" || window._appJustLoaded) return;
    // 이탈 시각 기록
    state._tabHiddenAt = Date.now();
    handleTabSwitchViolation("visibilitychange");
  } else {
    // 복귀 시 이탈 동안 경과시간 차감
    if (state._tabHiddenAt && state.view === "exam" && state.currentExam && !state.isSubmitting) {
      const elapsed = Math.floor((Date.now() - state._tabHiddenAt) / 1000);
      state.remainingSeconds = Math.max(0, state.remainingSeconds - elapsed);
      const timer = document.getElementById("remainingTime");
      if (timer) timer.textContent = formatRemainingTime(state.remainingSeconds);
      if (state.remainingSeconds <= 0) {
        clearTimer();
        submitExam(true, false, "시간 종료로 자동 제출");
        return;
      }
      persistCurrentExam(false);
    }
    state._tabHiddenAt = null;
  }
}
function handleWindowBlur() {
  // §8: visibilitychange 가 이미 처리했으면 blur 무시
  setTimeout(() => {
    if (window._appJustLoaded) return;
    if (!document.hidden) return;
    const now = Date.now();
    if (state.currentExam && now - state.currentExam.lastViolationAt < 3000) return;
    handleTabSwitchViolation("blur-confirmed");
  }, 300);
}

function registerExamExitViolation(source = "exit") {
  if (state.view !== "exam" || !state.currentExam || state.isSubmitting) return;
  const now = Date.now();
  if (now - state.currentExam.lastViolationAt < 900) {
    persistCurrentExam(false);
    return;
  }
  state.currentExam.lastViolationAt = now;
  state.currentExam.tabSwitchCount += 1;
  const count = state.currentExam.tabSwitchCount;
  const createdAt = new Date().toISOString();
  const message = count >= examSettings.tabSwitchLimit
    ? `페이지 이탈 누적 ${count}회: 재접속 시 자동 제출 및 실격 처리됩니다.`
    : `페이지 이탈 ${count}회 감지: 재접속 후 누적됩니다.`;
  state.currentExam.warningLogs.push({ at: createdAt, source, message });
  activityLogs.push({
    logId: nextId(activityLogs, "logId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: count >= examSettings.tabSwitchLimit ? "DISQUALIFIED" : "WARNING",
    message, tabSwitchCount: count, createdAt
  });
  if (count >= examSettings.tabSwitchLimit) {
    state.currentExam.disqualified = true;
    state.currentExam.disqualificationReason = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
  }
  persistCurrentExam(false);
}

function handleTabSwitchViolation(source = "unknown") {
  if (state.view !== "exam" || !state.currentExam || state.isSubmitting) return;

  const now = Date.now();
  // §8: 3초 쿨다운 — 같은 이탈 이벤트 중복 카운트 방지
  if (now - state.currentExam.lastViolationAt < 3000) return;
  state.currentExam.lastViolationAt = now;

  state.currentExam.tabSwitchCount += 1;
  const count = state.currentExam.tabSwitchCount;
  let message = "";
  if      (count === 1) message = "탭 전환 또는 창 이탈 1회 감지: 경고입니다.";
  else if (count === 2) message = "탭 전환 또는 창 이탈 2회 감지: 마지막 경고입니다.";
  else                  message = `탭 전환 또는 창 이탈 ${count}회 감지: 자동 제출 및 실격 처리됩니다.`;

  const createdAt = new Date().toISOString();
  state.currentExam.warningLogs.push({ at: createdAt, source, message });
  activityLogs.push({
    logId: nextId(activityLogs, "logId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: count >= examSettings.tabSwitchLimit ? "DISQUALIFIED" : "WARNING",
    message, tabSwitchCount: count, createdAt
  });

  persistCurrentExam();

  const warnBar = document.getElementById("examWarningBar");
  if (warnBar) {
    warnBar.innerHTML = `화면 전환 : <strong id="tabSwitchCount">${count}/${examSettings.tabSwitchLimit}</strong>`;
    warnBar.className = count >= examSettings.tabSwitchLimit ? "v2-exam-warn danger" : "v2-exam-warn";
  }

  if (count >= examSettings.tabSwitchLimit) {
    state.currentExam.disqualified            = true;
    state.currentExam.disqualificationReason  = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
    submitExam(true, true, `탭 전환 ${examSettings.tabSwitchLimit}회 이상으로 자동 제출 및 실격`);
  }
}

function formatRemainingTime(seconds) {
  const safe = Math.max(0, seconds);
  const m    = Math.floor(safe / 60);
  const s    = safe % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

/* ─── 시험 화면 렌더 ─────────────────────────── */
function renderExamScreen() {
  const exam = state.currentExam;
  if (!exam) { state.view = "candidate"; renderCandidateDashboard(); return; }

  const answeredCount   = exam.answers.filter(a => a !== null).length;
  const progressPercent = Math.round((answeredCount / exam.questions.length) * 100);
  const unanswered      = exam.questions.length - answeredCount;

  const questionsHtml = exam.questions.map((question, index) => {
    const answered = exam.answers[index] !== null;
    return `
    <section class="v2-question-card ${answered ? "v2-question-answered" : ""}" id="q${index}" aria-labelledby="qt${index}">
      <h3 id="qt${index}" class="v2-question-text"><span class="v2-question-num">${index + 1}.</span> ${formatText(question.text)}</h3>
      <fieldset style="border:0;padding:0;margin:0">
        <legend class="sr-only">문항 ${index + 1} 답안 선택</legend>
        ${question.options.map((option, optionIndex) => {
          const selected = exam.answers[index] === optionIndex;
          return `
          <label class="v2-option ${selected ? "v2-option-selected" : ""}">
            <input
              type="radio" name="answer_${index}" value="${optionIndex}"
              ${selected ? "checked" : ""}
              onclick="selectAnswerLock(${index}, ${optionIndex})"
            />
            <span class="v2-option-no">${optionIndex + 1}</span>
            <span class="v2-option-text">${escapeHtml(option)}</span>
          </label>`;
        }).join("")}
      </fieldset>
    </section>`;
  }).join("");

  app.innerHTML = `
    ${buildHeader()}
    <div class="v2-exam-bar" id="examStickyBar">
      <div class="v2-exam-bar-inner">
        <div class="v2-exam-bar-left">
          <span id="examWarningBar" class="v2-exam-warn">화면 전환 : <strong id="tabSwitchCount">${exam.tabSwitchCount}/${examSettings.tabSwitchLimit}</strong></span>
        </div>
        <div class="v2-exam-bar-center">
          <span class="v2-exam-timer" id="remainingTime">${formatRemainingTime(state.remainingSeconds)}</span>
        </div>
        <div class="v2-exam-bar-right">
          <span class="v2-exam-progress-text">${answeredCount}/${exam.questions.length}</span>

        </div>
      </div>
      <div class="v2-exam-progress-track">
        <div class="v2-exam-progress-fill" style="width:${progressPercent}%"></div>
      </div>
    </div>

    <main class="container v2-exam-container">
      ${questionsHtml}
      <div class="v2-submit-bottom">
        <button class="btn v2-submit-final-btn" id="bottomSubmitBtn" type="button"
        style="${unanswered > 0 ? 'background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:not-allowed;font-weight:700' : 'animation:pulseGlow 1.4s ease-in-out infinite'}"
        ${unanswered > 0 ? 'disabled' : 'onclick="openSubmitConfirm()"'}
      >${unanswered > 0 ? `미응답 ${unanswered}문항 남음` : '✓ 최종 제출'}</button>
      </div>
    </main>
  `;
}



function updateSubmitButtonState() {
  if (!state.currentExam) return;
  const total       = state.currentExam.questions.length;
  const answered    = state.currentExam.answers.filter(a => a !== null).length;
  const unanswered  = total - answered;
  const finalBtn    = document.getElementById('bottomSubmitBtn');
  if (finalBtn) {
    if (unanswered > 0) {
      finalBtn.disabled = true;
      finalBtn.textContent = `미응답 ${unanswered}문항 남음`;
      finalBtn.style.cssText = 'background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:not-allowed;font-weight:700';
      finalBtn.onclick = null;
      finalBtn.classList.remove('primary');
    } else {
      finalBtn.disabled = false;
      finalBtn.textContent = '✓ 최종 제출';
      finalBtn.style.cssText = 'animation:pulseGlow 1.4s ease-in-out infinite';
      finalBtn.onclick = openSubmitConfirm;
      finalBtn.classList.add('primary');
    }
  }
  const statEl = document.querySelector('.v2-exam-progress-text');
  if (statEl) statEl.textContent = answered + '/' + total;
}
function selectAnswerLock(questionIndex, optionIndex) {
  if (!state.currentExam) return;
  // 이미 같은 답이 선택된 경우 → 선택 해제(토글)
  if (state.currentExam.answers[questionIndex] === optionIndex) {
    state.currentExam.answers[questionIndex] = null;
    persistCurrentExam();
    const qSection = document.getElementById(`q${questionIndex}`);
    if (qSection) {
      qSection.querySelectorAll('.v2-option').forEach(opt => {
        opt.classList.remove('v2-option-selected');
        opt.setAttribute('aria-checked', 'false');
      });
      // 답변완료 클래스 제거
      qSection.classList.remove('v2-question-answered');
    }
    updateSubmitButtonState();
    return;
  }
  selectAnswerAll(questionIndex, optionIndex);
}
function selectAnswerAll(questionIndex, optionIndex) {
  if (!state.currentExam) return;
  state.currentExam.answers[questionIndex] = optionIndex;
  persistCurrentExam();

  const qSection = document.getElementById(`q${questionIndex}`);
  if (qSection) {
    qSection.querySelectorAll('.v2-option').forEach(opt => opt.classList.remove('v2-option-selected'));
    const labels = qSection.querySelectorAll('.v2-option');
    if (labels[optionIndex]) labels[optionIndex].classList.add('v2-option-selected');
    qSection.classList.add('v2-question-answered');
  }

  const total = state.currentExam.questions.length;
  const answeredCount = state.currentExam.answers.filter(a => a !== null).length;
  const unanswered = total - answeredCount;
  const progressPercent = Math.round((answeredCount / total) * 100);

  const fill = document.querySelector('.v2-exam-progress-fill');
  if (fill) fill.style.width = progressPercent + '%';

  const statEl = document.querySelector('.v2-exam-progress-text');
  if (statEl) statEl.textContent = answeredCount + '/' + total;

  const finalBtn = document.getElementById('bottomSubmitBtn');
  if (finalBtn) {
    if (unanswered > 0) {
      finalBtn.disabled = true;
      finalBtn.textContent = `미응답 ${unanswered}문항 남음`;
      finalBtn.style.cssText = 'background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:not-allowed;font-weight:700';
      finalBtn.onclick = null;
      finalBtn.classList.remove('primary');
    } else {
      finalBtn.disabled = false;
      finalBtn.textContent = '✓ 최종 제출';
      finalBtn.style.cssText = 'animation:pulseGlow 1.4s ease-in-out infinite';
      finalBtn.onclick = openSubmitConfirm;
      finalBtn.classList.add('primary');
    }
  }
}

/* ─── 제출 확인 모달 ─────────────────────────── */
function openSubmitConfirm() {
  if (!state.currentExam) return;
  const unanswered = state.currentExam.answers.filter(a => a === null).length;
  if (unanswered > 0) { alert(`미응답 문항이 ${unanswered}개 남아 있습니다.`); return; }
  modalRoot.innerHTML = `
    <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="submitModalTitle">
      <section class="modal sm">
        <h2 id="submitModalTitle">시험을 제출하시겠습니까?</h2>
        <div class="notice warning">제출 후 문제와 정답, 해설은 응시자에게 공개되지 않으며 재응시는 제한됩니다.</div>
        <div class="modal-actions">
          <button class="btn" type="button" onclick="closeModal()">계속 응시</button>
          <button class="btn primary" type="button" onclick="submitExam(false, false, '시험 제출 완료')">제출</button>
        </div>
      </section>

  `;
}

function closeModal() { modalRoot.innerHTML = ""; }

/* ─── 채점 & 제출 ─────────────────────────────── */
function calculateScore(exam) {
  const total        = exam.questions.length;
  const correctCount = exam.questions.reduce((sum, question, index) =>
    sum + (exam.answers[index] === question.correctDisplayIndex ? 1 : 0), 0);
  const totalScore       = correctCount * examSettings.pointsPerQuestion;
  const maxScore         = total * examSettings.pointsPerQuestion;
  const percentageScore  = Math.round((totalScore / maxScore) * 100);
  const disqualified     = Boolean(exam.disqualified);
  return {
    correctCount, totalCount: total, totalScore, maxScore, percentageScore,
    score: percentageScore,
    passed: !disqualified && percentageScore >= examSettings.passingScore,
    disqualified
  };

  // 합격 시 폭죽 애니메이션
  if (passed) {
    requestAnimationFrame(() => launchConfetti());
  }
}

function submitExam(isAutoSubmit = false, forceDisqualified = false, submitMessage = "시험 제출 완료") {
  // §7: 프론트 중복 제출 방지
  if (!state.currentExam || state.isSubmitting) return;
  state.isSubmitting = true;

  const _submitBtn = document.getElementById("submitExamBtn");
  if (_submitBtn) { _submitBtn.disabled = true; _submitBtn.textContent = "제출 중..."; }

  closeModal();
  clearTimer();
  removeExamGuards();

  if (hasAttemptedThisQuarter(state.currentUser.employeeId, state.currentExam.quarter)) {
    alert("이미 제출된 응시 기록이 있습니다.");
    clearActiveExamRecord(state.currentUser.employeeId, state.currentExam.quarter);
    try { localStorage.removeItem("exam_answers_" + state.currentUser.employeeId); } catch(e) {}
    state.currentExam  = null;
    state.view         = "candidate";
    state.isSubmitting = false;
    renderCandidateDashboard();
    return;
  }

  if (forceDisqualified) {
    state.currentExam.disqualified           = true;
    state.currentExam.disqualificationReason = state.currentExam.disqualificationReason || `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
  }

  const scoring = calculateScore(state.currentExam);
  const result  = {
    resultId: nextId(examResults, "resultId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    quarter: state.currentExam.quarter,
    totalScore: scoring.totalScore,
    maxScore: scoring.maxScore,
    percentageScore: scoring.percentageScore,
    score: scoring.score,
    correctCount: scoring.correctCount,
    totalCount: scoring.totalCount,
    passed: scoring.passed,
    disqualified: scoring.disqualified,
    disqualificationReason: scoring.disqualified
      ? (state.currentExam.disqualificationReason || "운영 정책 위반") : "",
    tabSwitchCount: state.currentExam.tabSwitchCount,
    startedAt: state.currentExam.startedAt || null,
    submittedAt: new Date().toISOString()
  };

  if (result.passed && !result.disqualified) {
    const valid = getCertificationValidity(result);
    result.validFrom = valid.validFrom;
    result.validUntil = valid.validUntil;
  }

  const submitLog = {
    logId: nextId(activityLogs, "logId"),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: result.disqualified ? "DISQUALIFIED_SUBMIT" : (isAutoSubmit ? "AUTO_SUBMIT" : "SUBMIT"),
    message: submitMessage,
    tabSwitchCount: result.tabSwitchCount,
    createdAt: result.submittedAt
  };

  if (!state.isTestMode) {
    examResults.push(result);
    activityLogs.push(submitLog);
    clearActiveExamRecord(state.currentUser.employeeId, state.currentExam.quarter);
    savePersistentData();
    appendResultToSheet(result, submitLog);
    // §6: 제출 완료 후 localStorage 임시 답안 삭제
    try { localStorage.removeItem("exam_answers_" + result.employeeId); } catch(e) {}
  }

  state.lastResult   = result;
  state.currentExam  = null;
  state.view         = "result";
  state.isSubmitting = false;
  renderResultScreen();
}

/* ─── 결과 화면 ───────────────────────────────── */

  clearIntroCountdown();
  // 서버 동기화 완료 후라면 최신 examResults 기준으로 재확인

    const empId = state.currentUser.employeeId;

      r.employeeId === empId && r.quarter === getCurrentQuarter()

          <div class="v2-result-emoji" aria-hidden="true">${emoji}</div>
          <h2 id="resultTitle" class="v2-result-label ${cls}">${label}</h2>
          <p class="v2-result-sub">응시하느라 고생하셨습니다. 감사합니다.</p>
          ${result.disqualified ? `<p class="v2-result-disq">실격 사유: ${escapeHtml(result.disqualificationReason)}</p>` : ""}
        </div>

        <!-- 점수 게이지 -->
        <div class="v2-score-gauge-wrap" aria-label="점수 ${result.percentageScore}점">
          <div class="v2-score-num ${cls}">${result.percentageScore}<span class="v2-score-unit">점</span></div>
          <div class="v2-score-gauge-outer">
            <div class="v2-score-gauge-track">
              <div class="v2-score-gauge-fill ${cls}" style="width:${scoreBar}%"></div>
            </div>

          </div>
        </div>

        <!-- 상세 스탯: 총문항(좌) / 정답(중) / 오답(우) -->
        <div class="v2-result-stats">
          <div class="v2-result-stat">
            <span class="v2-result-stat-key">총 문항</span>
            <span class="v2-result-stat-val neutral">${result.totalCount}</span>
          </div>
          <div class="v2-result-stat-div"></div>
          <div class="v2-result-stat">
            <span class="v2-result-stat-key">정답</span>
            <span class="v2-result-stat-val correct">${result.correctCount}</span>
          </div>
          <div class="v2-result-stat-div"></div>
          <div class="v2-result-stat">
            <span class="v2-result-stat-key">오답</span>
            <span class="v2-result-stat-val wrong">${wrong}</span>
          </div>
        </div>

      </section>

function launchConfetti() {
  // 기존 캔버스 제거
  const existing = document.getElementById('confettiCanvas');
  if (existing) existing.remove();

  const canvas = document.createElement('canvas');
  canvas.id = 'confettiCanvas';
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#4f8ef7','#f7c948','#f74f4f','#4ff7a1','#c44ff7','#f7924f','#ff69b4','#00e5ff','#ffeb3b','#76ff03'];
  const shapes = ['rect','circle','ribbon'];

  const particles = Array.from({length: 280}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * canvas.height * 0.5,
    w: 6 + Math.random() * 10,
    h: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    shape: shapes[Math.floor(Math.random() * shapes.length)],
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 5,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.25,
    alpha: 1,
    gravity: 0.08 + Math.random() * 0.06
  }));

  let frame = 0;
  const maxFrames = 240;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      } else if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w/2, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(-p.w/2, 0);
        ctx.quadraticCurveTo(0, -p.h, p.w/2, 0);
        ctx.quadraticCurveTo(0, p.h, -p.w/2, 0);
        ctx.fill();
      }
      ctx.restore();
      p.vy += p.gravity;
      p.x += p.vx + Math.sin(frame * 0.05 + p.vy) * 0.8;
      p.y += p.vy;
      p.angle += p.spin;
      if (frame > 140) p.alpha = Math.max(0, p.alpha - 0.008);
    });
    frame++;
    if (frame < maxFrames) requestAnimationFrame(draw);
    else canvas.remove();
  }

  // 3번 연속 발사
  draw();
  setTimeout(() => {
    particles.forEach(p => { p.y = -20 - Math.random() * 80; p.alpha = 1; p.vy = 1 + Math.random() * 4; });
    frame = 0;
    draw();
  }, 600);
  setTimeout(() => {
    particles.forEach(p => { p.y = -20 - Math.random() * 120; p.alpha = 1; p.vy = 1 + Math.random() * 4; });
    frame = 0;
    draw();
  }, 1200);
}
