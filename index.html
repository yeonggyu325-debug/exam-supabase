let _remoteSaveTimer = null;
let _remoteSaveRetries = 0;

function queueRemoteSave() {
  // 짧은 시간 내 여러 저장 요청을 1번으로 묶어서 서버 부담 감소 (디바운스)
  clearTimeout(_remoteSaveTimer);
  _remoteSaveTimer = setTimeout(() => _doRemoteSave(), 400);
}

function _doRemoteSave() {
  const snapshot = { users, questionBank, examSettings, examResults, activityLogs, activeExams, managedAffiliations };
  if (isAppsScriptRuntime()) {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.retry) {
          _retryRemoteSave();
        } else {
          _remoteSaveRetries = 0;
        }
      })
      .withFailureHandler(error => {
        console.warn("스프레드시트 저장에 실패했습니다.", error);
        _retryRemoteSave();
      })
      .saveAppData(snapshot);
    return;
  }
  if (isExternalApiRuntime()) {
    callExternalApi("saveAppData", snapshot)
      .then(res => {
        if (res && res.retry) _retryRemoteSave();
        else _remoteSaveRetries = 0;
      })
      .catch(error => {
        console.warn("외부 API 저장에 실패했습니다.", error);
        _retryRemoteSave();
      });
  }
}

// 동시 저장 충돌(락 점유 중) 시 최대 3회까지 점증 대기 후 재시도
function _retryRemoteSave() {
  if (_remoteSaveRetries >= 3) { _remoteSaveRetries = 0; return; }
  _remoteSaveRetries += 1;
  const delay = 800 * _remoteSaveRetries;
  setTimeout(() => _doRemoteSave(), delay);
}

function getPendingSubmissionKey(employeeId, quarter) {
  return "HNIRUJA_PENDING_SUBMISSION__" + String(employeeId || "") + "__" + String(quarter || getCurrentQuarter());
}

function getPendingSubmissionMaxAgeMs() {
  const minutes = Number(examSettings?.timeLimitMinutes || 30);
  return Math.max(30, minutes + 10) * 60 * 1000;
}

function savePendingSubmission(result, log) {
  try {
    if (!result?.employeeId || !result?.quarter) return;
    const payload = {
      result,
      log,
      savedAt: new Date().toISOString(),
      version: 1
    };
    sessionStorage.setItem(getPendingSubmissionKey(result.employeeId, result.quarter), JSON.stringify(payload));
  } catch (e) {
    console.warn("임시 제출 데이터 저장 실패", e);
  }
}

function clearPendingSubmission(employeeId, quarter) {
  try {
    if (employeeId && quarter) {
      sessionStorage.removeItem(getPendingSubmissionKey(employeeId, quarter));
      return;
    }
    Object.keys(sessionStorage || {}).forEach((key) => {
      if (key.startsWith("HNIRUJA_PENDING_SUBMISSION__")) sessionStorage.removeItem(key);
    });
  } catch (e) {}
}

function getPendingSubmission(employeeId = "", quarter = "") {
  try {
    const keys = Object.keys(sessionStorage || {}).filter((key) => key.startsWith("HNIRUJA_PENDING_SUBMISSION__"));
    for (const key of keys) {
      const raw = sessionStorage.getItem(key);
      if (!raw) continue;
      const payload = JSON.parse(raw);
      const result = payload?.result;
      if (!result?.employeeId || !result?.quarter) {
        sessionStorage.removeItem(key);
        continue;
      }
      if (employeeId && String(result.employeeId) !== String(employeeId)) continue;
      if (quarter && String(result.quarter) !== String(quarter)) continue;
      const savedAt = payload.savedAt ? new Date(payload.savedAt).getTime() : 0;
      const expired = !savedAt || (Date.now() - savedAt) > getPendingSubmissionMaxAgeMs();
      if (expired) {
        sessionStorage.removeItem(key);
        continue;
      }
      return { ...payload, key };
    }
  } catch (e) {
    console.warn("임시 제출 데이터 확인 실패", e);
  }
  return null;
}

async function retryPendingSubmissions(employeeId = "") {
  const pending = getPendingSubmission(employeeId);
  if (!pending?.result) return { ok: false, skipped: true };
  try {
    const res = await appendResultToSheet(pending.result, pending.log);
    if (!res?.ok) throw new Error(res?.message || "임시 제출 재전송 실패");
    clearPendingSubmission(pending.result.employeeId, pending.result.quarter);

    const resultExists = examResults.some((r) => r.employeeId === pending.result.employeeId && r.quarter === pending.result.quarter);
    if (!resultExists) examResults.push(pending.result);
    if (pending.log && !activityLogs.some((l) => l.logId === pending.log.logId)) activityLogs.push(pending.log);
    clearActiveExamRecord(pending.result.employeeId, pending.result.quarter);

    return { ok: true, duplicate: !!res?.duplicate, result: pending.result };
  } catch (e) {
    console.warn("임시 제출 재전송 실패", e);
    return { ok: false, message: e.message || String(e), result: pending.result };
  }
}

async function _sendExamSubmissionOnce(result, log) {
  if (isAppsScriptRuntime()) {
    return await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => resolve(res || { ok: true }))
        .withFailureHandler(reject)
        .appendExamSubmission(result, log);
    });
  }

  if (isExternalApiRuntime()) {
    return await callExternalApi("appendExamSubmission", { result, log });
  }

  return { ok: false, message: "서버 연결을 사용할 수 없습니다." };
}

async function saveActiveExamRecord(record) {
  if (!record || !isExternalApiRuntime()) return { ok: true, localOnly: true };
  const res = await callExternalApi("saveActiveExamData", { record });
  if (res?.ok === false) throw new Error(res.message || "진행 중 시험 저장 실패");
  return res || { ok: true };
}

async function saveActivityLog(log) {
  if (!log || !isExternalApiRuntime()) return { ok: true, localOnly: true };
  const res = await callExternalApi("insertActivityLogData", { log });
  if (res?.ok === false) throw new Error(res.message || "로그 저장 실패");
  return res || { ok: true };
}

async function appendResultToSheet(result, log) {
  const delays = [1000, 2000, 4000];

  for (let attempt = 0; attempt <= delays.length; attempt++) {
    try {
      const res = await _sendExamSubmissionOnce(result, log);
      if (res?.ok === false) throw new Error(res.message || "제출 저장 실패");
      return { ok: true, duplicate: !!res?.duplicate };
    } catch (error) {
      console.warn("응시 결과 서버 저장 실패 " + (attempt + 1) + "회", error);
      if (attempt >= delays.length) {
        return {
          ok: false,
          message: "서버 저장에 실패했습니다. 네트워크 연결 또는 데이터베이스 상태를 확인한 뒤 다시 제출해 주세요."
        };
      }
      await new Promise((resolve) => setTimeout(resolve, delays[attempt]));
    }
  }
}

function formatDateOnly(iso) {
  if (!iso) return "-";
  return new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date(iso));
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function getCertificationValidity(result) {
  if (!result || !result.passed || result.disqualified) return null;
  const validFrom = result.validFrom || addDays(new Date(result.submittedAt), 1).toISOString();
  const until = result.validUntil ? new Date(result.validUntil) : addDays(new Date(validFrom), 365);
  if (!result.validUntil) until.setDate(until.getDate() - 1);
  return { validFrom, validUntil: result.validUntil || until.toISOString() };
}

function getResultComment(result) {
  if (result.disqualified) return "응시하느라 고생 많으셨습니다. 실격 처리되어 다음 분기 안전담당자 시험에 다시 응시바랍니다.";
  if (result.passed) return "응시하느라 고생 많으셨습니다. 앞으로 현장안전을 위해 힘써주시기 바랍니다.";
  return "응시하느라 고생 많으셨습니다. 다음 분기 안전담당자 시험에 다시 응시바랍니다.";
}

    if (result && result.ok) {
      // 토큰 세션 저장 (탭 닫기 전까지 유지)
      try { sessionStorage.setItem("hniruja_admin_token", JSON.stringify({ token: result.token, ts: result.ts })); } catch(e) {}
      const admin = { employeeId: result.adminId || "ADM-SERVER", department: "", name: "ADMIN", role: "admin" };
      state.currentUser = admin;
      state.view = "admin";
      state.loginError = "";
      closeModal();
      render();
    } else {
      if (errEl) { errEl.textContent = result?.message || "비밀번호가 올바르지 않습니다."; errEl.style.display = "block"; }
      btn.disabled = false;
      btn.textContent = "확인";
    }
  } catch(e) {
    if (errEl) { errEl.textContent = "서버 오류: " + e.message; errEl.style.display = "block"; }
    btn.disabled = false;
    btn.textContent = "확인";
  }
}

async function handleLogin(event) {
  event.preventDefault();
  const form       = new FormData(event.currentTarget);
  const department = String(form.get("department") || "").trim();
  const name       = String(form.get("name") || "").trim();
  const type       = String(form.get("type") || "").trim();

  // 테스트 모드: 운영 DB 저장 없이 화면/출제 흐름 점검용
  if (name.toLowerCase() === "test") {
    resetDemoModeState();
    state.currentUser = { employeeId: "TEST-0001", department: department || "테스트", name: "테스트", role: "candidate" };
    state.loginError  = "";
    state.isTestMode  = true;
    state.view        = "candidate";
    render();
    return;
  }

  // 관리자 코드 로그인: 구분/소속 선택과 무관하게 서버 admin_config.password_hash 기준으로 검증
  if (name) {
    try {
      const result = await callExternalApi("adminLogin", { password: name });
      if (result?.ok) {
        if (result.data) applyRemoteData(result.data);
        try { sessionStorage.setItem("hniruja_admin_token", JSON.stringify({ token: result.token, ts: result.ts })); } catch(e) {}
        state.currentUser = { employeeId: result.adminId || "ADM-SERVER", department: "", name: "ADMIN", role: "admin" };
        state.view        = "admin";
        state.loginError  = "";
        state.isTestMode  = false;
        render();
        return;
      }
    } catch (e) {
      // 일반 응시자 로그인 시도일 수 있으므로 관리자 코드 불일치는 조용히 통과합니다.
    }
  }

  if (!name) {
    state.loginError = "성명을 입력해 주세요.";
    renderLogin();
    return;
  }
  if (!type || !department) {
    state.loginError = !type ? "구분을 선택해 주세요." : "소속을 선택해 주세요.";
    renderLogin();
    return;
  }

  state.view = "loading";
  renderLoadingScreen("응시자 정보를 확인하는 중입니다", 20);

  let candidate = null;
  try {
    if (isExternalApiRuntime()) {
      candidate = await callExternalApi("findCandidate", { department, name });
    } else {
      candidate = users.find(user => user.role === "candidate" && user.department === department && user.name === name);
    }
  } catch (e) {
    console.error("응시자 조회 실패", e);
    state.loginError = "응시자 정보를 확인하지 못했습니다. 네트워크 또는 데이터베이스 상태를 확인해 주세요.";
    state.view = "login";
    renderLogin();
    return;
  }

  if (candidate) {
    state.currentUser = candidate;
    state.loginError  = "";
    state.lastResult  = null;
    state.isSubmitting = false;

    try {
      updateLoadingProgress(45, "시험 정보를 불러오는 중입니다");
      await loadCandidateRuntimeData(candidate);

      const pendingRetry = await retryPendingSubmissions(candidate.employeeId);
      if (pendingRetry?.ok && pendingRetry.result) {
        state.lastResult = pendingRetry.result;
        state.view = "result";
        updateLoadingProgress(100, "임시 제출 데이터를 복구했습니다");
        setTimeout(() => renderResultScreen(), 100);
        return;
      }

      updateLoadingProgress(100, "완료!");

      const currentQuarterResult = examResults
        .filter(result => result.employeeId === candidate.employeeId && result.quarter === getCurrentQuarter())
        .sort((a, b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0))[0];
      if (currentQuarterResult) {
        state.lastResult = currentQuarterResult;
        state.view = "result";
        renderResultScreen();
        return;
      }

      let activeRecord = getActiveExamRecord(candidate.employeeId);
      if (restoreActiveExamRecord(activeRecord)) {
        renderExamScreen();
        startTimer();
        return;
      }

      state.view = "candidate";
      renderCandidateDashboard();
      return;
    } catch (e) {
      console.error("응시 정보 로드 실패", e);
      state.loginError = "응시 정보를 불러오지 못했습니다. 네트워크 또는 Supabase 권한 설정을 확인해 주세요.";
      state.view = "login";
      renderLogin();
      return;
    }
  }


  state.loginError = "등록된 응시자 정보와 일치하지 않습니다. 소속과 성명을 다시 확인하세요.";
  renderLogin();
}

function onAgreeChange() {
  const btn = document.getElementById('startExamBtn');
  const done = state.examIntroReady;
  const checked = document.getElementById('agreeCheck')?.checked;
  if (btn) btn.disabled = !(done && checked);
  // 응시확인 체크 시점부터 화면전환 감지 시작
  state.examGuardActive = !!checked;
  if (checked) addPreExamGuards();
  else removePreExamGuards();
}
function clearIntroCountdown() {
  if (state.introTimerId) {
    clearTimeout(state.introTimerId);
    state.introTimerId = null;
  }
}

function startIntroCountdown() {
  state.examIntroReady = false;
  const duration = 15000; // 15초
  const startTime = performance.now();

  const tick = (now) => {
    const elapsed = now - startTime;
    const pct = Math.min((elapsed / duration) * 100, 100);
    const fill = document.getElementById('gaugeFill');
    if (fill) fill.style.width = pct + '%';

    if (elapsed < duration) {
      state.introRaf = requestAnimationFrame(tick);
    } else {
      state.examIntroReady = true;
      const checked = document.getElementById('agreeCheck')?.checked;
      const btn = document.getElementById('startExamBtn');
      if (btn) btn.disabled = !checked;
    }
  };

  state.introRaf = requestAnimationFrame(tick);
}

/* ─── 시험 시작 ───────────────────────────────── */
function startExam() {
  if (!state.examIntroReady) {
    alert("안내문을 10초 이상 확인한 뒤 응시할 수 있습니다.");
    return;
  }
  clearIntroCountdown();
  const user = state.currentUser;
  // §2: 이미 제출 완료 또는 실격이면 결과화면만 표시
  if (!state.isTestMode) {
    const existingResult = getLatestResult(user.employeeId);
    if (existingResult) {
      state.lastResult = existingResult;
      state.view = "result";
      renderResultScreen();
      return;
    }
  }
  if (!state.isTestMode && hasAttemptedThisQuarter(user.employeeId)) {
    alert("이번 분기에는 이미 응시 완료했습니다.");
    renderCandidateDashboard();
    return;
  }
  if (!state.isTestMode && getQuotaWarnings().length > 0) {
    alert("문제은행 수량이 부족하여 시험을 시작할 수 없습니다. 관리자에게 문의하세요.");
    return;
  }

  const activeRecord = getActiveExamRecord(user.employeeId);
  if (!state.isTestMode && restoreActiveExamRecord(activeRecord)) {
    renderExamScreen();
    startTimer();
    return;
  }

  // 응시자와 분기 기준 시드를 먼저 설정한 뒤 문제를 생성합니다.
  // 진행 중 시험은 저장되어 새로고침 또는 재접속 시 이어서 복구됩니다.
  _examSeed = _strHash(user.employeeId + getCurrentQuarter());
  _examRng = _seededRng(_examSeed);
  const questions = generateExamQuestions();
  _examRng = null;

  state.currentExam = {
    employeeId: user.employeeId,
    quarter: getCurrentQuarter(),
    startedAt: new Date().toISOString(),
    questions,
    answers: Array(questions.length).fill(null),
    tabSwitchCount: 0,
    warningLogs: [],
    disqualified: false,
    disqualificationReason: "",
    lastViolationAt: 0
  };
  state.currentQuestionIndex = 0;
  state.remainingSeconds     = examSettings.timeLimitMinutes * 60;
  state.isSubmitting         = false;
  // 로딩 화면 표시 후 시험 진입
  state.view = "loading";
  render();
  setTimeout(() => {
    state.view = "exam";
    persistCurrentExam();
    renderExamScreen();
    startTimer();
  }, 300);
}

function generateExamQuestions() {
  let selected = [];

  // 테스트 모드: "테스트" 카테고리 문제 전부 출제
  if (state.isTestMode) {
    const pool = questionBank.filter(q => q.category === "테스트");
    selected = examSettings.randomizeQuestions ? shuffleArray(pool) : [...pool];
    // 테스트 문제가 없으면 전체 문제 중 랜덤 최대 5개
    if (!selected.length) {
      const all = questionBank.filter(q => q.active);
      selected = shuffleArray(all).slice(0, Math.min(5, all.length));
    }
  } else {
    Object.entries(examSettings.categoryQuota).forEach(([category, count]) => {
      const pool   = questionBank.filter(q => q.active && q.category === category);
      const picked = (examSettings.randomizeQuestions ? shuffleArray(pool) : [...pool]).slice(0, Number(count));
      selected.push(...picked);
    });
    if (examSettings.randomizeQuestions) selected = shuffleArray(selected);
  }

  return selected.map(question => {
    const indexedOptions     = question.options.map((text, originalIndex) => ({ text, originalIndex }));
    const displayOptions     = examSettings.randomizeOptions ? shuffleArray(indexedOptions) : indexedOptions;
    const correctDisplayIndex = displayOptions.findIndex(option => option.originalIndex === question.answerIndex);
    return {
      questionId: question.id,
      category: question.category,
      text: question.text,
      options: displayOptions.map(option => option.text),
      optionOriginalIndexes: displayOptions.map(option => option.originalIndex),
      correctDisplayIndex
    };
  });
}

/* ─── 타이머 + 감시 ───────────────────────────── */
function clearTimer() {
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
}

function startTimer() {
  clearTimer();
  addExamGuards();
  state.timerId = setInterval(() => {
    state.remainingSeconds -= 1;
    if (state.currentExam) state.currentExam.currentQuestionIndex = state.currentQuestionIndex || 0;
    if (state.remainingSeconds % 5 === 0) persistCurrentExam(false);
    if (state.remainingSeconds % 15 === 0) persistCurrentExam(true);
    const timer = document.getElementById("remainingTime");
    if (timer) timer.textContent = formatRemainingTime(state.remainingSeconds);
    if (state.remainingSeconds <= 0) {
      clearTimer();
      submitExam(true, false, "시간 종료로 자동 제출");
    }
  }, 1000);
}

function addPreExamGuards() {

}
function removePreExamGuards() {

}

// ── 새로고침 차단 가드 (관리자 화면 제외 전체) ──────────────────────────────────
function _appBeforeUnload(e) {
  // 시험 중이 아닌 경우(로그인/대기/결과/로딩)는 조용히 차단
  if (state.view === "exam") {
    e.preventDefault();
    e.returnValue = "시험이 진행 중입니다. 페이지를 이탈하면 응시 내용이 유실될 수 있습니다.";
    return e.returnValue;
  }
  e.preventDefault();
  e.returnValue = "";
  return "";
}
function _appKeyDown(e) {
  // F5 / Ctrl+R / Cmd+R 차단
  if (e.key === "F5" || ((e.ctrlKey || e.metaKey) && (e.key === "r" || e.key === "R"))) {
    e.preventDefault();
    e.stopPropagation();
  }
}
// 모바일 pull-to-refresh는 CSS overscroll-behavior:none으로만 차단 (터치 이벤트 불필요)
let _appRefreshGuardActive = false;
function addAppRefreshGuard() {
  if (_appRefreshGuardActive) return;
  _appRefreshGuardActive = true;
  window.addEventListener("beforeunload", _appBeforeUnload);
  window.addEventListener("keydown", _appKeyDown, true);
  // pull-to-refresh는 CSS overscroll-behavior:none으로 고정 차단
}
function removeAppRefreshGuard() {
  if (!_appRefreshGuardActive) return;
  _appRefreshGuardActive = false;
  window.removeEventListener("beforeunload", _appBeforeUnload);
  window.removeEventListener("keydown", _appKeyDown, true);

}

// 구버전 호환 (로딩 가드 → 앱 가드로 통합)
function addLoadingGuards()    { addAppRefreshGuard(); }
function removeLoadingGuards() { /* 앱 가드는 관리자 화면에서만 해제 */ }

function addExamGuards() {
  window.onbeforeunload = () => "시험이 진행 중입니다. 페이지를 이탈하면 응시 내용이 유실될 수 있습니다.";
  document.addEventListener("visibilitychange", handleVisibilityChange);
  window.addEventListener("blur", handleWindowBlur);
  window.addEventListener("pagehide", handlePageHide);
}

function removeExamGuards() {
  window.onbeforeunload = null;
  document.removeEventListener("visibilitychange", handleVisibilityChange);
  window.removeEventListener("blur", handleWindowBlur);
  window.removeEventListener("pagehide", handlePageHide);
}

function handlePageHide() {
  registerExamExitViolation("pagehide-exit");
}

function handleVisibilityChange() {
  if (document.hidden) {
    // 로딩 중이거나 새로고침 직후면 무시
    if (state.view === "loading" || window._appJustLoaded) return;
    // 이탈 시각 기록
    state._tabHiddenAt = Date.now();
    handleTabSwitchViolation("visibilitychange");
  } else {
    // 복귀 시 이탈 동안 경과시간 차감
    if (state._tabHiddenAt && state.view === "exam" && state.currentExam && !state.isSubmitting) {
      const elapsed = Math.floor((Date.now() - state._tabHiddenAt) / 1000);
      state.remainingSeconds = Math.max(0, state.remainingSeconds - elapsed);
      const timer = document.getElementById("remainingTime");
      if (timer) timer.textContent = formatRemainingTime(state.remainingSeconds);
      if (state.remainingSeconds <= 0) {
        clearTimer();
        submitExam(true, false, "시간 종료로 자동 제출");
        return;
      }
      persistCurrentExam(false);
    }
    state._tabHiddenAt = null;
  }
}
function handleWindowBlur() {
  // §8: visibilitychange 가 이미 처리했으면 blur 무시
  setTimeout(() => {
    if (window._appJustLoaded) return;
    if (!document.hidden) return;
    const now = Date.now();
    if (state.currentExam && now - state.currentExam.lastViolationAt < 3000) return;
    handleTabSwitchViolation("blur-confirmed");
  }, 300);
}

function registerExamExitViolation(source = "exit") {
  if (state.view !== "exam" || !state.currentExam || state.isSubmitting) return;
  const now = Date.now();
  if (now - state.currentExam.lastViolationAt < 900) {
    persistCurrentExam(false);
    return;
  }
  state.currentExam.lastViolationAt = now;
  state.currentExam.tabSwitchCount += 1;
  const count = state.currentExam.tabSwitchCount;
  const createdAt = new Date().toISOString();
  const message = count >= examSettings.tabSwitchLimit
    ? `페이지 이탈 누적 ${count}회: 재접속 시 자동 제출 및 실격 처리됩니다.`
    : `페이지 이탈 ${count}회 감지: 재접속 후 누적됩니다.`;
  state.currentExam.warningLogs.push({ at: createdAt, source, message });
  const log = {
    logId: makeLogId(),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: count >= examSettings.tabSwitchLimit ? "DISQUALIFIED" : "WARNING",
    message, tabSwitchCount: count, createdAt
  };
  activityLogs.push(log);
  saveActivityLog(log).catch(error => console.warn("이탈 로그 저장 실패", error));
  if (count >= examSettings.tabSwitchLimit) {
    state.currentExam.disqualified = true;
    state.currentExam.disqualificationReason = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
  }
  persistCurrentExam(false);
}

function handleTabSwitchViolation(source = "unknown") {
  if (state.view !== "exam" || !state.currentExam || state.isSubmitting) return;

  const now = Date.now();
  // §8: 3초 쿨다운 — 같은 이탈 이벤트 중복 카운트 방지
  if (now - state.currentExam.lastViolationAt < 3000) return;
  state.currentExam.lastViolationAt = now;

  state.currentExam.tabSwitchCount += 1;
  const count = state.currentExam.tabSwitchCount;
  let message = "";
  if      (count === 1) message = "탭 전환 또는 창 이탈 1회 감지: 경고입니다.";
  else if (count === 2) message = "탭 전환 또는 창 이탈 2회 감지: 마지막 경고입니다.";
  else                  message = `탭 전환 또는 창 이탈 ${count}회 감지: 자동 제출 및 실격 처리됩니다.`;

  const createdAt = new Date().toISOString();
  state.currentExam.warningLogs.push({ at: createdAt, source, message });
  const log = {
    logId: makeLogId(),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: count >= examSettings.tabSwitchLimit ? "DISQUALIFIED" : "WARNING",
    message, tabSwitchCount: count, createdAt
  };
  activityLogs.push(log);
  saveActivityLog(log).catch(error => console.warn("탭 전환 로그 저장 실패", error));

  persistCurrentExam();

  const warnBar = document.getElementById("examWarningBar");
  if (warnBar) {
    warnBar.innerHTML = `화면 전환 : <strong id="tabSwitchCount">${count}/${examSettings.tabSwitchLimit}</strong>`;
    warnBar.className = count >= examSettings.tabSwitchLimit ? "v2-exam-warn danger" : "v2-exam-warn";
  }

  if (count >= examSettings.tabSwitchLimit) {
    state.currentExam.disqualified            = true;
    state.currentExam.disqualificationReason  = `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
    submitExam(true, true, `탭 전환 ${examSettings.tabSwitchLimit}회 이상으로 자동 제출 및 실격`);
  }
}

function formatRemainingTime(seconds) {
  const safe = Math.max(0, seconds);
  const m    = Math.floor(safe / 60);
  const s    = safe % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

/* ─── 시험 화면 렌더 ─────────────────────────── */
function renderExamScreen() {
  const exam = state.currentExam;
  if (!exam) { state.view = "candidate"; renderCandidateDashboard(); return; }

  const answeredCount   = exam.answers.filter(a => a !== null).length;
  const progressPercent = Math.round((answeredCount / exam.questions.length) * 100);
  const unanswered      = exam.questions.length - answeredCount;

  const questionsHtml = exam.questions.map((question, index) => {
    const answered = exam.answers[index] !== null;
    return `
    <section class="v2-question-card ${answered ? "v2-question-answered" : ""}" id="q${index}" aria-labelledby="qt${index}">
      <h3 id="qt${index}" class="v2-question-text"><span class="v2-question-num">${index + 1}.</span> ${formatText(question.text)}</h3>
      <fieldset style="border:0;padding:0;margin:0">
        <legend class="sr-only">문항 ${index + 1} 답안 선택</legend>
        ${question.options.map((option, optionIndex) => {
          const selected = exam.answers[index] === optionIndex;
          return `
          <label class="v2-option ${selected ? "v2-option-selected" : ""}">
            <input
              type="radio" name="answer_${index}" value="${optionIndex}"
              ${selected ? "checked" : ""}
              onclick="selectAnswerLock(${index}, ${optionIndex})"
            />
            <span class="v2-option-no">${optionIndex + 1}</span>
            <span class="v2-option-text">${escapeHtml(option)}</span>
          </label>`;
        }).join("")}
      </fieldset>
    </section>`;
  }).join("");

  const questionNavHtml = exam.questions.map((question, index) => {
    const answered = exam.answers[index] !== null;
    const current = index === Number(state.currentQuestionIndex || exam.currentQuestionIndex || 0);
    return `<button type="button" id="qnav${index}" class="v2-qnav-btn ${answered ? "answered" : "unanswered"} ${current ? "current" : ""}" onclick="scrollToExamQuestion(${index})" aria-label="${index + 1}번 문항으로 이동">${index + 1}</button>`;
  }).join("");

  app.innerHTML = `
    ${buildHeader()}
    <div class="v2-exam-bar" id="examStickyBar">
      <div class="v2-exam-bar-inner">
        <div class="v2-exam-bar-left">
          <span id="examWarningBar" class="v2-exam-warn">화면 전환 : <strong id="tabSwitchCount">${exam.tabSwitchCount}/${examSettings.tabSwitchLimit}</strong></span>
        </div>
        <div class="v2-exam-bar-center">
          <span class="v2-exam-timer" id="remainingTime">${formatRemainingTime(state.remainingSeconds)}</span>
        </div>
        <div class="v2-exam-bar-right">
          <span id="examSyncStatus" class="v2-sync-status v2-sync-${state.examSyncState === "error" ? "error" : state.examSyncState === "saving" ? "saving" : "ok"}" style="${state.examSyncState === "idle" ? "display:none" : "display:inline-flex"}" aria-label="답안 저장 상태">${state.examSyncState === "error" ? "네트워크 불안정" : ""}</span>
          <span class="v2-exam-progress-text">${answeredCount}/${exam.questions.length}</span>
          <button class="btn primary v2-top-submit-btn" id="topSubmitBtn" type="button"
            ${unanswered > 0 ? 'disabled' : 'onclick="openSubmitConfirm()"'}
            aria-label="시험 제출">제출</button>

        </div>
      </div>
      <div class="v2-exam-progress-track">
        <div class="v2-exam-progress-fill" style="width:${progressPercent}%"></div>
      </div>
    </div>
    <nav class="v2-exam-nav-wrap" aria-label="시험 문항 번호 이동">
      <div class="v2-exam-nav-inner">
        <div class="v2-exam-nav-scroll" id="examQuestionNav">${questionNavHtml}</div>
      </div>
    </nav>

    <main class="container v2-exam-container">
      ${state.examSaveError ? `<div class="notice danger" style="margin-bottom:12px">네트워크 불안정<br>답안 임시 저장에 실패했습니다. 연결 상태를 확인해 주세요. 최종 제출은 서버 저장 완료 전까지 결과 화면으로 이동하지 않습니다.</div>` : ""}
      ${questionsHtml}
      <div class="v2-submit-bottom">
        <button class="btn v2-submit-final-btn" id="bottomSubmitBtn" type="button"
        style="${unanswered > 0 ? 'background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:not-allowed;font-weight:700' : 'animation:pulseGlow 1.4s ease-in-out infinite'}"
        ${unanswered > 0 ? 'disabled' : 'onclick="openSubmitConfirm()"'}
      >${unanswered > 0 ? `미응답 ${unanswered}문항 남음` : '✓ 최종 제출'}</button>
      </div>
    </main>

}



function updateSubmitButtonState() {
  if (!state.currentExam) return;
  const total       = state.currentExam.questions.length;
  const answered    = state.currentExam.answers.filter(a => a !== null).length;
  const unanswered  = total - answered;
  const finalBtn    = document.getElementById('bottomSubmitBtn');
  const topBtn      = document.getElementById('topSubmitBtn');
  [finalBtn, topBtn].filter(Boolean).forEach((btn) => {
    if (unanswered > 0) {
      btn.disabled = true;
      btn.textContent = btn.id === 'topSubmitBtn' ? '제출' : `미응답 ${unanswered}문항 남음`;
      if (btn.id === 'bottomSubmitBtn') btn.style.cssText = 'background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:not-allowed;font-weight:700';
      btn.onclick = null;
      btn.classList.remove('primary');
    } else {
      btn.disabled = false;
      btn.textContent = btn.id === 'topSubmitBtn' ? '제출' : '✓ 최종 제출';
      if (btn.id === 'bottomSubmitBtn') btn.style.cssText = 'animation:pulseGlow 1.4s ease-in-out infinite';
      btn.onclick = openSubmitConfirm;
      btn.classList.add('primary');
    }
  });
  const statEl = document.querySelector('.v2-exam-progress-text');
  if (statEl) statEl.textContent = answered + '/' + total;
  const fill = document.querySelector('.v2-exam-progress-fill');
  if (fill) fill.style.width = Math.round((answered / total) * 100) + '%';
  refreshQuestionNav();
}
function selectAnswerLock(questionIndex, optionIndex) {
  if (!state.currentExam) return;
  // 이미 같은 답이 선택된 경우 → 선택 해제(토글)
  if (state.currentExam.answers[questionIndex] === optionIndex) {
    state.currentExam.answers[questionIndex] = null;
    state.currentQuestionIndex = questionIndex;
    state.currentExam.currentQuestionIndex = questionIndex;
    persistCurrentExam();
    const qSection = document.getElementById(`q${questionIndex}`);
    if (qSection) {
      qSection.querySelectorAll('.v2-option').forEach(opt => {
        opt.classList.remove('v2-option-selected');
        opt.setAttribute('aria-checked', 'false');
      });
      // 답변완료 클래스 제거
      qSection.classList.remove('v2-question-answered');
    }
    updateSubmitButtonState();
    return;
  }
  selectAnswerAll(questionIndex, optionIndex);
}
function selectAnswerAll(questionIndex, optionIndex) {
  if (!state.currentExam) return;
  state.currentExam.answers[questionIndex] = optionIndex;
  state.currentQuestionIndex = questionIndex;
  state.currentExam.currentQuestionIndex = questionIndex;
  persistCurrentExam();

  const qSection = document.getElementById(`q${questionIndex}`);
  if (qSection) {
    qSection.querySelectorAll('.v2-option').forEach(opt => opt.classList.remove('v2-option-selected'));
    const labels = qSection.querySelectorAll('.v2-option');
    if (labels[optionIndex]) labels[optionIndex].classList.add('v2-option-selected');
    qSection.classList.add('v2-question-answered');
  }

  const total = state.currentExam.questions.length;
  const answeredCount = state.currentExam.answers.filter(a => a !== null).length;
  const unanswered = total - answeredCount;
  const progressPercent = Math.round((answeredCount / total) * 100);

  const fill = document.querySelector('.v2-exam-progress-fill');
  if (fill) fill.style.width = progressPercent + '%';

  const statEl = document.querySelector('.v2-exam-progress-text');
  if (statEl) statEl.textContent = answeredCount + '/' + total;

  const finalBtn = document.getElementById('bottomSubmitBtn');
  if (finalBtn) {
    if (unanswered > 0) {
      finalBtn.disabled = true;
      finalBtn.textContent = `미응답 ${unanswered}문항 남음`;
      finalBtn.style.cssText = 'background:#f1f5f9;color:#94a3b8;border:1.5px solid #e2e8f0;cursor:not-allowed;font-weight:700';
      finalBtn.onclick = null;
      finalBtn.classList.remove('primary');
    } else {
      finalBtn.disabled = false;
      finalBtn.textContent = '✓ 최종 제출';
      finalBtn.style.cssText = 'animation:pulseGlow 1.4s ease-in-out infinite';
      finalBtn.onclick = openSubmitConfirm;
      finalBtn.classList.add('primary');
    }
  }
  updateSubmitButtonState();
}


function scrollToExamQuestion(index) {
  if (!state.currentExam) return;
  state.currentQuestionIndex = index;
  state.currentExam.currentQuestionIndex = index;
  const target = document.getElementById(`q${index}`);
  if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
  refreshQuestionNav(index);
}

function refreshQuestionNav(currentIndex = state.currentQuestionIndex) {
  if (!state.currentExam) return;
  const exam = state.currentExam;
  exam.questions.forEach((_, index) => {
    const btn = document.getElementById(`qnav${index}`);
    if (!btn) return;
    const answered = exam.answers[index] !== null;
    btn.classList.toggle("answered", answered);
    btn.classList.toggle("unanswered", !answered);
    btn.classList.toggle("current", index === Number(currentIndex || 0));
  });
}

/* ─── 제출 확인 모달 ─────────────────────────── */
function openSubmitConfirm() {
  if (!state.currentExam) return;
  const unanswered = state.currentExam.answers.filter(a => a === null).length;
  if (unanswered > 0) { alert(`미응답 문항이 ${unanswered}개 남아 있습니다.`); return; }
  modalRoot.innerHTML = `
    <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="submitModalTitle">
      <section class="modal sm">
        <h2 id="submitModalTitle">시험을 제출하시겠습니까?</h2>
        <div class="notice warning">제출 후 문제와 정답, 해설은 응시자에게 공개되지 않으며 재응시는 제한됩니다.</div>
        <div class="modal-actions">
          <button class="btn" type="button" onclick="closeModal()">계속 응시</button>
          <button class="btn primary" type="button" onclick="submitExam(false, false, '시험 제출 완료')">제출</button>
        </div>
      </section>
    </div>
  `;
}

function closeModal() { modalRoot.innerHTML = ""; }

/* ─── 채점 & 제출 ─────────────────────────────── */
function calculateScore(exam) {
  const review = buildAnswerReview(exam);
  const total = review.length;
  const correctCount = review.filter(item => item.correct).length;
  const totalScore = correctCount * examSettings.pointsPerQuestion;
  const maxScore = total * examSettings.pointsPerQuestion;
  const percentageScore = maxScore > 0 ? Math.round((totalScore / maxScore) * 100) : 0;
  const disqualified = Boolean(exam.disqualified);
  return {
    correctCount, totalCount: total, totalScore, maxScore, percentageScore,
    score: percentageScore,
    passed: !disqualified && percentageScore >= examSettings.passingScore,
    disqualified
  };
}


function getLatestCorrectDisplayIndex(question) {
  const source = getQuestionBankSource(question?.questionId);
  const correctOriginal = source ? Number(source.answerIndex) : null;
  const order = Array.isArray(question?.optionOriginalIndexes) ? question.optionOriginalIndexes.map(Number) : [];
  if (Number.isInteger(correctOriginal) && order.length) {
    const idx = order.findIndex(n => n === correctOriginal);
    if (idx >= 0) return idx;
  }
  if (source && Array.isArray(source.options) && Array.isArray(question?.options)) {
    const correctText = source.options[correctOriginal];
    const byText = question.options.findIndex(opt => String(opt) === String(correctText));
    if (byText >= 0) return byText;
  }
  return Number.isInteger(question?.correctDisplayIndex) ? question.correctDisplayIndex : -1;
}

function buildAnswerReview(exam) {
  if (!exam || !Array.isArray(exam.questions)) return [];
  return exam.questions.map((question, index) => {
    const selectedDisplayIndex = exam.answers?.[index];
    const optionOriginalIndexes = Array.isArray(question.optionOriginalIndexes) ? question.optionOriginalIndexes.slice() : [];
    const selectedText = selectedDisplayIndex === null || selectedDisplayIndex === undefined
      ? ""
      : (question.options?.[selectedDisplayIndex] || "");
    const correctDisplayIndex = getLatestCorrectDisplayIndex(question);
    const correctText = correctDisplayIndex === null || correctDisplayIndex === undefined || correctDisplayIndex < 0
      ? ""
      : (question.options?.[correctDisplayIndex] || "");
    const source = getQuestionBankSource(question.questionId);
    const correctOriginalOption = source ? Number(source.answerIndex) : null;
    const selectedOriginalOption = selectedDisplayIndex === null || selectedDisplayIndex === undefined
      ? null
      : (optionOriginalIndexes.length ? optionOriginalIndexes[selectedDisplayIndex] : selectedDisplayIndex);
    const isCorrect = selectedDisplayIndex !== null && selectedDisplayIndex !== undefined && correctDisplayIndex >= 0 && selectedDisplayIndex === correctDisplayIndex;
    return {
      no: index + 1,
      questionId: question.questionId,
      category: question.category || "",
      text: question.text || "",
      options: Array.isArray(question.options) ? question.options.slice() : [],
      optionOriginalIndexes,
      selectedDisplayIndex: selectedDisplayIndex,
      selectedOriginalOption,
      selectedText,
      correctDisplayIndex,
      correctOriginalOption,
      correctText,
      correct: isCorrect,
      unanswered: selectedDisplayIndex === null || selectedDisplayIndex === undefined
    };
  });
}

function ensureSubmitBufferRoot() {
  let root = document.getElementById("submitBufferRoot");
  if (!root) {
    root = document.createElement("div");
    root.id = "submitBufferRoot";
    document.body.appendChild(root);
  }
  return root;
}

function showSubmitBuffer(statusText = "서버로 답안을 전송하고 있습니다.", errorMessage = "") {
  const root = ensureSubmitBufferRoot();
  root.innerHTML = `
    <div class="submit-buffer-backdrop" role="alertdialog" aria-modal="true" aria-labelledby="submitBufferTitle">
      <section class="submit-buffer-card">
        ${errorMessage ? "" : `<div class="submit-buffer-spinner" aria-hidden="true"></div>`}
        <h2 id="submitBufferTitle" class="submit-buffer-title">${errorMessage ? "제출 실패" : "제출중입니다"}</h2>
        <p class="submit-buffer-sub">${errorMessage ? "전송이 완료되지 않았습니다." : "잠시만 기다려 주세요"}</p>
        <div class="submit-buffer-status">${escapeHtml(statusText)}</div>
        ${errorMessage ? `<div class="submit-buffer-error">${escapeHtml(errorMessage)}</div>
          <div class="submit-buffer-actions">
            <button class="btn primary" type="button" onclick="retrySubmitExamFromBuffer()">다시 제출</button>
            <button class="btn" type="button" onclick="hideSubmitBuffer(); state.isSubmitting=false; addExamGuards(); startTimer(); renderExamScreen();">시험 화면으로 돌아가기</button>
          </div>` : `<div class="submit-buffer-progress" aria-hidden="true"><span></span></div>`}
      </section>
    </div>`;
}

function updateSubmitBuffer(statusText) {
  const el = document.querySelector(".submit-buffer-status");
  if (el) el.textContent = statusText;
}

function hideSubmitBuffer() {
  const root = document.getElementById("submitBufferRoot");
  if (root) root.innerHTML = "";
}
function updateExamSyncStatus(status, isError = false) {
  let next = "idle";
  if (isError || status === "error") next = "error";
  else if (status === "saving") next = "saving";
  else if (status === "saved" || status) next = "ok";

  state.examSyncState = next;
  const el = document.getElementById("examSyncStatus");
  if (!el) return;
  el.className = "v2-sync-status " + (next === "error" ? "v2-sync-error" : next === "saving" ? "v2-sync-saving" : "v2-sync-ok");
  el.textContent = next === "error" ? "네트워크 불안정" : "";
  el.style.display = next === "idle" ? "none" : "inline-flex";
}


function retrySubmitExamFromBuffer() {
  hideSubmitBuffer();
  state.isSubmitting = false;
  submitExam(false, false, "시험 제출 완료");
}

async function submitExam(isAutoSubmit = false, forceDisqualified = false, submitMessage = "시험 제출 완료") {
  // §7: 프론트 중복 제출 방지
  if (!state.currentExam || state.isSubmitting) return;
  state.isSubmitting = true;
  cancelScheduledActiveExamSave();

  const _submitBtn = document.getElementById("submitExamBtn");
  if (_submitBtn) { _submitBtn.disabled = true; _submitBtn.textContent = "제출 중..."; }

  closeModal();
  showSubmitBuffer("제출 준비 중입니다. 브라우저를 닫지 마세요.");
  clearTimer();
  removeExamGuards();

  if (hasAttemptedThisQuarter(state.currentUser.employeeId, state.currentExam.quarter) && !state.isTestMode) {
    updateSubmitBuffer("이미 제출된 기록을 확인했습니다. 결과 화면으로 이동합니다.");
    clearActiveExamRecord(state.currentUser.employeeId, state.currentExam.quarter);
    state.currentExam  = null;
    state.view         = "candidate";
    state.isSubmitting = false;
    hideSubmitBuffer();
    renderCandidateDashboard();
    return;
  }

  if (forceDisqualified) {
    state.currentExam.disqualified           = true;
    state.currentExam.disqualificationReason = state.currentExam.disqualificationReason || `탭 전환 ${examSettings.tabSwitchLimit}회 이상`;
  }

  const scoring = calculateScore(state.currentExam);
  const result  = {
    resultId: makeResultId(state.currentUser.employeeId, state.currentExam.quarter),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    quarter: state.currentExam.quarter,
    totalScore: scoring.totalScore,
    maxScore: scoring.maxScore,
    percentageScore: scoring.percentageScore,
    score: scoring.score,
    correctCount: scoring.correctCount,
    totalCount: scoring.totalCount,
    passed: scoring.passed,
    disqualified: scoring.disqualified,
    disqualificationReason: scoring.disqualified
      ? (state.currentExam.disqualificationReason || "운영 정책 위반") : "",
    tabSwitchCount: state.currentExam.tabSwitchCount,
    startedAt: state.currentExam.startedAt || null,
    submittedAt: new Date().toISOString()
  };

  if (result.passed && !result.disqualified) {
    const valid = getCertificationValidity(result);
    result.validFrom = valid.validFrom;
    result.validUntil = valid.validUntil;
  }

  const submitLog = {
    logId: makeLogId(),
    employeeId: state.currentUser.employeeId,
    department: state.currentUser.department,
    name: state.currentUser.name,
    type: result.disqualified ? "DISQUALIFIED_SUBMIT" : (isAutoSubmit ? "AUTO_SUBMIT" : "SUBMIT"),
    message: submitMessage,
    tabSwitchCount: result.tabSwitchCount,
    createdAt: result.submittedAt,
    quarter: result.quarter,
    resultId: result.resultId,
    questionSetSummary: {
      totalCount: result.totalCount,
      correctCount: result.correctCount,
      percentageScore: result.percentageScore,
      categories: Array.from(new Set((state.currentExam.questions || []).map(q => q.category || ""))).filter(Boolean)
    },
    answerReview: buildAnswerReview(state.currentExam)
  };

  try {
    if (!state.isTestMode) {
      savePendingSubmission(result, submitLog);
      updateSubmitBuffer("서버에 답안과 결과를 저장하고 있습니다.");
      const saveResult = await appendResultToSheet(result, submitLog);
      if (!saveResult?.ok) throw new Error(saveResult?.message || "서버 저장에 실패했습니다. 다시 제출해 주세요.");
      clearPendingSubmission(result.employeeId, result.quarter);
      updateSubmitBuffer("전송 완료를 확인했습니다. 결과 화면을 준비합니다.");
      examResults.push(result);
      activityLogs.push(submitLog);
      clearActiveExamRecord(state.currentUser.employeeId, state.currentExam.quarter);
    } else {
      updateSubmitBuffer("데모 모드 결과를 생성하고 있습니다.");
    }

    state.lastResult   = result;
    state.currentExam  = null;
    state.view         = "result";
    state.isSubmitting = false;
    setTimeout(() => {
      hideSubmitBuffer();
      renderResultScreen();
    }, 250);
  } catch (error) {
    console.error(error);
    showSubmitBuffer("네트워크 불안정으로 제출 저장에 실패했습니다. 연결 상태를 확인한 뒤 다시 제출해 주세요.", error.message || String(error));
    state.isSubmitting = false;
    if (_submitBtn) { _submitBtn.disabled = false; _submitBtn.textContent = "최종 제출"; }
  }
}

function launchConfetti(duration = 4000) {
  const existing = document.getElementById("confettiCanvas");
  if (existing) existing.remove();

  if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

  const canvas = document.createElement("canvas");
  canvas.id = "confettiCanvas";
  canvas.setAttribute("aria-hidden", "true");
  canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;";
  document.body.appendChild(canvas);

  const ctx = canvas.getContext("2d");
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const colors = ["#2563eb", "#60a5fa", "#93c5fd", "#16a34a", "#86efac", "#facc15", "#fb7185", "#a78bfa"];
  const particles = [];
  let animationId = 0;
  let startTime = performance.now();
  let lastBurst = 0;

  function resizeCanvas() {
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function addBurst(originX, originY, count) {
    for (let i = 0; i < count; i++) {
      const angle = (-Math.PI / 2) + (Math.random() - 0.5) * 1.55;
      const speed = 5 + Math.random() * 8;
      particles.push({
        x: originX + (Math.random() - 0.5) * 26,
        y: originY + (Math.random() - 0.5) * 12,
        vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 2.2,
        vy: Math.sin(angle) * speed - Math.random() * 2,
        w: 5 + Math.random() * 8,
        h: 8 + Math.random() * 12,
        r: 2 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotate: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.28,
        gravity: 0.12 + Math.random() * 0.06,
        drag: 0.985 + Math.random() * 0.01,
        alpha: 1,
        shape: Math.random() > 0.22 ? "rect" : "circle"
      });
    }
  }

  function drawParticle(p) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotate);
    ctx.fillStyle = p.color;
    if (p.shape === "circle") {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    ctx.restore();
  }

  function tick(now) {
    const elapsed = now - startTime;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    if (elapsed < 1350 && now - lastBurst > 220) {
      addBurst(window.innerWidth * 0.25, window.innerHeight + 8, 22);
      addBurst(window.innerWidth * 0.50, window.innerHeight + 8, 28);
      addBurst(window.innerWidth * 0.75, window.innerHeight + 8, 22);
      lastBurst = now;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vx *= p.drag;
      p.vy = p.vy * p.drag + p.gravity;
      p.x += p.vx + Math.sin((elapsed / 120) + p.y * 0.01) * 0.28;
      p.y += p.vy;
      p.rotate += p.spin;
      if (elapsed > duration * 0.58) p.alpha -= 0.018;
      drawParticle(p);
      if (p.alpha <= 0 || p.y > window.innerHeight + 80) particles.splice(i, 1);
    }

    if (elapsed < duration && particles.length) {
      animationId = requestAnimationFrame(tick);
    } else {
      canvas.remove();
      window.removeEventListener("resize", resizeCanvas);
    }
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);
  addBurst(window.innerWidth * 0.33, window.innerHeight + 8, 45);
  addBurst(window.innerWidth * 0.66, window.innerHeight + 8, 45);
  animationId = requestAnimationFrame(tick);
}

function updateQuestionFilter(input) {
  state.filters.qbSearch = input.value;
  // tbody만 교체해 포커스/커서 유지 (한글 IME 끊김 방지)
  refreshQuestionTable();
}

function bindQbSearch() {
  const input = document.getElementById("qbSearchInput");
  if (!input) return;
  let composing = false;
  input.addEventListener("compositionstart", () => { composing = true; });
  input.addEventListener("compositionend",   (e) => {
    composing = false;
    state.filters.qbSearch = e.target.value;
    refreshQuestionTable();
  });
  input.addEventListener("input", (e) => {
    if (composing) return;
    state.filters.qbSearch = e.target.value;
    refreshQuestionTable();
  });
  // 카테고리/상태 select 바인딩
  const catSel = document.getElementById("qbCatSelect");
  const stSel  = document.getElementById("qbStatusSelect");
  if (catSel) catSel.addEventListener("change", (e) => { state.filters.qbCategory = e.target.value; refreshQuestionTable(); });
  if (stSel)  stSel.addEventListener("change",  (e) => { state.filters.qbStatus   = e.target.value; refreshQuestionTable(); });
}

function refreshQuestionTable() {
  const fCat    = state.filters.qbCategory || "전체";
  const fStatus = state.filters.qbStatus   || "전체";
  const fSearch = (state.filters.qbSearch  || "").trim();

  const filtered = questionBank.filter(q => {
    const matchCat    = fCat    === "전체" || q.category === fCat;
    const matchStatus = fStatus === "전체" || (fStatus === "활성" ? q.active : !q.active);
    const matchSearch = !fSearch || q.text.includes(fSearch) || q.category.includes(fSearch);
    return matchCat && matchStatus && matchSearch;
  });

  const tbody = document.getElementById("qbTbody");
  const countEl = document.getElementById("qbCount");
  if (!tbody) { renderAdminDashboard(); return; }

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">조건에 맞는 문제가 없습니다.</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map((q, i) => `
      <tr style="${!q.active ? "opacity:0.55;background:#f8fafc" : ""}">
        <td style="text-align:center;color:var(--muted);font-size:12px">${i+1}</td>
        <td>
          <span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;font-weight:700;
            background:${q.category==='테스트'?'#fef3c7':'#eff6ff'};
            color:${q.category==='테스트'?'#92400e':'#2563eb'}">
            ${escapeHtml(q.category)}
          </span>
        </td>
        <td style="font-size:13px;line-height:1.5;padding:10px 12px">
          ${formatText(q.text)}
          <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">
            ${(q.options||[]).map((opt,oi) => `
              <span style="font-size:11px;padding:1px 7px;border-radius:4px;
                background:${oi===q.answerIndex?'#dcfce7':'#f1f5f9'};
                color:${oi===q.answerIndex?'#166534':'#475569'};
                font-weight:${oi===q.answerIndex?'700':'400'}">
                ${oi+1}. ${escapeHtml(opt)}
              </span>`).join("")}
          </div>
        </td>
        <td style="text-align:center;font-weight:700;color:#059669">${Number(q.answerIndex)+1}번</td>
        <td style="text-align:center">
          <span class="badge ${q.active?"success":"danger"}">${q.active?"활성":"비활성"}</span>
        </td>
        <td style="text-align:center;white-space:nowrap">
          <button class="btn small" type="button" onclick="openQuestionModal(${q.id})">수정</button>
          <button class="btn small" type="button" onclick="toggleQuestionStatus(${q.id})">${q.active?"비활성":"활성"}</button>
          <button class="btn small danger" type="button" onclick="deleteQuestion(${q.id})">삭제</button>
        </td>
      </tr>`).join("");
  }
  if (countEl) countEl.textContent = `${filtered.length}/${questionBank.length}문항 표시`;
}

function getDashboardMetrics() {
  const quarter        = getCurrentQuarter();
  const totalCandidates = getCandidateUsers().length;
  const currentResults = examResults.filter(r => r.quarter === quarter).map(getRegradedResult);
  const completed      = new Set(currentResults.map(r => r.employeeId)).size;
  const pending        = totalCandidates - completed;
  const nonDisqualified = currentResults.filter(r => !r.disqualified);
  const avgScore       = currentResults.length
    ? Math.round(currentResults.reduce((sum, r) => sum + r.percentageScore, 0) / currentResults.length) : 0;
  const passRate       = nonDisqualified.length
    ? Math.round((nonDisqualified.filter(r => r.passed).length / nonDisqualified.length) * 100) : 0;
  const disqualifiedCount = currentResults.filter(r => r.disqualified).length;
  return { totalCandidates, completed, pending, avgScore, passRate, disqualifiedCount };
}

function getCategoryCounts() {

function getScoreDistribution(results) {
  const ranges = [
    { label: "0-59",   min: 0,  max: 59  },
    { label: "60-69",  min: 60, max: 69  },
    { label: "70-79",  min: 70, max: 79  },
    { label: "80-89",  min: 80, max: 89  },
    { label: "90-100", min: 90, max: 100 }
  ];
  return ranges.map(range => ({
    label: range.label,
    value: results.map(getRegradedResult).filter(r => r.percentageScore >= range.min && r.percentageScore <= range.max).length
  }));
}

function renderBarChart(items) {
  const max = Math.max(1, ...items.map(item => item.value));
  return `
    <div class="bar-chart">
      ${items.map(item => `

          <strong>${escapeHtml(item.label)}</strong>
          <div class="bar-track" aria-label="${escapeHtml(item.label)} ${item.value}">
            <div class="bar-fill" style="width:${Math.round((item.value / max) * 100)}%"></div>
          </div>
          <span class="text-right">${item.value}</span>

"use strict";

// 책임: 응시자 목록 조회, 필터, 응시자 추가 모달

// ── 응시자 테이블 행 빌더 (정렬: 이루자→협력사, 소속 가나다, 성명 가나다) ─────
function _sortUsers(rows) {
  const typeOrder = { "이루자": 0, "협력사": 1 };
  return [...rows].sort((a, b) => {
    const aType = _getUserType(a);
    const bType = _getUserType(b);
    const tDiff = (typeOrder[aType] ?? 9) - (typeOrder[bType] ?? 9);
    if (tDiff !== 0) return tDiff;
    const dDiff = (a.department || "").localeCompare(b.department || "", "ko");
    if (dDiff !== 0) return dDiff;
    return (a.name || "").localeCompare(b.name || "", "ko");
  });
}
function _getUserType(user) {
  const affil = managedAffiliations.find(a => (typeof a === "string" ? a : a.name) === user.department);
  return affil ? (typeof affil === "string" ? "이루자" : affil.type) : "이루자";
}


function getQuestionBankSource(questionId) {
  return questionBank.find(q => String(q.id) === String(questionId)) || null;
}

function getQuestionBankOptions(source) {
  return source && Array.isArray(source.options) ? source.options.slice() : [];
}

function getSubmissionAnswerLog(employeeId, result) {
  const resultTime = result?.submittedAt ? new Date(result.submittedAt).getTime() : 0;
  const submitTypes = new Set(["SUBMIT", "AUTO_SUBMIT", "DISQUALIFIED_SUBMIT"]);
  return activityLogs
    .filter(log => log.employeeId === employeeId)
    .filter(log => submitTypes.has(log.type))
    .filter(log => !result?.quarter || !log.quarter || log.quarter === result.quarter)
    .filter(log => Array.isArray(log.answerReview) && log.answerReview.length)
    .sort((a, b) => {
      const aDiff = Math.abs((new Date(a.createdAt || 0).getTime()) - resultTime);
      const bDiff = Math.abs((new Date(b.createdAt || 0).getTime()) - resultTime);
      return aDiff - bDiff;
    })[0] || null;
}

async function fetchSubmissionAnswerLogFromDb(employeeId, result) {
  if (!_sb || !employeeId) return null;
  try {
    const { data, error } = await _sb
      .from("activity_logs")
      .select("log_id, employee_id, action, detail, created_at")
      .eq("employee_id", employeeId)
      .in("action", ["SUBMIT", "AUTO_SUBMIT", "DISQUALIFIED_SUBMIT"])
      .order("created_at", { ascending: false })
      .limit(50);
    if (error) throw error;

    const resultTime = result?.submittedAt ? new Date(result.submittedAt).getTime() : 0;
    return (data || []).map(row => {
      let detail = {};
      try { detail = row.detail ? JSON.parse(row.detail) : {}; } catch (e) { detail = {}; }
      return {
        logId: detail.logId || row.log_id,
        employeeId: row.employee_id,
        type: detail.type || row.action || "",
        quarter: detail.quarter || "",
        createdAt: detail.createdAt || row.created_at,
        answerReview: Array.isArray(detail.answerReview) ? detail.answerReview : [],
        questionSetSummary: detail.questionSetSummary || null,
        rawDetail: detail
      };
    }).filter(log => Array.isArray(log.answerReview) && log.answerReview.length)
      .filter(log => !result?.quarter || !log.quarter || log.quarter === result.quarter)
      .sort((a, b) => {
        const aDiff = Math.abs((new Date(a.createdAt || 0).getTime()) - resultTime);
        const bDiff = Math.abs((new Date(b.createdAt || 0).getTime()) - resultTime);
        return aDiff - bDiff;
      })[0] || null;
  } catch (err) {
    console.warn("문제세트 제출 로그 조회 실패", err);
    return null;
  }
}

function normalizeAnswerReviewFromQuestionBank(log) {
  if (!log || !Array.isArray(log.answerReview)) return [];
  return log.answerReview.map((item, idx) => {
    const source = getQuestionBankSource(item.questionId);
    const sourceOptions = getQuestionBankOptions(source);
    const storedOptions = Array.isArray(item.options) ? item.options.slice() : [];
    const options = storedOptions.length ? storedOptions : sourceOptions;
    const optionOriginalIndexes = Array.isArray(item.optionOriginalIndexes) ? item.optionOriginalIndexes.map(Number) : [];

    const selectedDisplayIndex = Number.isInteger(item.selectedDisplayIndex) ? item.selectedDisplayIndex : null;
    const selectedOriginalOption = selectedDisplayIndex === null || selectedDisplayIndex === undefined
      ? (item.selectedOriginalOption ?? null)
      : (optionOriginalIndexes.length ? optionOriginalIndexes[selectedDisplayIndex] : (item.selectedOriginalOption ?? selectedDisplayIndex));

    let correctDisplayIndex = -1;
    let correctOriginalOption = item.correctOriginalOption ?? null;
    if (source) {
      correctOriginalOption = Number(source.answerIndex);
      if (optionOriginalIndexes.length) {
        correctDisplayIndex = optionOriginalIndexes.findIndex(n => Number(n) === correctOriginalOption);
      }
      if (correctDisplayIndex < 0 && sourceOptions.length && options.length) {
        const correctTextFromBank = sourceOptions[correctOriginalOption];
        correctDisplayIndex = options.findIndex(opt => String(opt) === String(correctTextFromBank));
      }
    }
    if (correctDisplayIndex < 0 && Number.isInteger(item.correctDisplayIndex)) {
      correctDisplayIndex = item.correctDisplayIndex;
    }

    const selectedText = selectedDisplayIndex === null || selectedDisplayIndex === undefined
      ? ""
      : (options[selectedDisplayIndex] || item.selectedText || "");
    const correctText = correctDisplayIndex >= 0
      ? (options[correctDisplayIndex] || item.correctText || "")
      : (item.correctText || "");
    const isCorrect = selectedDisplayIndex !== null && selectedDisplayIndex !== undefined && correctDisplayIndex >= 0 && selectedDisplayIndex === correctDisplayIndex;

    return {
      no: item.no || idx + 1,
      questionId: item.questionId,
      category: source?.category || item.category || "",
      text: source?.text || item.text || "",
      options,
      optionOriginalIndexes,
      selectedDisplayIndex,
      selectedOriginalOption,
      selectedText,
      correctDisplayIndex,
      correctOriginalOption,
      correctText,
      correct: isCorrect,
      unanswered: selectedDisplayIndex === null || selectedDisplayIndex === undefined,
      questionBankFound: !!source
    };
  });
}

function getRegradedResult(result) {
  if (!result) return result;
  const log = getSubmissionAnswerLog(result.employeeId, result);
  const review = normalizeAnswerReviewFromQuestionBank(log);
  if (!review.length) return { ...result, _regraded: false };
  const totalCount = review.length;
  const correctCount = review.filter(item => item.correct).length;
  const totalScore = correctCount * examSettings.pointsPerQuestion;
  const maxScore = totalCount * examSettings.pointsPerQuestion;
  const percentageScore = maxScore > 0 ? Math.round((totalScore / maxScore) * 100) : 0;
  const disqualified = Boolean(result.disqualified);
  return {
    ...result,
    correctCount,
    totalCount,
    totalScore,
    maxScore,
    percentageScore,
    score: percentageScore,
    passed: !disqualified && percentageScore >= examSettings.passingScore,
    _regraded: true,
    _storedPercentageScore: result.percentageScore,
    _storedCorrectCount: result.correctCount
  };
}

function _buildUserRowsHtml(rows) {
  // 중복 제거: employeeId 기준
  const seen = new Set();
  const unique = rows.filter(u => {
    if (seen.has(u.employeeId)) return false;
    seen.add(u.employeeId); return true;
  });
  // 정렬 적용
  const sorted = _sortUsers(unique);
  if (!sorted.length) return `<tr><td colspan="12" class="empty">조건에 맞는 응시자가 없습니다.</td></tr>`;

  return sorted.map(user => {
    const attempted  = hasAttemptedThisQuarter(user.employeeId);
    const isActive   = !!getActiveExamRecord(user.employeeId);
    const latest     = getLatestResult(user.employeeId);
    const displayLatest = latest ? getRegradedResult(latest) : null;
    const userType   = _getUserType(user);
    const typeColor  = userType === "이루자" ? "color:#2563eb;background:#eff6ff" : "color:#059669;background:#f0fdf4";
    const tabCount   = latest?.tabSwitchCount ?? (isActive ? (getActiveExamRecord(user.employeeId)?.exam?.tabSwitchCount ?? 0) : 0);
    const disq       = latest?.disqualified || false;

    // §12: 실격 > 제출 완료 > 응시 중 > 응시 전 우선순위
    let statusBadge;
    if (disq)           statusBadge = `<span class="status-badge status-disqualified">🚫 실격</span>`;
    else if (attempted) statusBadge = `<span class="status-badge status-submitted">✅ 제출 완료</span>`;
    else if (isActive)  statusBadge = `<span class="status-badge status-progress">🟡 응시 중</span>`;
    else                statusBadge = `<span class="status-badge status-ready">응시 전</span>`;

    // 합격 여부
    let passBadge = "-";
    if (displayLatest?.passed != null || displayLatest?.disqualified) {
      passBadge = renderResultBadge(displayLatest);
    }

    // 이탈 표시
    const tabBadge = tabCount >= examSettings.tabSwitchLimit
      ? `<span class="badge danger">${tabCount}회</span>`
      : tabCount > 0
        ? `<span class="badge warning">${tabCount}회</span>`
        : `<span style="color:var(--muted)">0회</span>`;

    // 실격/부정행위
    let disqBadge = "-";
    if (disq) {
      disqBadge = `<span class="badge danger" title="${escapeHtml(latest?.disqualificationReason||"")}">실격</span>`;
    } else if (tabCount >= examSettings.tabSwitchLimit) {
      disqBadge = `<span class="badge danger">부정행위 의심</span>`;
    }


    const activeRec = getActiveExamRecord(user.employeeId);
    const startedAt  = latest?.startedAt
      ? formatDateTime(latest.startedAt)
      : (activeRec?.exam?.startedAt ? formatDateTime(activeRec.exam.startedAt) : "-");
    const submittedAt  = latest ? formatDateTime(latest.submittedAt) : "-";
    const updatedAt    = latest
      ? formatDateTime(latest.submittedAt)
      : (activeRec?.updatedAt ? formatDateTime(activeRec.updatedAt) : "-");
    return `<tr style="${disq ? "background:rgba(194,65,12,.06)" : ""}">
      <td><span style="font-size:12px;font-weight:700;padding:2px 8px;border-radius:99px;${typeColor}">${escapeHtml(userType)}</span></td>
      <td class="fixed-dept">${escapeHtml(user.department) || "-"}</td>
      <td class="fixed-name">${latest
        ? `<button class="link-button" type="button" style="font-weight:800;text-decoration:underline;text-underline-offset:3px" title="제출 문제세트/선택 답안 보기" onclick="openSubmittedAnswerModal('${encodeURIComponent(user.employeeId)}')">${escapeHtml(user.name)}</button>`
        : `<strong>${escapeHtml(user.name)}</strong>`}</td>
      <td>${statusBadge}</td>
      <td class="fixed-score">${displayLatest ? `<strong>${displayLatest.percentageScore}점</strong>` : "-"}</td>
      <td class="fixed-pass">${passBadge}</td>
      <td style="text-align:center" class="${tabCount >= examSettings.tabSwitchLimit ? 'leave-warning' : ''}">${tabBadge}</td>
      <td>${disqBadge}</td>
      <td style="font-size:12px">${startedAt}</td>
      <td style="font-size:12px">${submittedAt}</td>
      <td style="white-space:nowrap">
        <button class="btn small" type="button" onclick="resetCandidateRecords('${user.employeeId}')">초기화</button>
        <button class="btn small danger" type="button" onclick="deleteCandidate('${user.employeeId}')">삭제</button>
      </td>
    </tr>`;
  }).join("");
}

function filterUsers() {
  return getCandidateUsers().filter(user => {
    const keyword        = (state.filters.userSearch || "").trim();
    const attempted      = hasAttemptedThisQuarter(user.employeeId);
    const isExamActive   = !!getActiveExamRecord(user.employeeId);
    const affil          = managedAffiliations.find(a => (typeof a==="string"?a:a.name) === user.department);
    const userType       = affil ? (typeof affil==="string" ? "이루자" : affil.type) : "이루자";
    const matchesKeyword = !keyword || keywordMatch(user.department, keyword) || keywordMatch(user.name, keyword);
    const matchesType    = state.filters.userType === "전체" || userType === state.filters.userType;
    const matchesDept    = state.filters.userDepartment === "전체" || user.department === state.filters.userDepartment;
    const disqForFilter  = getLatestResult(user.employeeId)?.disqualified || false;
    const matchesStatus  = state.filters.userStatus === "전체" ||
      (state.filters.userStatus === "제출 완료" && attempted && !disqForFilter) ||
      (state.filters.userStatus === "응시 완료" && attempted && !disqForFilter) ||
      (state.filters.userStatus === "미응시"    && !attempted && !isExamActive) ||
      (state.filters.userStatus === "응시 중"   && isExamActive && !disqForFilter) ||
      (state.filters.userStatus === "실격"      && disqForFilter);
    return matchesKeyword && matchesType && matchesDept && matchesStatus;
  });
}

function generateEmployeeId(department = "", name = "") {
  const raw = String(department || "") + "__" + String(name || "");
  const hash = _strHash(raw).toString(16).toUpperCase().padStart(8, "0");
  return "U-" + hash;
}


function addUser(event) {
  event.preventDefault();
  const form       = new FormData(event.currentTarget);
  const type       = String(form.get("type") || "이루자").trim();
  const department = String(form.get("department")).trim();
  const name       = String(form.get("name")).trim();
  const employeeId = generateEmployeeId(department, name);

  if (users.some(user => user.role === "candidate" && user.department === department && user.name === name)) {
    alert("같은 소속과 성명의 응시자가 이미 있습니다. 로그인 혼동 방지를 위해 이름 표기를 구분해 주세요.");
    return;
  }
  users.push({ employeeId, department, name, role: "candidate" });
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

async function resetCandidateRecords(employeeId) {
  const user = users.find(item => item.employeeId === employeeId);
  if (!user) return;
  if (!confirm(user.department + " " + user.name + "의 응시 기록을 초기화하시겠습니까?")) return;

  examResults = examResults.filter(result => result.employeeId !== employeeId);
  activityLogs = activityLogs.filter(log => log.employeeId !== employeeId);
  activeExams = activeExams.filter(a => a.key?.split("__")[0] !== employeeId);
  overwriteLocalCache();

  try {
    if (isExternalApiRuntime()) {
      const res = await callExternalApi("resetCandidateData", { employeeId });
      if (res && res.ok === false) throw new Error(res.message || "응시 기록 초기화 실패");
    }
    alert("응시 기록 초기화가 저장되었습니다.");
  } catch (e) {
    console.warn("응시 기록 초기화 실패", e);
    alert("응시 기록 초기화 저장에 실패했습니다: " + (e.message || e));
  }
  renderAdminDashboard();
}

async function deleteCandidate(employeeId) {
  const user = users.find(item => item.employeeId === employeeId);
  if (!user) return;
  if (!confirm(user.department + " " + user.name + " 응시자를 삭제할까요? 해당 응시자의 시험 결과와 로그도 함께 삭제됩니다.")) return;

  users = users.filter(item => item.employeeId !== employeeId);
  examResults = examResults.filter(r => r.employeeId !== employeeId);
  activityLogs = activityLogs.filter(l => l.employeeId !== employeeId);
  activeExams = activeExams.filter(a => a.key?.split("__")[0] !== employeeId);
  if (state.currentUser?.employeeId === employeeId) logout();
  overwriteLocalCache();

  try {
    if (isExternalApiRuntime()) {
      const res = await callExternalApi("deleteCandidateData", { employeeId });
      if (res && res.ok === false) throw new Error(res.message || "응시자 삭제 실패");
    }
    alert("응시자 삭제가 저장되었습니다.");
  } catch (e) {
    console.warn("응시자 삭제 실패", e);
    alert("응시자 삭제 저장에 실패했습니다: " + (e.message || e));
  }
  renderAdminDashboard();
}

function readQuestionForm(event) {
  const form = new FormData(event.currentTarget);
  const answerIndexRaw = form.get("answerIndex");
  if (answerIndexRaw === null) {
    alert("정답으로 사용할 번호를 1개 선택해 주세요.");
    return null;
  }
  return {
    category:    String(form.get("category")).trim(),
    difficulty:  "기본",
    text:        String(form.get("text")).trim(),
    options:     [0, 1, 2, 3, 4].map(i => String(form.get(`option${i}`)).trim()),
    answerIndex: Number(answerIndexRaw),
    active:      String(form.get("active")) === "true"
  };
}

function addQuestion(event) {
  event.preventDefault();
  const data = readQuestionForm(event);
  if (!data) return;
  questionBank.push({ id: nextId(questionBank, "id"), ...data });
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function updateQuestion(event, id) {
  event.preventDefault();
  const data = readQuestionForm(event);
  if (!data) return;
  questionBank = questionBank.map(q => q.id === id ? { ...q, ...data } : q);
  savePersistentData();
  closeModal();
  renderAdminDashboard();
}

function toggleQuestionStatus(id) {
  questionBank = questionBank.map(q => q.id === id ? { ...q, active: !q.active } : q);
  savePersistentData();
  renderAdminDashboard();
}

async function deleteQuestion(id) {
  const q = questionBank.find(item => item.id === id);
  if (!q) return;
  if (!confirm("선택한 문제를 삭제할까요?")) return;

  questionBank = questionBank.filter(item => item.id !== id);
  overwriteLocalCache();

  try {
    if (isExternalApiRuntime()) {
      const res = await callExternalApi("deleteQuestionData", { id });
      if (res && res.ok === false) throw new Error(res.message || "문제 삭제 실패");
    }
  } catch (e) {
    console.warn("문제 삭제 실패", e);
    alert("문제 삭제에 실패했습니다: " + (e.message || e));
  }

  renderAdminDashboard();
}

function updateExamSettings(event) {
  const target = event.target;
  if (!target.name) return;

  if (target.name.startsWith("quota:")) {
    const category = target.name.replace("quota:", "");
    examSettings.categoryQuota[category] = Math.max(0, Number(target.value || 0));
  } else if (target.name === "randomizeQuestions" || target.name === "randomizeOptions") {
    examSettings[target.name] = target.value === "true";
  } else if (target.name !== "totalQuestions") {
    examSettings[target.name] = Math.max(1, Number(target.value || 1));
  }

  examSettings.totalQuestions = Object.values(examSettings.categoryQuota).reduce((a, b) => a + Number(b), 0);
  savePersistentData();
  renderAdminDashboard();
}
